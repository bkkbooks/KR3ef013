body:
  text: 傷寒來蘇集卷三陽明脈證上陽明之為病胃家實也陽明為傳化之府當更實更虛食入胃實而腸虛食下腸實而腸虛食下腸實而胃虛若但實不虛斯為陽明之病根矣胃實不是陽明病而陽明之為病悉從胃實上得來故以胃家實為陽明一經之總綱也然致實之由最宜詳審有實于未病之先者有實于得病之後者有風寒外束熱不得越而實者有妄汗吐下重亡津液而實者有從本經熱盛而實者有從他經轉屬而實者此只舉其病根在實而勿得以胃實即為可下之症按陽明提綱與內經熱論不同熱論重在經絡病為在表此以裏證為主裏不和即是陽明病他條或有表證人景意不在表或兼經病仲景意不在經陽明為闔凡裏證不和者又以闔病為主不大便固闔也不小便亦闔也不能食食難用飽初欲食反不能食皆闔也自汗出盜汗出表開而裏闔也反無汗內外皆闔也種種闔病或然或否故提綱獨以胃實為正胃實不是竟指燥屎堅鞕只對下利言下利是胃家不實矣故汗出解後胃中不和而下利者便不稱陽明病如胃中虛而不下利者便屬陽明即初鞕後溏者總不失為胃家實也所以然者陽明太陽同處中州而所司各別胃司納故以陽明主實脾司輸故以太陰主利同一胃府而分治如此是二經所由分也問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也陽明主裏而亦有外證者有諸中而形諸外非另有外證也胃實之外見者其身則蒸蒸然裏熱熾而達於外與大陽表邪發熱者不同其汗則濈濈然從內溢而無止息與太陽風邪為汗者不同表寒已散故不惡寒裏熱閉結故反惡熱只因有胃家實之病根即見身熱自汗之外證不惡寒反惡熱之病情然此但言病機發現非即可下之證也宜輕劑以和之必譫語潮熱煩躁脹滿諸證兼見才為可下四證是陽明外證之提綱故胃中虛冷亦得稱陽明病者因其外證如此也陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出陽明脈證與太陽脈證不同太陽脈浮緊者必身疼痛無汗惡寒發熱不休此則潮熱有時是惡寒將自罷將發潮熱時之脈也此緊反入裏之謂不可拘緊則為寒之說矣太陽脈但浮者必無汗今盜汗出是因於內熱且與本經初病但浮無汗而喘者不同又不可拘浮為在表之法矣脈浮緊但浮而不合麻黃證身熱汗出而不是桂枝證麻桂下咽陽盛則斃耳此脈從經異非脈從病反要知仲景分經辨脈勿專據脈談證傷寒三日陽明脈大脈大者兩陽合明內外皆陽之象也陽明受病之初病為在表脈但浮而未大與太陽同故亦有麻黃桂枝證至二日惡寒自止而反惡熱三日來熱勢太盛故脈亦應其人而洪大也此為胃家實之正脈若小而不大便屬少陽矣內經云陽明之至短而澀此指秋金司令之時脈又曰陽明脈象大浮也此指兩陽合明之病脈脈浮而大心下反鞕有熱屬藏者攻之不令發汗屬府者不令溲數溲數則大便鞕汗多則熱愈汗少則便難脈遲尚未可攻此治陽明之大法也陽明主津液所生病津液乾則胃家實矣津液致乾之道有二汗多則傷上焦之液溺多則傷下焦之液一有所傷則大便鞕而難出故禁汗與溲夫脈之浮而緊浮而緩浮而收浮而遲者皆不可攻而可汗此浮而大反不可汗而可攻者以為此陽明三日之脈當知大為病進不可拘浮為在表也心下者胃口也心下鞕已見胃實之一班以表脈不當見裏證故曰反鞕耳有熱屬藏是指心肺有熱不是竟指胃實攻之是攻其熱非攻其實即與黃芩湯徹其熱之義也不令者禁止之辭便見瀉心之意上焦得通津液自下胃氣因和耳屬府指膀胱亦不指胃膀胱熱故溲數不令處亦見當滋陰之義矣屬府是陪說本條重在藏熱汗多句直接發汗句來蓋汗為心液汗出是有熱屬藏之徵也所以不令發汗者何蓋汗出多津液亡而火就燥則愈熱而大便難即汗出少亦未免便鞕而難出故利於急攻耳仲景治陽明不患在胃家實而患在藏有熱故急於攻熱而緩以下其實禁汗與溲所以存其津正以和其實耳然證有虛實脈有真假假令脈遲便非藏實是浮大皆為虛脈矣仲景特出此句正發明心下鞕一證有無熱屬藏者為妄攻其熱者禁也其慎密如此陽明病心下鞕滿者不可攻之攻之利遂不止者死利止者愈陽明證具而心下鞕有可攻之理矣然鞕而尚未滿是熱邪散漫胃中尚未乾也妄攻其熱熱去寒起移寒於脾實反成虛故利遂不止也若利能自止是其人之胃不虛而脾家實腐穢去盡而邪不留故愈上條熱既屬藏利於急攻所以存津液也此條熱邪初熾禁其妄攻所以保中氣也要知腹滿已是太陰一班陽明陰相配偶胃實則太陰轉屬於陽明胃虛則陽明轉屬於太陰矣此仲景大有分寸處診者大宜著眼傷寒嘔多雖有陽明證不可攻之嘔多是水氣在上焦雖有胃實證只宜小柴胡以通液攻之恐有利遂不止之禍要知陽明病津液未亡者慎不可攻蓋腹滿嘔吐是太陰陽明相關證胃實胃虛是陽明太陽分別處胃家實雖變證百出不失為生陽下利不止參附不能挽回便是死陰矣陽明病自汗出若發汗小便自利此為津液內竭大便雖鞕不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導本自汗便發汗則上焦之液已外竭小便自利則下焦之液又內竭胃中津液兩竭大便之鞕可知雖鞕而小便自利是內實而非內熱矣蓋陽明之實不患在燥而患在熱此內既無熱只須外潤其燥耳連用三自字見胃實而無變證者當任其自然而不可妄治更當探苦欲之病情於欲大便時因其勢而利導之不欲便者宜靜以俟之矣此何以故蓋胃家實固是病根亦是其人命根禁攻其實者先慮其虛耳陽明病本自汗出醫更重發汗病已差尚微煩不了了者此必大便鞕故也以亡津液胃中乾燥故令大便鞕當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也治病必求其本胃者津液之本也汗與溲皆本於津液本自汗出本小便利其人胃家津液本多仲景提出亡津液句為世之不惜津液者告也病差指身熱汗出言煩即惡熱之謂煩而微知惡熱將自罷以尚不了故大便鞕耳數少即再行之謂大便鞕小便少皆因胃亡津液所致不是陽盛於裏也因胃中乾燥則飲入於胃不能上輸於肺通調水道下輸膀胱故小便反少而游溢之氣尚能輸精於脾津液相成還歸於胃胃氣因和則大便自出更無用導法矣以此見津液素盛者雖亡津液而津液終自還正以見胃家實者每躊躇顧慮示人以勿妄下與勿妄汗也歷舉治法脈遲不可攻心下滿不可攻嘔多不可攻小便自利與小便數少不可攻總見胃家實不是可攻證蜜煎方蜜七分右一味於銅器內煎凝如飴狀攪之勿令焦著欲可丸併手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以內穀道中欲大便時乃去之豬膽汁方大豬膽一枚瀉汁加醋少許灌穀道中如一食頃當大便出宿食物甚效問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也陽明受病當二三日發上條是指其已發熱言此追究一日前未發熱時也初受風寒之日尚在陽明之表與太陽初受時同故陽明亦有麻黃桂枝證二日來表邪自罷故不惡寒寒止熱熾故汗自出而反惡熱兩陽合明之象見矣陽明病多從他經轉屬此因本經自受寒邪胃陽中發寒邪即退反從熱化故耳若因亡津液而轉屬必在六七日來不在一二日間本經受病之初其惡寒雖與太陽同而無頭項強痛為可辨即發熱汗出亦同太陽桂枝證但不惡寒反惡熱之病情是陽明一經之樞紐本經受邪有中面中膺之別中面則有目疼鼻乾邪氣居高即熱反勝寒寒邪未能一日遽止此中於膺部位近於胃故退寒最捷問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也太陽病八九日尚有惡寒證若少陽寒熱往來三陰惡寒轉甚非發汗溫中何能自罷惟陽明惡寒未經表散即能自止與他經不同始雖惡寒二句語意在陽明居中句上夫知陽明之惡寒易止便知陽明為病之本矣胃為戊土位處中州表裏寒熱之邪無所不歸無所不化皆從燥化而為實實則無所復傳此胃家實所以為陽明之病根也右論胃實證問曰太陽緣何而得陽明病答曰太陽病若發汗若下若利小便亡津液胃中乾燥因轉屬陽明胃實大便難此名陽明也此明太陽轉屬陽明之病因有此亡津液之病機成此胃家實之病根也按仲景陽明病機其原本經脈篇主津液所生病句來故雖有熱論中身去鼻乾等症總歸重在津液上如中風之口苦咽乾鼻乾不得汗身目黃小便難皆津液不足所致如腹滿小便不利水穀不別等症亦津液不化使然故仲景諄諄以亡津液為治陽明者告也陽脈微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽實於裏亡津液大便因鞕也陽明主津液所生病者也因妄汗而傷津液致胃家實耳桂枝證本自汗自汗多則亡津麻黃證本無汗發汗多亦亡津此雖指太陽轉屬然陽明表證亦有之本太陽病初得時發其汗汗先出不徹因轉屬陽明也徹止也即汗出多之互辭傷寒轉屬陽明者其人濈然微汗出也此亦汗出不止之互辭概言傷寒不是專指太陽矣傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也胃實之病機在汗出多病情在不能食初因寒邪外束故無汗繼而胃陽遽發故反汗多即嘔不能食時可知其人胃家素實與乾嘔不同而反汗出則非太陽之中風陽明之病實矣太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必鞕不大便十日無所苦也渴欲飲水者少少與之但以法救之宜五苓散此病機在渴以桂枝脈證而兼渴其人津液素虧可知小便數則非消渴矣以此知大便雖鞕是津液不足不是胃家有餘即十日不便而無痞滿硬痛之苦不得為承氣證飲水利水是胃家實而脈弱之正治也不用豬苓湯用五苓散者以表熱未除故耳此為太陽陽明之併病餘義見本苓證中傷寒脈浮緩手足自溫者繫在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便鞕者為陽明病也太陰受病轉屬陽明者以陽明為燥土故非經絡表裏相關所致總因亡津液而致也此病機在小便小便自利是津液不行故溼土自病病在肌肉小便自利是津液越出故燥土受病病在胃也客曰病在太陰同是小便自利至七八日暴煩下利者仍為太陰病大便鞕者轉為陽明病其始則同其終則異何也曰陰陽異位陽道實陰道虛故脾家實則腐穢自去而從太陰之開胃家實則地道不通而成陽明之闔此其別也右論他經轉屬證問曰脈有陽結陰結何以別之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反鞕名曰陰結也期十四日當劇脈以浮為陽為在表數為熱為在府沉為陰為在裏遲為寒為在藏證以能食者為陽為內熱不能食者為陰為中寒身輕者為陽重者為陰不大便者為陽自下利者為陰此陽道實陰道虛之定局也然陽證亦有自下利者故陰證亦有大便有者實中有虛虛中有實又陰陽更盛更虛之義故胃實因於陽邪者為陽結有因於陰邪者名陰結耳然陽結能食而不大便陰結不能食而能大便何以故人身腰以上為陽腰以下為陰陽結則陰病故不大便陰結則陽病故不能食此陽勝陰病陰勝陽病之義也凡三候為半月半月為一節凡病之不及太過斯皆見矣能食不大便者是但納不輸為太過十七日劇者陽主進又合乎陽數之奇也不能食而硬便仍去者是但輸不納為不足十四日劇者陰主退亦合乎陰數之偶也脈法曰計其餘命生死之期期以月節剋之內經曰能食者過期不能食者不及期此之謂也此條本為陰結發論陽結即是胃實為陰結作伴耳陰結無表證當屬之少陰不可以身重不能食為陽明應有之證沉遲為陽明當見之脈大便鞕為胃家實而不敢用溫補之劑也且陰結與固瘕穀疸有別彼溏而不便是虛中有實此鞕而有便是實中有虛急須用參附以回陽勿淹留期至而不救右論陰陽結證陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈浮無汗而喘者發汗則愈宜麻黃湯此陽明之表證表脈也二證全同太陽而屬之陽明者不頭項強痛故也要知二方專為表邪而設不為太陽而設見麻黃證即用麻黃湯見桂枝證即用桂枝湯不必問其為太陽陽明也若惡寒一罷則二方所必禁矣陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出上條脈證與太陽相同此條脈證與太陽相殊此陽明半表半裏之脈證麻桂下咽陽盛則斃耳故善診者必據證辨脈勿據脈談證全注解見本篇之前脈浮而遲面熱赤而戰惕者六七日當汗出而解遲為無陽不能作汗其身必癢也此陽明之虛證虛脈也邪中於面而陽明之陽上奉之故面熱而色赤陽併於上而不足於外衛寒邪切膚故戰惕耳此脈此證欲其惡寒自止於二日間不可得矣必六七日胃陽來復始得汗出溱溱而解所以然者汗為陽氣遲為陰脈無陽不能作汗更可以身癢驗之此又當助陽發汗者也陽明病法多汗反無汗其身如蟲行皮膚中此久虛故也陽明氣血俱多故多汗其人久虛故反無汗此又當益津液和營衛使陰陽自和而汗出也陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛小便利則裏無瘀熱可知二三日無身熱汗出惡熱之表而即見嘔咳之裏似乎熱發乎陰更手足厥冷又似病在三陰矣若頭痛又似太陽之陰證然頭痛必因咳嘔厥逆則頭痛不屬太陽咳嘔厥逆則必苦頭痛是厥逆不屬三陰斷乎為陽明半表半裏之虛證也此胃陽不敷布於四肢故厥不上升於額顱故痛緣邪中於膺結在胸中致嘔咳而傷陽也當用瓜蒂散吐之嘔咳止厥痛自除矣兩者字作時字看更醒陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛不惡寒頭不痛但眩是陽明之表已罷能食而不嘔不厥但咳乃是咳為病本也咽痛因於咳頭眩亦因於咳此邪結胸中而胃家未實也當從小柴胡加減法陽明病口燥但欲漱水不欲咽者此必衄脈浮發熱口乾鼻燥能食者則衄此邪中於面而病在經絡矣液之與血異名而同類津液竭血脈因之而亦傷故陽明主津液所生病亦主血所生病陽明經起於鼻繫於口齒陽明病則津液不足口鼻乾燥陽盛則陽絡傷故血上溢而為衄也口鼻之津枯涸故欲漱水不欲咽者熱在口鼻未入乎內也能食者胃氣強也以脈浮發熱之證而見口乾鼻燥之病機如病在陽明更審其能食不欲咽水之病情知熱不在氣分而在血分矣此問而知之也按太陽陽明皆多血之經故皆有血證太陽脈當上行營氣逆不循其道反循巔而下至目內眥假道於陽明自鼻額而出鼻孔故先目瞑頭痛陽明脈當下行營氣逆而不下反循齒環唇而上循鼻外至鼻額而入鼻故先口燥鼻乾異源而同流者以陽明經脈起於鼻之交頞中旁納太陽之脈故也二條但言病機不及脈法主治宜桃仁承氣犀角地黃輩右論陽明在表脈證傷寒四五日脈沉而喘滿沉為在裏而反發其汗津液越出大便為難表虛裏實久則譫語喘而胸滿者為麻黃證然必脈浮者病在表可發汗今脈沉為在裏則喘滿屬於裏矣反攻其表則表虛故津液大泄喘而滿者滿而實矣因轉屬陽明此譫語所由來也宜少與調胃汗出為表虛然是陪話歸重只在裏實發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死上條論譫語之由此條論譫語之脈亡陽即津液越出之互辭心之液為陽之汗脈者向之府也心主血脈汗多則津液脫營血虛故脈短是營衛不行藏府不通則死矣此譫語而脈自和者雖津液妄泄而不甚脫一惟胃實而營衛通調是脈有胃氣故不死此下歷言譫語不因於胃者譫語直視喘滿者死下利者亦死上條言死脈此條言死證蓋譫語本胃實而不是死證若譫語而一見虛脈虛證則是死證而非胃家實矣藏府之精氣皆上注於目目不轉睛不識人藏府之氣絶矣喘滿見於未汗之前為裏實見於譫語之時是肺氣已敗呼吸不利故喘而不休脾家大虛不能為胃行其津液故滿而不運若下利不止是倉廩不藏門戶不要也與大便難而譫語者天淵矣夫實則譫語虛則鄭聲鄭聲重語也同一譫語而有虛實之分邪氣盛則實言雖妄誕與發狂不同有莊嚴狀名曰譫語正氣奪則虛必目見鬼神故鄭重其語有求生求救之狀名曰鄭聲此即從譫語中分出以明譫語有不因胃實而發者更釋以重語二字見鄭重之謂而非鄭重之音也若造字出於喉中與語多重復叮嚀者不休等義誰不知其虛仲景烏庸辨陽明病下血譫語者此為熱入血室但頭汗出者刺期門其隨實而瀉之濈然汗出則愈血室者肝也肝為藏血之臟故稱血室女以血用事故下血之病最多若男子非損傷則無下血之病惟陽明主血所生病其經多血多氣行身之前鄰於衝任陽明熱盛侵及血室血室不藏溢出前陰故男女俱有是證血病則魂無所歸心神無主譫語必發要知此非胃實因熱入血室而肝實也肝熱心亦熱熱傷心氣既不能主血亦不能作汗但頭有汗而不能遍身此非汗吐下法可愈矣必刺肝之募引血上歸經絡推陳致新使熱有所泄則肝得所藏心得所主魂有所歸神有所依自然汗出周身血不妄行譫語自止矣按畜血便膿血總是熱入血室入於腸胃從肛門而下者謂之便血膿血蓋女子經血出子戶與溺道不同門男子精血溺三物內異道而外同門精道由腎血道由肝水道由膀胱其源各別而皆出自前陰期門肝之募也又足太陰厥陰陰維之會太陰陽明為表裏厥陰少陽為表裏陽病治陰故陽明少陽血病皆得刺之婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之人之十二經脈應地之十二水故稱血為經水女子屬陰而多血脈者血之府也脈以應月故女子一月經水溢出應時而下故人稱之為月事也此言婦人適於經水來時中於風邪發熱惡寒此時未慮及月事矣病從外來先解其外可知至七八日熱除身涼脈遲為愈乃反見胸脅苦滿而非結胸反發譫語而非胃實何也脈遲故也遲為在藏必其經水適來時風寒外來內熱乘肝月事未盡之餘其血必結當刺其募以瀉其結熱滿自消而譫語自止此通因塞用法也婦人傷寒發熱經水適來晝則明了暮則譫語如見鬼狀此為熱入血室無犯胃氣及上下焦必自愈前言中風此言傷寒者見婦人傷寒中風皆有熱入血室證也然此三條皆因譫語而發不重在熱入血室更不重在傷寒中風要知譫語多有不因於胃者不可以譫語為胃實而犯其胃氣也發熱不惡寒是陽明病申酉譫語疑為胃實若是經水適來固知熱入血室矣此經水未斷與上條血結不同是肝虛魂不安而妄見本無實可瀉固不得妄下以傷胃氣亦不得刺之令汗以傷上焦之陽刺之出血以傷下焦之陰也俟其經盡則譫語自除而身熱自退矣當以不治治之熱入血室寒熱如瘧而不譫語者入柴胡證右論陽明譫語脈證陽明脈證下陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也本條無目疼鼻乾之經病又無尺寸俱長之表脈微喘惡寒脈浮而緊與太陽麻黃證同口苦咽乾又似太陽少陽合病更兼腹滿又似太陽太陰兩感他經形證互呈本經形證未顯何以名為陽明中風耶以無頭項強痛則不屬太陽不耳聾目赤則不屬少陽不腹痛自利則不關太陰是知口為胃竅咽為胃門腹為胃室喘為胃病矣今雖惡寒二日必止脈之浮緊亦潮熱有時之候也此為陽明初病在裏之表津液素虧故有是證若以腹滿為胃實而下之津液既竭腹更滿而小便難必大便反易矣此中風轉中寒胃實轉胃虛初能食而致反不能食之機也傷寒中風但見有柴胡一證便是則口苦咽乾當從少陽證治脈浮而緊者當曰弦矣陽明中風脈弦浮大而短氣腹部滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈弦浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治本條不言發熱看中風二字便藏表熱在內外不解即指表熱而言即暗伏內已解句病過十日是內已解之互文也當在外不解句上無餘證句接外不解句來刺之是刺足陽明隨其實而瀉之少差句言內能俱減但外證未解耳非刺耳前後其腫少差之謂也脈弦浮者向之浮大減小而弦尚存是陽明之脈證已罷惟少陽之表邪尚存故可用小柴胡以解外若脈但浮而不弦大則非陽明少陽脈無餘證則上文諸證悉罷是無陽明少陽證惟太陽之表邪未散故可與麻黃湯以解外所以然者以陽明居中其風非是太陽轉屬即是少陽轉刺兩陽相熏灼故病過十日而表熱不退也無餘證可憑只表熱不解法當憑脈故弦浮者可知少陽轉屬之遺風但浮者是太陽轉屬之餘風也若不尿腹滿加噦是接耳前後腫來此是內不解故小便難者竟至不尿腹部滿者竟不減時時噦者更加噦矣非刺後所致亦非用柴胡麻黃後變證也太陽主表故中風多表證陽明主裏故中風多裏證弦為少陽脈耳前後脅下為少陽部陽明中風而脈證兼少陽者以膽為風府故也若不兼太陽少陽脈證只是陽明病而不名中風矣參看口苦咽乾知陽明中風從少陽轉屬者居多本條多中風而不言惡風亦不言惡熱要知始雖惡寒二日自止風邪未解故不惡熱是陽明中風與太少不同而陽明過經留連不解之風亦與本經初中迥別也右論陽明中風證陽明病若能食名中風不能食名中寒太陽主表病情當以表辨陽明主裏證雖在表病情仍以裏辨此不特以能食不能食別風寒更以能食不能食審胃家虛實也要知風寒本一體隨人胃氣而別此條本為陽明初受表邪先辨胃家虛實為診家提綱使其著眼處不是為陽明分中風傷寒之法也陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初鞕後溏所以然者以胃中冷水穀不別故也胃實則中熱故能消穀胃虛則中寒故不能食陽明以胃實為病根更當以胃寒為深慮耳凡身熱汗出不惡寒反惡熱稱陽明病今但手足汗出則津液之泄於外者尚少小便不利則津液不泄於下陽明所慮在亡津液此更慮其不能化液矣固瘕即初鞕後溏之謂肛門雖固結而腸中不全乾也溏即水穀不別之象以癥瘕作解者謬矣按大腸小腸俱屬於胃欲知胃之虛實必於二便驗之小便利屎定鞕小便不利必大便初硬後溏今人但知大便硬大便難不大便者為陽明病亦知小便難小便不利小便數少或不尿者皆陽明病乎陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦初受病便不能食知其人本來胃虛與中有燥屎而反不能食者有別也噦為胃病病深者其聲噦矣若胃中虛冷不能食者飲水則噦要知陽明病不能食者雖身熱惡熱而不可攻其熱不能食便是胃中虛冷用寒以徹表熱便是攻非指用承氣也傷寒治陽明之法利在攻仲景治陽明之心全在未可攻故諄諄以胃家虛實相告耳陽明病脈遲腹滿食難用飽飽則微煩頭眩必小便難此欲作穀疸雖下之腹滿如故所以然者脈遲故也陽明脈浮而弦大為中風若脈遲為中寒為無陽矣食難用飽因於腹滿腹滿因於小便難煩眩又因於食飽耳食入於胃濁氣歸心故煩虛陽不能化液則清中清者不上升故食穀則頭眩濁中清者不下輸故腹滿而小便難胃脘之陽不達於寸口故脈遲也金匱曰穀氣不消胃中苦滿濁氣下流小便不通身體盡黃名曰穀疸當用五苓散調胃利水而反用茵陳湯下之腹滿不減而除中發噦所由來矣所以然者蓋遲為在藏脾家實則腐穢自去食難用飽者脾不磨也下之則脾家愈虛不化不出故腹滿如故傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死凡首揭陽明病者必身熱汗出不惡寒反惡熱也此言傷寒則惡寒可知言徹其熱則發熱可知脈遲為無陽不能作汗必服桂枝湯啜稀熱粥冷汗生於穀耳黃芩湯本為協熱下利而設不為脈遲表熱而設今不知脈遲為裏寒但知清表之餘熱熱去寒起則不能食者為中寒反能食者為除中矣除中者胃陽不支假穀氣以自救凡人將死而反強食者是也陽明病初欲食小便反不利大便自調其人骨節疼翕然如有熱狀奄然狂發濈然汗出而解者此水不勝穀氣與汗共併脈緊則愈初欲食則胃不虛冷小便不利是水氣不宣矣大便反調胃不實可知骨節疼者濕流關節也翕翕如有熱而不甚熱者燥化不行而濕在皮膚也其人胃本不虛因水氣怫鬱鬱極而發故忽狂汗生於穀濈然汗出者水氣與穀氣併出而為汗也脈緊者對遲而言非緊則為寒之謂若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解初能食至六七日陽氣來復之時反不欲食是胃中寒冷因水停而然名曰晚發因固瘕穀疸等為未除也食自可則胃陽已復故欲解傷寒大吐大下之極虛復極汗者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中虛冷故也陽明居中或亡其津而為實或亡其津而為虛皆得轉為陽明其傳為實者可下其傳為虛者當溫矣右論陽明中寒證陽明病欲解時從申至戍止申酉為陽明主時即日晡也凡稱欲解者俱指表而言如太陽頭痛自止惡寒自罷陽明則身不熱不惡熱也右論陽明病解時梔子豉湯證陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒而譫語若加燒針心怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之脈證與陽明中風同彼以惡寒故名中風此反惡熱故名陽明病陽明主肌肉熱甚無津液以和之則肉不和故身重此陽明半表裏證也邪已入腹不在營衛之間脈雖浮不可為在表而發汗脈雖緊不可以身重而加溫針胃家初實尚未燥硬不可以喘滿惡熱而攻下若妄汗之則腎液虛故躁心液亡故昏昧而憒憒胃無津液故大便燥硬而譫語也若謬加溫針是以火濟火故心恐懼而怵惕土水皆因火侮故煩躁而不得眠也陽明中風病在氣分不可妄下此既見胃實之證下之亦不為過但胃中以下而空虛喘滿汗出惡熱身重等證或罷而邪之客上焦者必不因下除故動於隔而心中懊憹不安也病在陽明以妄汗為重妄下為輕舌上胎句頂上四段來不惡反惡皆由心主憒憒怵惕懊憹之象皆心病所致故當以舌驗之舌為心之外候心熱之微甚與胎之厚薄色之淺深為可徵也梔子豉湯主之是總結上四段症要知本湯是胃家初受雙解表裏之方不只為誤下後立法蓋陽明初病不全在表不全在裏諸證皆在裏之半表間汗下溫針皆在所禁將何以治之惟有吐之一法為陽明表邪之出路耳然病在胸中宜瓜蒂散此已在腹中則瓜蒂散不中與也梔子豉湯主之外而自汗惡熱身重可除內而喘滿咽乾口苦自解矣陽明之有梔豉湯猶太陽之有桂枝湯既可以驅邪亦可以救誤上焦得通津液得下胃氣因和耳若渴欲飲水口乾舌燥者白虎加人參湯主之上文是陽邪自表入裏此條則自淺入深之證也咽燥口苦惡熱熱雖在裏尚未犯心憒憒怵惕懊憹雖入心尚不及胃燥渴欲飲是熱已入胃尚未燥硬用白虎加人參湯瀉胃火而扶元氣全不涉汗吐下三法矣若脈浮發熱渴欲飲水小便不利者豬苓湯主之上條根首條諸證此條又根上文飲水來連用五若字見仲景說法禦病之詳梔豉湯所不及者白虎湯繼之白虎湯不及者豬苓湯繼之此陽明起手之三法所以然者總為胃家惜津液既不肯令胃燥亦不肯令水漬入胃耳餘義見豬苓湯證發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之虛煩是陽明之壞病便從梔子湯隨證治之猶太陽壞病多用桂枝湯加減法也以吐易溫針以懊憹概憒憒怵惕可互文見意梔豉湯本為治煩躁設又可以治虛煩以此治陽明之虛與太陽之虛不同陽明之煩與太陽之煩有別矣首句雖兼汗吐下而大意單指下後言以陽明病多誤在早下故也反覆顛倒四字切肖不得眠之狀為虛煩二字傳神此火性愮動心無依著故也心居胃上即陽明之表凡心病皆陽明表邪故制梔豉湯因而越之蓋太陽之表當汗而不當吐陽明之表當吐而不當汗太陽之裏當利小便而不當下陽明之裏當下而不當利小便今人但知汗為解表不知吐亦為解表故於仲景大法中但知汗下而遺其吐法耳若少氣若嘔又從虛煩中分出煩必傷氣加甘草以益氣虛熱相搏必欲嘔加生薑以散邪發汗若下之而發煩熱胸中窒者梔子豉湯主之窒者痞塞之謂煩為虛煩則熱亦虛熱窒亦虛窒矣此熱傷君主心氣不足而然梔豉治之是益心之陽寒亦通行之謂歟誤下後痞不在心下而在胸中故仍用梔豉與太陽下後外不解者仍用桂枝同法蓋病不變則方不可易耳下後更煩按之心下濡者為虛煩也宜梔子豉湯更煩是既解而復煩也心下軟對胸中窒而言與心下反硬者懸殊矣要知陽明虛煩對胃家實熱而言是空虛之虛不是虛弱之虛陽明病下之其外有熱手足溫不結胸心中懊憹饑不能食但頭汗出者梔子豉湯主之外有熱是身熱未除手足溫尚未濈然汗出此猶未下前證見不當早下也不結胸是心下無水氣知是陽明之燥化心中懊憹是上焦之熱不除饑不能食是邪熱不殺穀但頭汗出而不發黃者心火上炎而皮膚無水氣也此指下後變證夫病屬陽明本有可下之理然外證未除下之太早胃雖不傷而上焦火鬱不達仍與梔子豉湯吐之心清而內外自和矣傷寒五六日大下後身熱不去心中結痛者未欲解也梔子豉湯主之病發於陽而反下之外熱未除心中結痛雖輕於結胸而甚於懊憹矣結胸是水結胸脅用陷胸湯水鬱則折之也此乃熱結心中用梔豉湯火鬱則發之也梔子豉湯梔子十四枚香豉四合綿裹右二味以水四升先煮梔子得二升半內豉煮取升半去渣分為二服溫進一服得吐止後服梔子甘草豉湯本方加甘草二兩餘同前法梔子生薑豉湯本方加生薑五兩餘同前法此陽明半表半裏湧泄之劑也少陽之半表是寒半裏是熱而陽明之熱自內達外有熱無寒其外證身熱汗出不惡寒反惡熱身重或目疼鼻乾不得臥其內證咽燥口苦舌胎煩躁渴欲飲水心中懊憹腹滿而喘此熱半在表半在裏也脈雖浮緊不得為太陽病非汗劑所宜又病在胸腹而未入胃府則不當下法當湧吐以發散其邪梔子苦能泄熱寒能勝熱其形象心又赤色通心故除心煩憒憒懊憹結痛等症豆形象腎製而為豉輕浮上行能使心腹之邪上出於口一吐而心腹得舒表裏之煩熱悉除矣所以然者二陽之病發心脾已上諸證是心脾熱而不是胃家熱即本論所云有熱屬藏者攻之不令發汗之謂也若夫熱傷氣者少氣加甘草以益氣虛熱相搏者多嘔加生薑以散邪梔豉湯以梔配豉瓜蒂散以赤豆配豉皆心腎交合之義傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之攻裏不遠寒用丸藥大下之寒氣留中可知心微煩而不懊憹則非吐劑所宜也用梔子以解煩倍乾薑以逐內寒而散表熱寒因熱用熱因寒用二味成方而三法備矣傷寒下後心煩腹滿起臥不安者梔子厚朴湯主之心煩則難臥腹滿則難起起臥不安是心移熱於胃與反覆顛倒之虛煩不同梔子以治煩枳朴以泄滿此兩解心腹之妙劑也熱已入胃則不當吐便未燥硬則不可下此為小承氣之先著梔子乾薑湯梔子十四枚乾薑二兩右二味以水三升煮取一升半去渣分二服溫進一服梔子厚朴湯梔子十四枚厚朴四兩枳實餘同前法夫梔子之性能屈曲下行不是上湧之劑惟豉之腐氣上熏心肺能令人吐耳觀似蒂散必用豉汁和劑服是吐在豉而不在梔也此梔子乾薑湯法豉用薑是取其橫散梔子厚朴湯以枳朴易豉是取其下泄皆不欲上越之義舊本兩方後概云得吐止後服豈不謬哉觀梔子柏皮湯與茵陳湯中俱有梔子俱不言吐又病人舊微溏者不可與則梔子之性自明傷寒身去發黃者梔子柏皮湯主之身熱汗出為陽明病若寒邪太重陽氣怫鬱在表亦有汗不得出熱不得越而發黃者矣黃為土色胃火內熾津液枯涸故黃見於肌肉之間與太陽誤下寒水留在皮膚者迥別非汗吐下三法所宜也必須苦甘之劑以調之梔柏甘草皆色黃而質潤梔子以治內煩柏皮以治外熱甘草以和中氣形色之病仍假形色以通之神乎神矣梔子柏皮湯梔子十五枚甘草二兩黃柏右三味以水四升煮取一升半去渣分溫再服陽明病無汗小便不利心中懊憹者身必發黃陽明病法多汗反無汗則熱不得越小便不利則熱不得降心液不支故雖未經汗下而心中懊憹也無汗小便不利是發黃之原心中懊憹是發黃之兆然口不渴腹不滿非茵陳湯所宜與梔子柏皮湯黃自解矣陽明病被火額上微汗出而小便不利者必發黃陽明無表證不當發汗況以火劫乎額為心部額上微汗心液竭矣心虛腎亦虛故小便不利而發黃非梔子柏皮湯何以挽津液於涸竭之餘耶陽明病面合赤色不可下之必發熱色黃小便不利也面色正赤者陽氣怫鬱在表當以汗解而反下之熱不得越故復發熱而赤轉為黃也上條因於火逆此條因於妄下前以小便不利而發黃此條先黃而小便不利總因津液枯涸不能通調水道而然須梔子柏皮滋化源而致津液非滲泄之劑所宜矣黃未發宜梔子豉湯已黃宜梔子柏皮湯仲景治太陽發黃有二法但頭汗出小便不利者麻黃連翹湯汗之少腹硬小便自利者抵當湯下之治陽明發黃二法但頭汗小便不利腹滿者茵陳大黃以下之身熱發黃與誤治而致者梔子柏皮以清之總不用滲泄之劑要知仲景治陽明重在存津液不欲利小便惟恐胃中燥耳所謂治病必求其本凡用梔子湯病人舊微溏者不可與服之向來胃氣不實即梔子亦禁用用承氣者可不慎之歟瓜蒂散證病如桂枝證頭不痛項不強寸脈微浮胸中痞鞕氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散病如桂枝是見發熱汗出惡風鼻鳴乾嘔等證頭不痛項不強則非太陽中風未經汗下而胸中痞硬其氣上衝便非桂枝證矣病機在胸中痞硬便當究痞硬之病因思胸中痞硬之治法矣胸中者陽明之表也邪中於面則入陽明中於膺亦入陽明則鼻鳴發熱汗出惡風者是邪中於面在表之表也胸中痞硬氣上衝不得息者邪中膺在裏之表也寒邪結而不散胃陽抑而不升故成此痞象耳胃者土也土生萬物不吐者死必用酸苦湧泄之味因而越之胃陽得升胸寒自散裏之表和表之表亦解矣此瓜蒂散為陽明之表劑病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當吐之宜瓜蒂散手足為諸陽之本厥冷則胃陽不達於四肢緊則為寒乍緊者不厥時不緊言緊與厥相應也此寒結胸中之脈證心下者胃口也滿者胃氣逆煩者胃火盛火能消物故飢寒結胸中故不能食此陰併於上陽併於下故寒傷形熱傷氣也非汗下溫補之法所能治必瓜蒂散吐之此塞因通用法又寒因寒用法上條是陽明中風脈證此條是陽明傷寒脈證上條是陽明小結胸此條是陽明大結胸太陽結胸因熱入硬滿而痛為有形故製大陷胸下之陽明結胸因寒塞硬滿不痛為無形故製瓜蒂散吐之少陰證飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當溫之宜四逆湯欲吐而不吐者少陰虛證此飲食入口即吐非胃寒矣心下溫即欲吐溫止則不欲吐矣復不能吐者寒氣在胸中似有形而實無形非若飲食有形而可直拒之也此病升而不降宜從高者抑之之法下之則愈矣而不敢者以始得病時手足寒脈弦遲疑其為寒今以心下溫證之此為熱實然實不在胃而在胸中則不可下也當因其勢而利導之不出高者越之之法然病在少陰嘔吐多屬於虛寒最宜細究若膈上有寒飲與心下溫者不同而反乾嘔者與飲食即吐者不同矣瓜蒂散不中與也氣上衝滿而煩心下溫皆是瓜蒂散作眼處手足寒脈弦遲有心溫膈寒二證須著眼瓜蒂散赤小豆瓜蒂熬黃各一分二味各別搗篩為散合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去渣取汁和散溫頓服不吐少少加得快吐乃止諸亡血虛家不可與之瓜為甘果曲熱於長夏清胃熱者也其蒂瓜之生氣所繫也色青味苦象東方甲木之化得春升生發之機故能提胃中之氣除胸中實邪為吐劑中第一品藥故必用穀氣以和之赤小豆甘酸下行而止吐取為反佐制其太過也香豉本性沉重糜熟而使輕浮苦甘相濟引陽氣以上升驅陰邪而外出作為稀糜調二散雖快吐而不傷神仲景製方之精義赤豆為心穀而主降香豉為腎穀而反升既濟之理也太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也此為小逆一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也言太陽病頭項強痛可知今自汗出而不惡寒發熱疑非桂枝證以脈辨之關上者陽明脈位也細數而不洪大雖自汗而不惡熱則不是與陽明併病不口乾煩滿而自汗出是不與少陰兩感原其故乃庸醫妄吐之所致也吐後惡寒發熱之表雖除而頭項強痛仍在則自汗為表虛脈細數為裏熱也此其人胃氣未傷猶未至不能食尚為小逆其誤吐而傷及胃氣者更當計日以辨之若一二日間熱正在表當汗解而反吐之寒邪乘虛入胃故饑不能食三四日間熱發於裏當清解而反吐之胃陽已亡故不喜穀食而反喜瓜果是除中也邪熱不化物故朝食暮吐生意盡矣此為大逆按三陽皆受氣於胸中在陽明以胸為表吐之陽氣得宣故吐中便寓發散之意太陽以胸為裏故有乾嘔嘔逆之證而不可吐吐之則傷胃而為逆少陽得胸中之表故亦有喜嘔證吐之則悸而驚矣太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也上條因吐而亡胃脘之陽此因吐而傷膻中之陰前條見其人之胃虛此條見其人之陽盛前條寒入太陰而傷脾精此條熱入陽明而成胃實皆太陽妄吐之變證是瓜蒂散所禁不特亡血虛家也白虎湯證傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之白虎湯治結熱在裏之劑先示所禁後明所用見白虎為重則不可輕用也脈浮發熱無汗麻黃證尚在即是表不解更兼渴欲飲水又是熱入裏此謂有表裏證當用五苓多服暖水發汗矣若外熱已解是無表證但渴欲飲水是邪熱內攻熱邪與元氣不兩立急當救裏故用白虎加人參以主之若表不解而妄用之熱退寒起亡可立待矣服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之前條詳證此條詳脈全注見桂枝篇傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之傷寒六七日無大熱其人躁煩為陽去入陰此雖不躁而口渴心煩陽邪入裏明矣無大熱指表言見微熱猶在背微惡寒見惡寒將罷此雖有表裏證而表邪已輕裏熱已甚急與白虎加人參湯裏和而表自解矣傷寒若吐若下得七八日不解熱結在裏表裏俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加入參湯主之傷寒七八日尚不解者當汗不汗反行吐下是治之逆也吐則津液亡於上下則津液亡於下表雖不解熱已入於裏矣太陽主表陽明主裏表裏俱熱是兩陽併病也惡風為太陽表證未罷然時時惡風則有時不惡表將解矣與背微惡寒同煩躁舌乾大渴為陽明證欲飲水數升裏熱罷而不散急當救裏以滋津液裏和表亦解故不須兩解之法陽明病若渴欲飲水口乾舌燥者白虎加人參湯主之白虎所治皆陽明燥證揭為陽明主方信為有見三陽合病腹滿身重難以轉側口不仁而面垢遺尿發汗則譫語下之則額上汗出手足冷若自汗出者白虎湯主之此本陽明病而略兼太少也胃氣不通故腹滿陽明主肉無氣以動故身重難以轉側者少陽行身之側也口者胃之門戶胃氣病則津液不能上行故不仁陽明則顏黑少陽病面微有塵陽氣不榮於面故垢膀胱不約為遺溺遺溺者太陽本病也雖三陽合病而陽明證多則當獨取陽明矣無表證則不宜汗胃未實則不當下此陽明半表裏證也裏熱而非裏實故當用白虎而不當用承氣若妄汗則津竭而譫語誤下則亡陽而額汗出手足厥也此自汗出為內熱甚者言耳接遺尿句來若自汗而無大煩大渴證無洪大浮滑脈當從虛治不得妄用白虎若額上汗出手足冷者見煩渴譫語等證與洪滑之脈亦可用白虎湯三陽合病脈浮大在關上但欲睡眠合目則汗上條言病狀及治方此條詳病脈探病情究病機必兩條合參而合病之大要始得脈大為陽關上陽所治也是為重陽矣但欲睡眠是陽入於陰矣合目則衛氣行陰而兼汗出熱淫於內矣與上文自汗同此少陰脈微細而但欲寐不同傷寒脈浮滑此表有熱裏有邪白虎湯主之此條論脈而不及證因有白虎湯證而推及其脈也勿只據脈而不審其證脈浮而滑為陽陽主熱內經云脈緩而滑曰熱中是浮為在表滑為在裏舊本作裏有寒者誤此雖表裏並言而重在裏熱所謂結熱在裏表裏似熱者也傷寒脈滑而厥者裏有熱也白虎湯主之脈微而厥為寒厥脈滑而厥為熱厥陽極似陰之證全憑脈以辨之然必煩渴引飲能食而大便難乃為裏有熱也白虎湯石膏一斤碎綿裏知母六兩甘草二兩粳米六合水一斗米熟湯成溫服一升日三服白虎加人參湯石膏一斤碎綿裏知母六兩甘草二兩粳米六合人參三兩水一斗煮米熟湯成溫服一升日三服經曰火生苦又曰以苦燥之又曰味過於苦脾氣不濡胃氣乃厚以是知苦從火化火能生土則土燥火炎非苦寒之味所能治矣經曰甘先入脾又曰以甘瀉之又曰飲入於胃輸精於脾上歸於肺水精四布五經並行以是知甘寒之品乃瀉胃火生津液之上劑也石膏大寒寒能勝熱味甘歸脾質剛而主降備中土生金之體色白通肺質重而含脂具金能生水之用故以為君知母氣寒主降苦以泄肺火辛以潤肺燥內肥白而外皮毛肺金之象生水之源也故以為臣甘草皮赤中黃能土中瀉火為中宮舟楫寒藥得之緩其寒用此為佐沉降之性亦得留連於脾胃之間矣粳米稼穡作甘氣味溫和稟容平之德為後天養命之資得此為佐陰寒之物則無傷損脾胃之慮也煮湯入胃輸脾歸肺水精四布大煩大湯可除矣白虎為西方金神用以名湯者秋金得令而暑清陽解此四時之序也更加人參以補中益氣而生津協和甘草粳米之補承制石膏知母之寒瀉火而火不傷乃操萬全之術者茵陳湯證陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還腹滿小便小利渴飲水漿此為瘀熱在裏身必發黃茵陳蒿湯主之陽明多汗此為裏實表虛反無汗是表裏俱實矣表實則發黃裏實則腹滿但頭汗出小便不利與麻黃連翹證同然彼屬太陽因誤下而表邪未散熱雖裏而未深故口不渴腹不滿仍當汗解此屬陽明未經汗下而津液已亡故腹滿小便不利渴欲飲水此瘀熱在裏非汗吐所宜矣身無汗小便不利不得用白虎瘀熱發黃內無津液不得用五苓故製茵陳湯以佐梔子承氣之所不及也但頭汗則身黃而面目不黃若中風不得汗則一身及面目悉黃以見發黃是津液所生病傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之傷寒七八日不解陽氣重也黃色鮮明者汗在肌肉而不達也小便不利內無津液也腹微滿胃家實也調和二便此茵陳之職茵陳蒿湯茵陳蒿六兩梔子十四枚大黃一兩以水一斗先煮茵陳減六升內二味煮取三升去渣分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去茵陳稟北方之色經冬不凋受霜承雪故能除熱邪留結梔子以通水源大黃以調胃實令一身內外之瘀熱悉從小便出腹滿自減而津液無傷此茵陳湯為陽明利水之妙劑也傷寒發汗已身目為黃所以然者以寒濕在裏不解故也不可下於寒溼中求之發黃有因瘀熱者亦有因寒邪者有因於燥令者亦有因於濕化者則寒濕在裏與瘀熱在裏不同是非汗下清三法所可治矣傷寒固宜發汗發之而身目反黃者非熱不得越是發汗不如法熱解而寒濕不解也太陰之上濕氣主之則身自黃而面不黃以此知繫在太陰而非陽明病矣當溫中散寒而除濕於真武五苓輩求之承氣湯證傷寒不大便六七日不惡寒反惡熱頭痛身熱者與承氣湯受病後便不大便胃家實也至六七日而頭痛身熱不解足見陽氣之重其不惡寒反惡熱更可知矣此太陽陽明合病已合陽數之期而不愈者當知不大便之病為在裏不必拘頭痛身熱之表為未解也所謂陽盛陰虛汗之則死下之即愈可不知要害乎哉病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者下之與承氣湯煩熱自汗似桂枝證寒熱如瘧似柴胡證然日晡潮熱期屬陽明而脈已沉實確為可下是承氣主證主脈也當與不大便六七日互相發明太陽病三日發汗不解頭不痛項不強不惡寒反惡熱蒸蒸發熱者屬胃也調胃承氣湯主之病經三日已經發汗陽氣得泄則熱熱當解而內熱反熾與中風翕翕發熱不同必其人胃家素實曰發汗亡津液而轉屬陽明也三日正陽明發汗之期此太陽證已罷雖熱未解而頭不痛項不強不惡寒反惡熱可知熱已入胃便和其胃調胃之名以此日數不必拘要在脈證上講求發汗後惡寒者虛故也不惡寒反惡熱者實也當和胃氣與調胃承氣湯虛實俱指胃言汗後正氣奪則胃虛故用附子芍藥邪氣盛則胃實故用大黃芒硝此自用甘草是和胃之意此見調胃承氣是和劑而非下劑也若胃氣不和譫語者少與調胃承氣湯承者順也順之則和少與者即調之之法傷寒吐後腹脹滿者與調胃承氣湯妄吐而亡津液以致胃實而腹脹吐後上焦虛可知腹雖脹滿病在胃而不在胸當和胃氣而枳朴非其任矣陽明病不吐不下心煩者可與調胃承氣湯言陽明病則身熱汗出不惡寒反惡熱矣若吐下後而煩為虛邪宜梔子豉湯未經吐下而煩是胃火乘心從前來者為實邪調其胃而心自和此實則瀉子之法太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先其時極吐下者與調胃承氣湯過經不解十餘日病不在太陽矣仍曰太陽病者以此為太陽之壞病也心中不煩而心下溫腹中不痛而胸中痛是上焦因極吐而傷矣心下者胃口也心下溫溫時即欲吐胃口有遺熱腹微滿而鬱鬱時便微煩是胃家尚未虛胃中有燥屎矣大便當硬而反溏是下焦因極下而傷也欲吐而不得吐當利而不利總因胃氣不和大便溏而胃家仍實也少與調胃承氣湯微和之三焦得和矣傷寒十三日不解過經譫語者以有熱故也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微今反和者此為內實也調胃承氣湯主之經者常也過經是過其常度非經絡之經也發於陽者七日愈七日已上自愈以行其經盡故也七日不愈是不合陰陽之數便為過經非十三日不解為過經也凡表解而不了了者十二日愈此十三日而尚身熱不解便見其人之陽有餘過經而譫語足徵其人之胃家實此內外有熱自陽盛陰虛也當以承氣湯下之而醫以丸藥下之是因其病久不敢速下恐傷胃氣之意而實非傷寒過經之治法也下之不利今反下利疑為胃虛而身熱譫語未除非虛也凡下利者小便當不利者大便當硬今小便利而反下利疑為胃虛恐熱為協熱而語為鄭聲也當以脈別之諸微亡陽若胃虛而下利者脈當微今調和而不微是脈有胃氣胃實可知也是丸藥之沉遲利在下焦故胃實而腸虛調其胃則利自止矣上條大便反溏此條反下利從假不足處得其真實右論調胃承氣證太陽病若吐若下若發汗微煩小便數大便因鞕者小承氣湯和之愈此亦太陽之壞病轉屬陽明者也微煩小便數大便尚不當硬因妄治亡津液而硬也用小承氣和之潤其燥也此見小承氣亦和劑不是下劑得病二三日脈弱無太陽柴胡證煩躁心下鞕至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯得病二三日尚在三陽之界其脈弱恐為無陽之徵無太陽桂枝證無少陽柴胡證則病不在表而煩躁心下硬是陽邪入陰病在陽明之裏矣辨陽明之虛實在能食不能食若病至四五日尚能食則胃中無寒而便硬可知少與小承氣微和其胃令煩躁少安不竟除之者以其人脈弱恐大便之易動故也猶太陰脈弱當行大黃芍藥者減之之意至六日復與小承氣一升至七日仍不大便胃家實也欲知大便之燥硬既審其能食不能食又當問其小便之利不利而能食必大便硬後不能食是有燥屎小便少者恐津液還入胃中故雖不能食初頭硬後必溏小便利者胃必實屎定硬乃可攻之所以然者脈弱是太陽中風能食是陽明中風非七日後不敢下者以此為風也須過經乃可下之下之若早語言必亂正此謂也陽明病脈遲微汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然而汗出者此大便已鞕也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下脈遲而未可攻者恐為無陽恐為在藏故必表證悉罷裏證畢具方為下證若汗雖多而微惡寒是表證仍在此本於中風故雖大滿不通只可微和胃氣令小安勿使大泄過經乃可下耳胃實諸證以手足汗出為可據而潮熱尤為親切以四肢為諸陽之本而日晡潮熱為陽明主時也陽明病潮熱大便硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉矢氣者此有燥屎乃可攻之若不轉矢氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便硬而少也以小承氣湯和之不轉矢氣者慎不可攻也此必因脈之遲弱即潮熱尚不足據又立試法如胃無燥屎而攻之胃家虛脹故不能食雖復潮熱便硬而少者以矢後不能食故也要知不轉矢氣者即渴欲飲水尚不可與況攻下乎以小承氣為和即以小承氣為試仍與小承氣為和總是慎用大承氣耳陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉矢氣者更服一升若不轉矢氣者勿更與之明日不大便脈反微澀者裏虛也為難治不可更與承氣湯也脈滑而疾者有宿食也譫語潮熱下證具矣與小承氣試之不轉矢氣宜為易動明日而仍不大便其胃家似實而脈反微澀微則無陽澀則少血此為裏虛故陽證反見陰脈也然胃家未實陰脈尚多故脈遲脈弱者始可和而久可下陽脈而變為陰脈者不惟不可下更不可和脈滑者生脈澀者死故為難治然滑有不同又當詳明夫脈弱而滑是有胃氣此脈來滑疾是失其常度重陽必陰仲景早有成見故少與小承氣試之若據譫語潮熱而與大承氣陰盛已亡矣此脈證之假有餘小試之而即見真不足憑脈辨證可不慎哉宜蜜煎導而通之虛甚者與四逆湯陰得陽則解矣傷寒若吐下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語大承氣湯主之若一服利止後服壞病有微劇之分微者是邪氣實當以下解若一服利止後服只攻其實無乘其虛也劇者邪正交爭當以脈斷其虛實弦者是邪氣實不失為下證故生澀者是正氣虛不可更下故死如見鬼狀獨語與鄭聲譫語不同潮熱不惡寒不大便是可下證目直視不識人循衣摸床等證是日晡發熱時事不發時自安故勿竟斷為死證還將脈推之凡譫語脈短者死澀者短也短則氣病弦者長也長則氣治凡直視譫語喘滿者死此微喘而不滿只是氣之不承非氣之不治耳陽明病其人多汗以津液外出胃中燥大便必鞕鞕則譫語小承氣湯主之若一服譫語止更莫復服陽明主津液所生病故陽明病多汗多汗是胃燥之因便硬是譫語之根一服譫語止大便雖未利而胃濡可知矣下利譫語者有燥屎也宜小承氣湯下利是大腸虛譫語是胃氣實胃實腸虛宜大黃以濡胃無庸芒硝以潤腸也汗出譫語者以在燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂表虛裏實故也下之則愈宜大承氣湯首二句是冒頭末二句是總語言汗出必亡津譫語因胃實則汗出譫語以胃中有燥屎也宜大承氣湯下之然汗出譫語有二義有陽明本病多汗亡津而譫語者有中風汗出早下而譫語者如脈滑曰風其譫語潮熱下之與小承氣湯不轉矢氣勿更與之如能食曰風其煩躁心下硬少與小承氣微和之令小安非七日後屎定硬不敢妄下者以此為風也七日來行經已盡陽邪入陰乃可下之若不知此義而早下之表以早下而虛熱不解裏以早下而胃家不實如十三日不解過經下利而譫語與下後不解至十餘日不大便日晡潮熱獨語如見鬼狀者是也陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也宜大承氣湯下之若能食者但硬耳初能食反不能食胃實可知若能食而大便硬是腸實而胃未實恐本於中風未可下也譫語潮熱屎有燥硬之辨陽明病下之心中懊憹而煩胃中有燥屎者可攻之宜大承氣湯腹微滿初頭硬後必溏不可攻之下後心中懊憹而煩梔子豉證若腹大滿不通是胃中燥屎上攻也若微滿猶是梔子厚朴湯證病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故也發作有時是日晡潮去之時二腸附臍故繞痛痛則不通矣病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯小便不利故大便有乍易津液不得還入胃中故喘冒不得臥時有微熱即是潮熱大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者以本有宿食故也宜大承氣湯未病時本有宿食故雖大下之後仍能大實痛隨利減也脈滑而數者有宿食也當下之宜大承氣湯數為在府故滑為有食數以至數言是本來面目疾以體狀言在譫語潮熱時見故為失度腹滿不減減不足言當下之宜大承氣湯下後無變證則非妄下腹滿如故者下之未盡耳故當更下之也二陽併病太陽證罷但發潮熱手足濈濈汗出大便難而譫語者下之則愈宜大承氣湯太陽證罷是全屬陽明矣先揭二陽併病者見未罷時便有可下之證今太陽一罷則種種皆下證矣發汗不解腹滿痛者急下之宜大承氣湯表雖不解邪甚於裏急當救裏裏和而表自解矣陽明病發熱汗多者急下之宜大承氣湯前條若汗多微發熱惡寒者外未解也未可與承氣總為脈遲者言耳若脈大而不惡寒蒸蒸發熱汗多亡津者當急下以存津液而勿以潮熱為拘也傷寒六七日目中不了了睛不和無表裏證大便難身微熱者此為實也急下之宜大承氣湯傷寒七日不愈陽邪入陰矣目不了了目睛不和何以故身微熱是表證已罷不煩躁是裏證未見無表裏證也惟不大便為內實斯必濁邪上升陽氣閉塞下之而濁陰出下竅清陽走上竅矣少陰病得之二三日不大便口咽氣乾者急下之宜大承氣湯熱淫于內腎水枯涸因轉屬陽明胃火上炎故口燥咽乾急下之火歸于坎津液自升矣此必有大便證若非本有宿食何得二三日便當急下少陰病自利清水色純青心下必痛口乾舌燥者急下之宜大承氣湯自利而渴者屬少陰今自利清水疑其為寒矣而利清水時必心下痛必口燥舌乾是土燥火炎脾氣不濡胃氣反厚水去而穀不去故純青也雖曰通因通用仍是通因塞用少陰病六七日腹脹不大便者急下之宜大承氣湯六七日當解不解因轉屬陽明是藏氣實而不能入還之于府也急攻之所謂巳入于府者可下也三陽惟少陽無承氣證三陰惟少陰有承氣證蓋少陽為陽樞陽稍虛邪便入于陰故不可妄下以虛其陽少陰為陰樞陽有餘邪便傷其陰故宜急下以存其陰且少陽屬木邪在少陽惟畏其剋土故無下證少陰主水邪在少陰更畏有土制故當急下蓋真陰不可虛陽強不可縱也調胃承氣湯大黃三兩炙甘草一兩芒踃半斤右三味㕮咀以水三升煮取一升去渣內芒硝更上火微煮令沸少少溫服亢則害承乃制承氣所由名也不用枳朴而任甘草是調胃之義胃調則諸氣皆順故亦以承氣名之此方專為燥屎而設故芒硝分兩多于大承氣前輩見條中無燥屎字便云未燥堅者用之是未審之耳大承氣湯大黃四兩酒洗厚朴米斤枳實五枚炙芒硝三合水一斗先煮二物取五升去渣內大黃煮二升去渣再內芒硝上火微一二沸分溫再服得下餘勿服小承氣湯大黃四兩厚朴二兩去皮枳實三枚水四升煮取一升二合分溫三服初服湯當大便不爾者盡飲之若得大便勿服諸病皆因于氣穢物之不去由氣之不順也故攻積之劑必用氣分之藥故以承氣名湯分大小有二義焉厚朴倍大黃是氣藥為君味多性猛製大其服欲令大泄下也則黃倍厚朴是氣藥為臣味少性緩製小其服欲微和胃氣也前法更有妙義大承氣之先後作三次煎者何哉蓋生者氣鋭而先行熟者氣純而和緩欲使芒硝先化燥屎大黃繼通地道而後枳朴除其痞滿也若小承氣三物同煮不分次第只服四合但求地道之通而不用芒硝之峻且遠于大黃之鋭故稱微和之劑云少陽脈證少陽之為病口苦咽乾目眩也太陽主表頭項強痛為提綱陽明主裏胃家實為提綱少陽居半表半裏之位仲景特揭口苦咽乾目眩為提綱奇而至當也蓋口咽目三者不可謂之表又不可謂之裏是表之入裏裏之出表處所謂半表半裏也三者能開能闔開之可見闔之不見恰合樞機之象故兩耳為少陽經絡出入之地苦乾眩者皆相火上走空竅而為病也此病自內之外人所不知惟病人獨知診家所以不可無問法三證為少陽一經病機兼風寒雜病而言但見一證即是不必悉具傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而躁少陽初受寒邪病全在表故頭痛發熱與太陽同與五六日而往來寒熱之半表之不同也弦為春脈細則少陽初出之象也但見頭痛發熱而不見太陽脈證則弦細之脈斷屬少陽而不可作太陽治之矣少陽少血雖有表證不可發汗發汗則津液越出相火燥必胃實而譫語當與柴胡以和之上焦得通津液得下胃氣因和若加煩躁則為承氣證矣少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚少陽經絡縈于頭目循于胸中為風木之藏主相火風中其經則風動火炎是以耳聾目赤胸滿而煩也耳目為表之裏胸中為裏之表當用小柴胡雙解法或謂熱在上焦因而越之誤吐者有矣或謂釜底抽薪因而奪之誤下者有矣或謂火鬱宜發因而誤汗者有矣少陽主膽膽無出入妄行吐下津液重亡膽虛則心亦虛所生者受病故悸也膽虛則肝亦虛府病及藏故驚也上條汗後而煩因於胃實此未汗而煩虛風所為上條煩而躁病從胃來此悸而驚病迫心膽上條言不可發汗此言不可吐下互相發明非謂中風可汗而傷寒可吐下也此雖不言脈可知其弦而浮矣不明少陽脈證則不識少陽中風不辨少陽脈狀則不識少陽傷寒也傷寒三日少陽脈小者欲已也陽明受病當二三日發少陽受病當三四日發若三日脈大則屬陽明三日弦細則屬少陽小即細也若脈小而無頭痛發熱等證是少陽不受邪此即傷寒三日少陽證不見為不傳也少陽病欲解時從寅至辰上寅卯主木少陽始生即少陽主時也主氣旺則邪自解矣辰上者卯之盡辰之始也太陽與少陽併病脈弦頭項強痛或眩冒時如結胸心下痞鞕者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語若譫語不止當刺期門脈弦屬少陽頭項強痛屬太陽眩冒結胸心下痞則兩陽皆有之證兩陽併病陽氣重可知然是經脈之為青汗吐下之法非少陽所宜若不明刺法不足以言巧督主諸陽刺大椎以泄陽氣肺主氣肝主血肺肝二俞皆主太陽調其氣血則頭項強痛可除脈之弦者可和眩冒可清結胸痞硬等證可不至矣若發汗是犯少陽膽液虛必轉屬胃而譫語此譫語雖因胃實而兩陽之證未罷亦非下法可施也土欲實木當平之必肝氣清而水土治故刺期門而三陽自和太陽少陽併病心下頭項強而眩者當刺大椎肺俞肝俞慎勿下之太陽少陽併病而反下之成結胸心下鞕下利不止水漿不下其人心煩併病無結胸證但陽氣怫鬱於內時時若結胸狀耳併病在兩陽而反下之如結胸者成真結胸矣結胸法當下今下利不止水漿不入是陽明之闔病于下太陽之開病於上少陽之樞機無主其人心煩是結胸證具煩躁者死也柴胡湯證傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞鞕或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之此言非傷寒五六日而更中風也言往來寒熱有三義少陽自受寒邪陽氣衰少既不能退寒又不能發熱至五六日鬱熱內發始得與寒氣相爭而往來寒熱之一也若太陽受寒過五六日陽氣始衰陽氣始衰餘邪未盡轉屬少陽此往來寒熱之二也風為陽邪少陽為風藏一中於風便往來寒熱不必五六日而始見三也少陽脈循胸脅邪入其經故苦滿膽氣不舒故默默木邪犯土故不欲飲食相火內熾故心煩邪正相爭故喜嘔蓋少陽為樞不全主表不全主裏故六證皆在表裏之間仲景本意重半裏而柴胡所主又在半表故少陽證必見半表正宜柴胡加減如悉入裏則柴胡非其任矣故小柴胡稱和解表裏之主方寒熱往來病情見於外苦喜不欲病情得於內看喜苦欲等字非真嘔真滿不能飲食也看住來二字見有不寒熱時寒熱往來胸膈苦滿是無形之半表心煩喜嘔默默不欲飲食是無形之半裏雖然七證皆偏於裏惟微熱為在表皆屬無形惟心下悸為有形皆風寒通證惟脅下痞硬屬少陽總是氣分為病非有實可據故皆從半表半裏之治法血弱氣虛腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食藏府相連其痛不下邪高痛下故使嘔也此仲景自注柴胡證首五句釋胸脅苦滿之因正邪三句釋往來寒熱之義此下多有闕文故文理不連屬也小柴胡湯柴胡半斤半夏半斤人參甘草黃芩生薑各三兩大棗十三枚以水一斗二升煮取六升去渣再煎取三升溫服一升日三服若胸中煩而不嘔者去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半加栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂枝三兩溫服取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩柴胡感一陽之氣而生故能直入少陽引清氣上升而行春令為治寒熱往來之第一品藥少陽表邪不解必需之半夏感一陰之氣而生故能開結氣降逆氣除痰飲為嘔家第一品藥若不嘔而胸煩口渴者去之以其散水氣也黃芩外堅內空故能內除煩熱利胸膈逆氣腹中痛者是少陽相火為害以其苦從火化故易芍藥之酸以瀉之心下悸小便不利者以苦能補腎故易茯苓之淡以滲之人參甘草補中氣和營衛使正勝則邪卻內邪不留外邪勿復入也仲景於表證不用人參此因有半裏之無形證故用之以扶元氣使內和而外邪勿入也身有微熱是表未解不可補心中煩與咳是逆氣有餘不可益氣故去之如太陽汗後身痛而脈沉遲下後協熱利而心下硬是太陽之半表半裏證也表雖不解因汗下後重在裏故參桂兼用先輩論此湯轉旋在柴芩二味以柴胡清表熱黃芩清裏熱也盧氏以柴胡半夏得二至之氣而生為半表半裏之主治俱似有理然本方七味中半夏黃芩俱在可去之例惟不去柴胡甘草當知寒熱往來全賴柴胡解外甘草和中故大柴胡去甘草便另名湯不入加減法傷寒中風有柴胡證但見一證便是不必悉具柴胡為樞機之劑凡寒氣不全在表未全入裏者皆服之證不必悉具故方亦無定品嘔而發熱者小柴胡湯主之傷寒則嘔逆中風則乾嘔凡傷寒中風無麻黃桂枝證但見喜嘔一證則發熱者便可用柴胡湯不必寒熱往來而始用也發熱而嘔則人參當去而桂枝非所宜矣其目赤耳聾胸滿而煩者用柴胡去參夏加栝蔞實之法脈弦細而頭痛發熱者從柴胡去參加桂之法傷寒五六日頭痛汗出微惡寒手足冷心下滿口不欲食大便鞕脈沉細者此為陽微結必有表復有裏也脈沉亦在裏也汗出為陽微結假令純陰結不得復有外證悉入在裏矣此為半在裏半在表也脈雖沉細不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解大便硬謂之結脈浮數能食曰陽結沉遲不能食曰陰結此條俱是少陰脈謂五六日又少陰發病之期若謂陰不得有汗則少陰亡陽脈緊汗出者有矣然亡陽與陰結有別亡陽咽痛吐利陰結不能食不而大便反硬也亡陽與陽結亦有別三陰脈不至頭其汗在身三陽脈盛於頭陽結則汗在頭也邪在陽明陽盛故能食此謂純陽結邪在少陽陽微故不欲食此謂陽微結宜屬小柴胡矣然欲與柴胡湯必究其病在半表而微惡寒亦可屬少陰但頭汗始可屬之少陽欲反覆講明頭汗之義可與小柴胡而勿疑也上焦得通則心下不滿而欲食津液得下則大便自軟而得便矣此為少陰少陽之疑似證右論小柴胡主證傷寒四五日身熱惡風頭項強脅下滿手足溫而渴者小柴胡湯主之身熱惡風頭項強桂枝證未罷脅下滿已見柴胡一證便當用小柴胡去參夏加桂枝栝蔞以兩解之不任桂枝而主柴胡者從樞故也陽明病發潮熱大便溏小便自可胸脅滿者小柴胡湯主之潮熱已屬陽明然大便溏而小便自可未為胃實胸脅苦滿便用小柴胡和之熱邪從少陽而解不復入陽明矣上條經四五日是太陽少陽併病此是陽明少陽合病若謂陽明傳入少陽則謬矣陽明病脅下硬滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解也不大便屬陽明然脅下硬滿而嘔尚在少陽部舌上白胎者痰飲溢於上焦也與小柴胡湯則痰飲化為津液而燥土和上焦仍得汗出而充身澤毛矣傷寒嘔多雖有陽明證不可攻之嘔者水氣在上焦上焦得通津液得下胃氣因和矣服柴胡湯已渴者屬陽明也以法治之柴胡湯有芩參甘棗皆生津之品服之反渴者必胃家已實津液不足以和胃也當行白虎承氣等法仍用柴胡加減非其治矣此少陽將轉屬陽明之證右論兩經合併病婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之中風至七八日寒熱已過復得寒熱發作有期與前之往來寒熱無定期者不侔此不在氣分而在血分矣凡診婦人必問月事經水適斷於寒熱時是不當止而止也必其月事下而血室虛熱氣乘虛而入其餘血之未下者乾結於內故適斷耳用小柴胡和之使結血散則寒熱自除矣餘義詳陽明焉右論熱入血室傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之傷寒至六七日正寒熱當退之時反見發熱惡寒證此表證而兼心下支結之裏證表裏未解也然惡寒微則發熱亦微但肢節煩疼則一身骨節不煩疼可知支如木之支即微結之謂也表證微故取桂枝之半內證微故取柴胡之半此因內外俱虛故以此輕劑和解之也右論柴胡桂枝各半證柴胡桂枝湯柴胡四兩黃芩人參生薑芍藥桂枝各兩半甘草一兩半夏二合半大棗六枚以水七升煮取三升去渣溫服一升桂芍甘草得桂枝之半柴參芩夏得柴胡之半薑棗得二方之半是二方合半非各半也與麻黃桂枝合半湯又不同傷寒陽脈澀陰脈弦法當腹中急痛先用小建中湯不差者小柴胡湯主之前條偏於半表此條偏於半裏注詳建中湯證中本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈弦細者與小柴胡湯若吐下發汗溫針譫語柴胡證罷此為壞病知犯何逆以法治之少陽為樞太陽外證不解風寒從樞而入少陽矣若見脅下硬滿乾嘔不能食往來寒熱之一便是柴胡證未罷即誤於吐下發汗溫針尚可用柴胡治之若誤治後不見半表半裏證而發譫語是將轉屬陽明而不轉屬少陽矣柴胡湯不中與之亦不得以譫語即為胃實也知犯何逆治病必求其本也與桂枝不中與同義此太陽壞病而非少陽壞病也凡柴胡湯病而反下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解此與下後復用桂枝同局因其人不虛故不為壞病傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者為痞柴胡不中與之宜半夏瀉心湯注詳瀉心湯證中此為柴胡壞證故不中與之得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔食穀噦者柴胡不中與也浮弱為桂枝脈惡風寒為桂枝證然手足溫而身不熱脈遲為寒為無陽為在藏是表裏虛寒也法當溫中散寒而反二三下之胃陽喪亡不能食矣食穀則噦飲水則嘔虛陽外走故一身面目悉黃肺氣不化故小便難而渴營血不足故頸項強少陽之樞機無主故脅下滿痛此太陽中風誤下之壞病非柴胡證矣柴胡證不欲食非不能食小便不利非小便難脅下痞硬不是滿痛或渴不是不能飲水喜嘔不是飲水而嘔與小柴胡湯後必下利者雖有參甘不禁柴芩栝蔞之寒也此條亦是柴胡疑似證而非柴胡壞證前條似少陰而實少陽此條似少陽而實太陽壞病得一證相似處大宜著眼傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝乾薑湯主之初服微煩復服汗出便愈汗下後而柴胡證仍在者仍用柴胡湯加減此因增微結一證故變其方名耳此微結與陽微結不同陽微結對純陰結而言是指大便硬病在胃此微結對大結胸而言是指心下痞其病在胸脅與心下痞硬心下支結同義柴胡桂枝乾薑湯柴胡半斤黃芩桂枝各三兩栝蔞根四兩乾薑牡蠣甘草各二兩煎服同前法此方全是柴胡加減法心煩不嘔而渴故去參夏加栝蔞根胸脅滿而微結故去棗加蠣小便雖不利而心下不悸故不去黃芩不加茯苓雖渴而表未解故不用參而加桂以乾薑易生薑散胸脅之滿結也初服煩即微者黃芩栝蔞之效繼服汗出周身而愈者薑桂之功也小柴胡加減之妙若無定法而實有定局矣傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之妄下後熱邪內攻煩驚譫語者君主不明而神明內亂也小便不利者火盛而水虧也一身盡重者陽內而陰反外也難以轉側者少陽之樞機不利也此下多亡陰與火逆亡陽不同柴胡加龍骨牡蠣湯柴胡四兩黃芩人參生薑茯苓鉛丹桂枝龍骨牡蠣各一兩半大黃二兩半夏一合大棗六枚水八升煮取四升內大黃更煮一二沸去渣溫服一升此方取柴胡湯之半以除胸滿心煩之半裏加鉛丹龍蠣以鎮心驚茯苓以利小便大黃以止譫語桂枝者甘草之誤也身無熱無表證不得用桂枝去甘草則不成和劑矣心煩譫語而不去人參者以驚故也傷寒十三日下之胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡以解外後以柴胡加芒硝湯主之日晡潮熱已屬陽明而微利可疑利既不因於下藥潮熱嘔逆又不因利而除故知誤不在下而在丸藥也丸藥發作既遲又不能蕩滌腸胃以此知日晡潮熱原因胃實此少陽陽明併病先服小柴胡二升以解少陽之表甚一升加芒硝以除陽明之裏不加大黃者以地道原通不用大柴胡者以中氣已虛也後人有加大黃桑螵蛸者大背仲景法矣太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先其時極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也太陽居三陽之表其過經不解不轉屬陽明則轉少陽矣心煩喜嘔為柴胡證然柴胡證或胸中煩而不痛或大便微結而不溏或腹中痛而不滿此則胸中痛大便溏腹微滿皆不是柴胡證但以欲嘔一證似柴胡當深究其欲嘔之故矣夫傷寒中風有柴胡證有半表證也故嘔而發熱者主之此病既不關少陽寒熱往來脅下痞硬之半表見太陽過經而來一切皆屬裏證必十日前吐下而誤之壞病也胸中痛者必極吐可知腹微滿便微溏必誤下可知是太陽轉屬陽明而不屬少陽矣今胃氣雖傷而餘邪未盡故與調胃承氣和之不用枳朴者以胸中痛上焦傷即嘔多雖有陽明證不可攻之謂也若未經吐下是病氣分而不在胃則嘔不止而鬱鬱微煩者當屬之大柴胡矣此陽明少陽疑似證前條得壞病之虛此條得壞病之實右論柴胡變證太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也與大柴胡湯下之則愈病從外來者當先治外而後治其內此屢經妄下半月餘而柴胡證仍在因其人不虛故樞機有主而不為壞病與小柴胡和之表證雖除內尚不解以前此妄下之藥但去腸胃有形之物而未泄胸膈氣分之結熱也急者滿也但滿而不痛即痞也薑夏以除嘔柴芩以去煩大棗和裏枳芍舒急而曰下之則愈者見大柴胡為下劑非和劑也若與他藥和下之必有變證意在言外嘔不止屬有形若欲嘔屬無形傷寒十餘日熱結在裏復往來寒熱者與大柴胡湯裏者對表而言不是指胃此熱結氣分不屬有形故十餘日復能往來寒熱若熱結在胃則蒸蒸發熱不復知有寒矣住來寒熱故倍生薑佐柴胡以解表結熱在裏故去參甘之溫補加枳芍以破結傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之汗出不解蒸蒸發熱者是調胃承氣證汗出解後心下痞硬下利者是生薑瀉心證此心下痞硬協熱而利表裏不解似桂枝人參證然彼在妄下後而不嘔則此未經下而嘔則嘔而發熱者小柴胡主之矣然痞硬在心下而不在脅下斯虛實補瀉之所由分也故去參甘之甘溫益氣而加枳芍之酸苦湧泄耳右論大柴胡證大柴胡湯小柴胡湯去人參甘草加生薑二兩芍藥三兩枳實四枚餘同小柴胡法按大柴胡是半表半裏氣分之下藥並不言大便其心下急與心下痞硬是胃口之病而不在胃中結熱在裏非結實在胃且下利則地道已通仲景不用大黃之意曉然若以下之二字妄加大黃則十棗湯攻之二字如何味乎大小柴胡俱是兩解表裏而有主和主攻之異和無定體故有加減攻有定局故無去取之法也建中湯證傷寒二三日心中悸而煩者小建中湯主之傷寒二三日無陽明證是少陽發病之期不見寒熱頭痛胸脅苦滿之表又無腹痛苦嘔或咳或渴之裏但心悸而煩是少陽中樞受寒而木邪挾相火為患相火旺則君火虛離中真火不藏故悸離中真火不足故煩非辛甘以助陽酸苦以維陰則中氣亡矣故制小建中以理少陽佐小柴胡之不及心煩心悸原屬柴胡證而不用柴胡者首揭傷寒不言發熱則無熱而惡寒可知心悸而煩是寒傷神熱傷氣矣二三日間熱已發裏寒猶在表原是半表半裏證然不往來寒熱則柴胡不中與也心悸當去黃芩心煩不嘔當去參半故君桂枝通心而散寒佐甘草半飴助脾安悸倍芍藥瀉火除煩任生薑佐金平木此雖桂枝加飴而倍芍藥不外柴胡加減之法名建中寓發汗於不發之中曰小者以半為解表不全固中也少陽妄汗後胃不和因煩而致躁宜小柴胡清之未發汗心已虛因悸而致煩宜小建中和之傷寒陽脈澀陰脈弦法當腹中急痛先用小建中湯不差者小柴胡湯主之尺寸俱弦少陽受病也今陽脈澀而陰脈弦是寒傷厥陰而不在少陽也寸為陽陽主表陽脈澀者陽氣不舒表寒不解也弦為木邪必挾相火相火不能禦寒必還入厥陰而為患厥陰抵少腹挾胃屬肝絡膽則腹中皆厥陰部也尺為陰尺主裏今陰脈弦為肝脈必當腹中急痛矣肝苦急甘以緩之酸以瀉之辛以散之此小建中為厥陰驅寒發表平肝逐邪之先著也然邪在厥陰腹中必痛原為陰症一劑建中未必成功設或不差當更用柴胡令邪走少陽使有出路所謂陰出之陽則愈又以小柴胡佐小建中之不及也前條辨證此條辨脈前條是少陽相火犯心而煩其證顯此條是厥陰相火攻腹而痛其證隱若腹痛而非相火不得用芍藥之寒內經暴注脹大皆屬於熱此腹痛用芍藥之義或問腹痛前以小建中溫之後以小柴胡涼之仲景豈姑試之乎曰非也不差者但未愈非更甚也先以建中解肌而發表止痛在芍藥繼以柴胡補中而達邪止痛在人參按柴胡加減法腹中痛者去黃芩加芍藥其功倍於建中豈有溫涼之異乎陽脈仍澀故用人參以助桂枝陰脈仍弦故用柴胡以助芍藥若一服差又何必更用人參之溫補柴胡之升降仲景有一證用兩方者如用麻黃汗解半日復煩用桂枝更汗同法然皆設法禦病非必然也先麻黃繼桂枝是從外之內法先建中繼柴胡是從內之外法嘔家不可用建中湯以甘故也此建中湯禁與酒客不可與桂枝同義心煩喜嘔嘔而發熱柴胡證也胸中有熱腹痛欲嘔黃芩湯證也太少合病自利而嘔黃芩湯證也小建中湯桂枝去粗皮生薑各三兩芍藥六兩炙甘草二兩大棗十二枚擘膠飴一升水七升煮取三升去渣內膠飴更上微火消解溫服一升日三服黃連湯證傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之此熱不發於表而在胸中是未傷寒前所蓄之熱也邪氣者即寒氣夫陽受氣於胸中胸中有熱上形頭面故寒邪從腸入胃內經所謂中於脅則下少陽者是也今胃中寒邪阻隔胸中之熱不得降故上炎作嘔胃脘之陽不外散故腹中痛也熱不在表故不發熱寒不在表故不惡寒胸中為裏之表腹中為裏之裏此病在焦府之半表裏非形軀之半表裏也往來寒熱者此邪由頰入經病在形身之半表裏如五六日而胸脅苦滿心煩喜嘔此傷於寒而傳為熱非素有之熱或腹中痛者是寒邪自胸入腹與此由脅入胸胃不同故君以黃連亦以佐柴胡之不及也欲嘔而不得嘔腹痛而不下利似乎今人所謂乾霍亂絞腸痧腸痧等症黃連湯黃連三兩乾薑三兩炙甘草二兩桂枝三兩人參二兩半夏半升大棗十二枚擘水一斗煮取六升去渣溫服一升日三夜二服此亦柴胡加減方也表無熱腹中痛故不用柴芩君黃連以瀉胸中積熱薑桂以驅胃中寒邪佐甘棗以緩腹痛半夏除嘔人參補虛雖無寒熱往來於外而有寒熱相持於中仍不離少陽之治法耳此與瀉心湯大同而不名瀉心者以胸中素有之熱而非寒熱相結於心下也看其君臣更換處大有分寸黃芩湯證太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之兩陽合病陽盛陰虛陽氣下陷入陰中故自下利太陽與陽明合病是邪初入陽明之裏與葛根湯辛甘發散以從陽也又下者舉之之法太陽與少陽合病是邪已入少陽之裏與黃芩湯酸苦涌泄以為陰也又通因通用之法黃芩湯又外臺治乾嘔下利黃芩人參桂枝大棗乾薑半夏黃芩三兩甘草三兩炙芍藥三兩大棗十二枚水一斗煮取二升去渣溫服一升日再服夜一服嘔者加半夏半升生薑三兩此小柴胡加減方也熱不在半表已入半裏故以黃芩主之雖非胃實亦非胃虛故不須人參補中也陽明少陽合病必自下利其脈不負者順也負者失也互相剋賊名為負若少陽負趺陽者為順也兩陽合病必見兩陽之脈陽明脈大少陽脈弦此為順脈若大而不弦負在少陽弦而不大負在陽明是互相剋賊怕不順之候矣然木剋土是少陽為賊邪若少陽負而陽明不負亦負中之順脈
