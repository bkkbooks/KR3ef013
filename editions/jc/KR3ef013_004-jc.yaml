body:
  text: 傷寒來蘇集卷四太陰脈證太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結鞕陽明三陽之裏故提綱屬裏之陽證太陰三陰之裏故提綱皆裏之陰證太陰之上濕氣主之腹痛吐利從濕化也脾為濕土故傷于濕脈先受之然寒濕傷人入于除經不能動藏則還于府府者胃也太陰脈布胃中又發于胃胃中寒濕故食不內而吐利交作也太陰脈從足入腹寒氣時上故腹時自痛法宜溫中散寒若以腹滿為實而誤下胃口受寒故胸下結鞕自利不渴者屬太陰以其藏有寒故也當溫之宜四逆輩傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也上條明自利之因此條言自利之兆四五日是太陰發病之期傷寒脈浮而緩手足自溫者繫在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也前條是太陰寒濕脈當沉細此條是太陰濕熱故脈浮緩首揭傷寒知有惡寒證浮而緩是桂枝脈然不發熱而手足溫是太陽傷寒非太陽中風矣然亦暗對不發熱言耳非太陰傷寒必手足溫也夫病在三陽尚有手足冷者何況太陰陶氏分太陰手足溫少陰手足寒厥陰手足厥冷是大背太陰四肢煩疼少陰一身手足盡熱之義第可言手足為諸陽之本尚自溫不可謂脾主四肢故當溫也凡傷寒則病熱太陰為陰中之陰陰寒相合故不發熱太陰主肌肉寒濕傷于肌肉而不得越於皮膚故身當發黃若水道通調則濕氣下輸膀胱便不發黃矣然寒濕之傷於表者因小便而出濕熱之蓄於內者必從大便而出也發於陰者六日愈至七八日陽氣來復因而暴煩下利雖日十餘行不須治之以脾家積穢臭塞於中盡自止矣手足自溫是表陽猶在暴煩是裏陽陡發此陰中有陽與前藏寒不同能使小便利則利自止不須溫亦不須下也傷寒下利日十餘行脈反實者死脾氣虛而邪氣盛故脈反實也太陰病脈弱其人續自便利設當行大黃芍藥者宜減之以其胃氣弱易動故也太陰脈本弱胃弱則脾病此內因也若因於外感其脈或但浮或浮緩是陰病見陽脈矣下利為太陰本證自利因脾實者腐穢盡則愈自利因藏寒者四逆輩溫之則愈若自利因太陽誤下者則腹滿時痛當加芍藥而大實痛者當加大黃矣此下後脈弱胃氣亦弱矣小其制而與之動其易動合乎通因通用之法大黃瀉胃是陽明血分下藥芍藥瀉脾是太陰氣分下藥下利腹痛熱邪為患宜芍藥下之下利腹痛為陰寒者非芍藥所宜矣仲景於此勺藥與大黃並提勿草草看過惡寒脈微而復利亡血也四逆加人參湯主之方註見四逆湯註中右論太陰傷寒脈證太陰病脈浮者可發汗宜桂枝湯太陰主裏故提綱皆屬裏證然太陰主開不全主裏也脈浮者病在表可發汗太陰亦然也尺寸俱浮者太陰受病也沉為在裏當見腹痛吐利等證此浮為在表當見四肢煩疼等證裏有寒邪當溫之宜四逆輩表有風熱可發汗宜桂枝湯太陰脈沉者因於寒寒為陰邪沉為陰脈太陰有脈浮者因乎風風為陽邪浮為陽脈也謂脈在三陰則俱沉陰經不當發汗者非也但浮脈是麻黃脈沉脈不是桂枝證而反用桂枝湯者以太陰是裏之表證桂枝是表之裏藥也太陰中風四肢煩疼陽微陰濇而長者為欲愈風為陽邪四肢為諸陽之本脾主四肢陰氣衰少則兩陽相搏故煩疼脈濇與長不是並見濇本病脈濇而轉長病始愈耳風脈本浮今而微知風邪當去濇則少氣少血今而長則氣治故愈四肢煩疼是中風未愈前證微濇而長是中風將愈之脈宜作兩截看太陽以惡風惡寒別風寒陽明以能食不能食別風寒太陰以四肢煩溫別風寒是最宜著眼少陽為半表半裏又屬風藏故傷寒中風互稱少陰厥陰則但有欲愈脈無未愈證惜哉右論太陰中風脈證太陰病欲解時從亥至丑上經曰夜半後而陰隆為重陰又曰合夜至雞鳴天之陰陰中之陰也脾為陰中之至陰故主亥子丑時三白散證寒實結胸無熱證者與三白小陷胸湯為散亦可服太陽表熱未除而反下之熱邪與寒水相結成熱實結胸太陰腹滿時痛而反下之寒邪與寒藥相結成寒實結胸無熱證者不四肢煩疼者也名曰三白者三物皆白別於黃連小陷胸也舊本誤作三物以黃連栝蔞投之陰盛則亡矣又誤作白散是二方矣黃連巴豆寒熱天淵云亦可服豈不誤人且妄編於太陽篇中水潠證後而方後又以身熱皮粟一段雜之使人難解今移太陰胸下結鞕之後其證其方若合符節按三白小陷胸非是兩湯係三白可陷下胸中之結耳不可作兩句看蓋既稱寒實小陷胸是大寒之藥乃下井投石耳三物白散桔梗貝母各二錢巴豆一分去皮熬黑研如脂右二味為散內巴豆更於臼中杵勻以白飲和服強人半錢匕羸者減之貝母主療心胸鬱結桔梗能開提血氣利膈寬胸然非巴豆之辛熱斬關而入何以勝硝黃之苦寒使陰氣流行而成陽也白飲和服者甘以緩之取其留戀於胸不使速下耳散者散其結塞比湯以蕩之更精病在膈上者必吐在膈下者必利本證原是吐利因胸下結鞕故不能通因其勢而利導是則結鞕自除矣不利進熱粥一杯利過不止進冷粥一杯東垣云淡粥為陰中之陽所以利小便今人服大黃後用粥止利即此遺意耳少陰脈證少陰之為病脈微細但欲寐也三陽以少陽為樞三陰以少陰為樞弦為木象浮而弦細者陽之少也微為水象沉而微細者陰之少也衛氣行陽則寤行陰則寐日行二十五度常從足少陰之間分行藏府今少陰病則入陽分多故欲寐欲寐是病人意中非實能寐也少陽提綱各臻其妙少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便色白者以下焦虛有寒不能制水故也欲吐而不得吐者樞病而開闔不利也與喜嘔同少陽脈下胸中故胸煩是病在表之裏也少陰經出絡心故心煩是病在裏之裏也欲吐不得吐欲寐不得寐少陰樞機之象也五六日正少陰發病之期太陰從溼化故自利不渴少陰從火化故自利而渴少陰主下焦輸津液司閉藏者也下焦虛則坎中之陽引水上交於離而未能故心煩而渴關門不閉故自利不能制火由於不能制水故耳然必驗小便者以少陰主水熱則黃赤寒則清白也若不於此詳察之則心煩而渴但治上焦之實熱而不顧下焦之虛寒則熱病未除下利不止矣按自利不渴屬太陰而渴則屬少陰也少陰病脈沉細數病為在裏不可發汗前條詳證後條詳脈脈浮為在表然亦有裏證如脈浮而大心下反鞕有熱屬藏者是矣沉為在裏然亦有表證如少陰病反發熱者是矣少陰脈沉者當溫然數則為熱又不可溫而數為在藏是為在裏更不可汗可不審之精而辨之確乎少陰病脈微不可發汗亡陽故也陽已虛尺中弱濇者復不可下之少陰之不可汗下與少陽同因反發熱故用麻黃微汗因裏熱甚故用承氣急下此病反其本故治亦反其本微為無陽濇為少血汗之亡陽下之亡陰陽虛者既不可汗即不可下玩復字可知其尺脈弱濇者復不可下亦不可汗也若謂無陽是陰邪而下之其誤人甚矣病人脈陰俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利太少陰陽各異或脈同證殊或脈證相同從脈從證之時大宜詳審脈沉發熱為太陽少陰相似證前重言之矣陰陽俱緊為太陽少陰相似脈尚未有知之者緊脈為寒當屬少陰然病發於陰不當有汗反汗出者陰極似陽也蓋太陽主外陽虛不能作汗故發熱而反無汗少陰主裏陰虛生內熱故身無熱而汗反出亡陽者虛陽不歸其邪皆由少陰不藏所致故上焦從火化而咽痛嘔吐下焦從陰虛而下利不止也宜八味腎氣丸主之脈陰腸俱緊者口中氣出脣口燥乾鼻中涕出倦臥足冷舌上胎滑勿妄治也到七日以來其人微發熱手足溫者此為欲解或到八日已上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也此是少陰經文與此上下文符合王氏集脈法中以無少陰二字也少陰脈絡肺肺主鼻故鼻中涕出少陰脈絡舌本故舌上胎滑少陰大絡注諸絡以溫足脛故足冷諸證全似亡陽而不名亡陽者外不汗出內不吐利者口中氣出脣口燥乾鼻中涕出此為內熱陰陽脈緊舌上胎滑踡臥足冷又是內寒此少陰為樞故見寒熱相持病雖發於陰而口舌脣鼻之半表裏恰與少陽口咽目之半表裏相應也治之者與少陽不同當神而明之汗吐下溫清補之法勿妄用也與其用之不當寧靜以待之若至七日一陽來復微發熱手足溫是陰得陽則解也陰陽自和緊脈自去矣若微熱不解八日以上反大熱此為晚發恐畜熱有餘或發癰膿或便腸血為難治耳若七日來設使其人不能發熱以陰陽俱緊之脈反加惡寒是寒甚於表上焦應之必欲嘔矣如反加腹痛是寒甚於裏中焦受之必欲利矣脈陰陽俱緊至於吐利其脈獨不解緊去人安此為欲解陰陽俱緊至於吐利緊脈不去此亡陽也緊去則吐利自止其人可安此據脈辨證法少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈前條是亡陽脈證此條是回陽脈證前條是反叛之反此條是反正之反玩反溫前此已冷可知微本少陰脈煩利本少陰證至七八日陰盡陽復之時緊去微見所謂穀氣之來也徐而和矣煩則陽已反於中宮溫則陽已敷於四末陰平陽祕故煩利自止少陰中風脈陽微陰浮者為欲愈陽微者復少陰之本體陰浮者知坎中之陽回微則不緊浮則不沉即暴微而緊反去之謂也邪從外來者仍自內而出故愈少陰病欲解時從子至寅上天以一生水而開於子故少陰主於子少陰病若利自止惡寒而踡臥手足溫者可治少陰病惡寒身踡而利手足逆冷者不治傷寒以陽為主不特陰證見陽脈者生又陰病見陽證者可治背為陽腹為陰陽盛則作痓陰盛則踡臥若利而手仍溫是陽回故可治若利不止而手足逆冷是純陰無陽所謂六府氣絕於外者手足寒五藏氣絕於內者下利不禁矣少陰病惡寒而踡時自煩欲去衣被者可治少陰病四肢冷逆惡寒而踡脈不至不煩而躁者死陽盛則煩陰極則躁煩屬氣躁屬形煩發於內躁見於外形從氣動也時自煩是陽漸回不煩而躁是氣已先亡惟形獨存耳少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯少陰病吐利煩躁四逆者死上吐下利胃脘之陽將脫手足不逆冷諸陽之本猶在反發熱衛外之陽尚存急灸少陰則脈可復而吐利可止也若吐利而兼煩躁四肢俱冷純陰無陽不可復生矣少陰動脈在太谿取川流不息之義也其穴在足內踝後跟骨上動脈陷中主手足厥冷寒至節是少陰之原此脈絕則死伏留在足內踝骨上二寸動脈陷中灸之能還大脈是少陰之經少陰病脈微濇嘔而汗出大便數而少者宜溫其上灸之少陰病脈沉微細但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死脈微而濇嘔而汗出陽已亡矣大便數少而不下利是下焦之陽尚存急灸百會以溫其上則陽猶可復也脈沉微細是少陰本脈欲臥欲吐是少陰本證當心煩而反不煩心不煩而反汗出亡陽已兆於始得之日矣五六日自利而反煩躁不得臥是微陽將絕無生理矣同是惡寒踡臥利止手足溫者可治利不止手足逆冷者不治時自煩欲去衣被者可治不煩而躁四逆而脈不至者死同是吐利手足不逆冷反發熱者不死煩躁四逆者死同是嘔吐汗出大便數少者可治自利煩躁不得臥者死蓋陰陽互為其根陰中有陽則生無陽則死獨陰不生故也是以六經以少陰為樞少陰病下利止而頭眩時自冒者死冒家自汗則愈今頭眩而時時自冒清陽之氣已脫此非陽回而利止是水穀已竭無物更行也少陰病六七日息高者死氣息者乃腎間動氣藏府之本經脈之根呼吸之蒂三焦生氣之原也息高者但出心與肺不能入肝與腎生氣已絕於內也六經中獨少陰歷言死證他經無死證甚者但曰難治耳知少陰病是生死關病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也若脈和其人大煩目重瞼內際黃者此欲解也脈者資始於腎朝會於肺腎氣絕則脈不至三部手足皆至是脈道已通有根有本非暴出可知大煩躁擾者是陰出之陽非陰極而發也口噤不能言因脈氣初復營血未調脾濇不運故耳若所至之脈和調雖大煩不解亦不足慮再視其人之目重瞼內際此屬於脾若色黃而不雜他藏之色是至陰未虛雖口噤亦不足慮矣此以脾為五藏之母又水位之下土氣承之也麻黃附子證少陰病始得之無汗惡寒反發熱脈沉者麻黃附子細辛湯主之太陽主表病發於陽故當發熱少陰主裏病發於陰只當內熱今始得寒邪即便發發熱似乎太陽而屬之少陰者何內經曰逆冬氣則少陰不藏腎氣獨沉故反熱而脈則沉也腎為坎象二陰不藏則一陽無蔽陰邪始得而內侵孤陽因得以外散耳病在表脈浮者可發汗可知病在表脈沉者亦不可不汗矣然沉為在裏而反發其汗津液越出亡陽則陰獨矣故用麻黃開腠理細辛散浮熱而無附子固元陽則熱去寒起亡可立待也其人不知養藏之道逆冬氣而傷腎故有此證能不擾乎陽無洩皮膚去寒就溫詎有此患哉本條當有無汗惡寒證少陰病始得之二三日麻黃附子甘草湯微發汗以二三日無裏證故微發汗也言無裏證則有表證可知以甘草易細辛故曰微發汗要知此條是微惡寒微發熱故微發汗也皮部論云少陰之陰其入於經也從陽部注於經其出者從陰內注於骨此證與附子湯證皆是少陰表證發熱脈沉無裏證者從陽部注於經也身體骨節痛手足寒背惡寒脈沉者從陰內注於骨也從陽注經故用麻黃細辛從陰注骨故用參苓朮芍口中和樞無熱皆可用附子麻黃附子細辛湯麻黃細辛各三兩附子一枚泡去皮水一斗先煮麻黃減二升去沬沸內諸藥煮取三升去渣溫服一升日三服麻黃附子甘草湯前方去細辛加甘草二兩水七升煎法同亦見微發汗之意少陰病八九日一身手足盡熱者以熱在膀胱必便血也此藏病傳府陰乘陽也氣病而傷血陽乘陰也亦見少陰中樞之象發於陰者六日愈到七日其人微發熱手足溫者此陰出之陽則愈也到八日以上反大發熱者腎移熱於膀胱膀胱熱則太陽經皆熱太陽主一身之表為諸陽主氣手足者諸陽之本故一身手足盡熱太陽經多血血得熱則行陽病者上行極而下故尿血也此裏傳表證是自陰轉陽則易解故身熱雖甚不死輕則豬苓湯重則黃連阿膠湯可治與太陽熱結膀胱血自下者證同而來因則異少陰傳陽證者有二六七日腹脹不大便者是傳陽明八九日一身手足盡熱者是傳太陽下利便膿血指大便言熱在膀胱而便血是指小便言少陰病欬而下利譫語者被火氣劫故也小便必難以強責少陰汗也上欬下利津液喪亡而譫語非轉屬陽明腎主五液入心為汗少陰受病液不上升所以陰不得有汗也少陰發熱不得已用麻黃發汗即用附子以固裏豈可以火氣劫之而強發汗也少陰脈入肺出絡心肺主聲心主言火氣迫心肺故欬而譫語也腎主二便治下焦濟泌別汁滲入膀胱今少陰受邪復受火侮樞機無主大腸清濁不分膀胱水道不利故下利而小便難也小便利者其人可治此陰虛故小便難少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治陽氣不達於四肢故厥厥為無陽不能作汗而強發之血之與汗異名同類不奪其汗必動其血矣上條火劫發汗上傷心肺下竭膀胱猶在氣分其害尚輕峻劑發汗傷經動血若陰絡傷而下行猶或可救若陽絡傷而上溢不可復生矣妄汗之害如此附子湯證少陰病身體痛手足寒骨節痛脈沉者附子湯主之少陰病得之一二日口中和其背惡寒者當灸之附子湯主之少陰主水於象為坎一陽居其中故多熱證是水中有火陰中有陽也此純陰無陽陰寒切膚故身疼四肢不得稟陽氣故手足寒寒邪自經入藏藏氣實而不能入則從陰內注於骨故骨節疼此身疼骨痛雖與麻黃證同而陰陽寒熱彼此判然脈沉者少陰不藏腎氣獨沉也口中兼咽與舌言少陰之脈循喉嚨挾舌本故少陰有口乾舌燥咽痛等證此云和者不燥乾而渴火化幾於息矣人之生也負陰而抱陽故五藏之俞皆係於背背惡寒者寒氣化薄陰寒得以乘之也此陽氣凝聚而成陰必灸其背俞使陰氣流行而為陽急溫以附子湯壯火之陽而陰自和矣附子湯附子二枚泡白朮四兩人參二兩芍藥茯苓各三兩水八升煮取三升去渣溫服一升日三服此傷寒溫補第一方也與真武湯似同而實異倍朮附去薑加參是溫補以壯元陽真武湯還是溫散而利腎水也真武湯證少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或欬或小便利或下利嘔者真武湯主之為有水氣是立真武湯本意小便不利是病根腹痛下利四肢沉重疼痛皆水氣為患因小便不利所致然小便不利實由坎中之無陽坎中火用不宣故腎家水體失職是下焦虛寒不能制水故也法當壯元陽以消陰翳逐留垢以清水源因立此湯末句語意直接有水氣來後三項是真武加減證不是主證若雖有水氣而不屬少陰不得以真武主之也真武湯茯苓芍藥生薑各三兩白朮二兩附子一枚泡水八升煮取三升溫服七合日三服欬者加五味半升細辛一兩小便利而下利者去芍藥茯苓加乾薑一兩嘔者去附子加生薑足前成半斤真武北方水神也坎為水而一陽居其中柔中之剛故名真武是陽根於陰靜為動本之義蓋水體本靜動而不息者火之用也火失其位則水逆行君附子之辛溫以奠陰中之陽佐芍藥之酸寒以收炎上之用茯苓淡滲以正潤下之體白朮甘苦以制水邪之溢陰平陽祕少陰之樞機有主開闔得宜小便自利腹痛下利自止矣生薑者用以散四肢之水氣與膚中之浮熱也欬者是水氣射肺所致加五味子之酸溫佐芍藥以收腎中水氣細辛之辛溫佐生薑以散肺中水氣小便自利而下利者胃中無陽則腹痛不屬相火四肢困于脾溼故去芍藥之酸寒加乾薑之辛熱即茯苓之甘平亦去之此為溫中之劑而非利水之劑矣嘔者是水氣在中故中焦不治四肢不利者不涉少陰由於太陰溼化不宣也與水氣射肺不同法不須附子之溫腎倍加生薑以散邪此和中之劑而非下焦之藥矣附子芍藥茯苓白朮皆真武所重若去一即非真武湯太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯主之腎液入心而為汗汗出不能遍身故不解所以然者太陽陽微不能衛外而為固少陰陰虛不能藏精而起亟也仍發熱而心下悸坎陽外亡而腎水凌心耳頭眩身瞤因心下悸所致振振欲擗地形容身瞤動之狀凡水從火發腎火上炎水邪因得上侵若腎火歸原水氣自然下降外熱因之亦解此條用真武者全在降火利水重在發熱而心下悸並不在頭眩身瞤故也如傷寒厥而心下悸宜先治水亦重在悸不重在厥但彼本於太陽寒水內侵故用桂枝此則少陰邪水泛溢故用附子會仲景此方為少陰治水而設附會三綱之說者本為誤服青龍而說不知服大青龍而厥逆筋惕肉瞤是胃陽外亡輕則甘草乾薑湯重則建中理中輩無暇治腎即欲治腎尚有附子湯之大溫補而乃用真武耶要知小便自利心下不悸便非真武湯證病發熱頭痛身疼惡寒上吐下利者名曰霍亂多欲飲水者五苓散主之寒多不用水者理中丸主之理中丸人參甘草白朮乾薑搗篩為末蜜和丸如雞黃大以沸湯數合和一丸研碎溫服之日三四夜二服腹中未熱加至三四丸然不及湯湯以水八升煮取三升去滓溫服一升日三服若臍上築者腎氣動也去朮加桂吐多者去朮加生薑三兩下多者還用朮悸者加茯苓腹中痛虛者加人參腹滿者去朮加附子一枚霍亂轉筋吐利不止頭目昏眩四肢逆冷須臾不救者吳茱萸湯主之腹中㽲痛吐利之後甚則轉筋此兼風也手足厥冷氣少脣青此兼寒也身熱煩渴氣粗口燥此兼暑也四肢重著骨節煩疼此兼溼也風暑合病宜石膏理中湯暑溼相搏二香散主之夏月中暑霍亂者香薷飲主之桂苓白朮湯亦可桃花湯證少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之本證與真武不同彼以四肢沉重疼痛是為有水氣此使膿血是為有火氣矣盍不清火反用溫補蓋治下焦水氣與心下水氣不同法下焦便膿血與心下痛心中煩亦應異治也心為離火而真水居其中法當隨其勢之潤下故用苦寒以洩之坎為水而真火居其中法當從其性之炎上故用苦溫以發之火鬱於下則剋庚金火炎於上則生戊土五行之理將來者進已往者退土得其令則火退位矣水歸其職腹痛自除膿自自清小便自利矣故制此方不清火不利水一惟培土又全賴乾薑轉旋而石脂秔米得收平成之績也名桃花者取春和之義非徒以色言耳桃花湯赤石脂一斤一半全用一半篩用乾薑一兩秔米一升石脂性濇以固脫色赤以和血味甘而酸甘以補元氣酸以收逆氣辛以散邪氣故以為君半為塊而半為散便濁中清者歸心而入營濁中濁者入腸而止利火曰炎上又火空則發得石脂以濇腸可以遂其炎上之性矣炎上作苦佐乾薑之苦溫以從火化火鬱則發之也火亢則不生土臣以秔米之甘使大有火生遂成有用之火土中火用得宣則水中火體得位下陷者上達妄行歸原火自升而水自降矣少陰病腹痛下利是坎中陽虛故真武有附子桃花用乾薑不可以小便不利作熱治真武是引火歸原法桃花是升陽散火法坎陽有餘能出形軀之表而發熱麻黃附子湯是矣坎陽不虛尚能發熱於軀內之上焦如口燥舌乾咽痛心煩胸滿心痛等證是矣坎陽不足不能發熱於腰以上之陽僅發熱於腰以下之陰如小便不利下利便膿血者是矣此為伏陽屈伏之火與升陽之火不同少陰病膿血者可刺便膿血亦是熱入血室所致刺期門以瀉之病在少陰而刺厥陰實則瀉其子也四逆湯證上脈浮而遲表熱裏寒下利清穀者四逆湯主之脈浮為在表遲為在藏浮中見遲是浮為表虛遲為藏寒未經妄下而利清穀是表為虛熱裏有真寒矣仲景凡治虛證以裏為重協熱下利脈微弱者便用人參汗後身疼脈沉遲者便加人參此脈遲而利清穀且不煩不欬中氣大虛元氣已脫但溫不補何以救逆乎觀茯苓四逆之煩躁且以人參況通脈四逆豈得無參是必因本方之脫落而成之耳此是傷寒證然脈浮表熱亦是病發於陽世所云漏底傷寒也必其人胃氣本虛寒邪得以直入脾胃不犯太少二陽故無口苦咽乾頭眩項強痛之表證然全賴此表熱尚可救其裏寒下利清榖不可攻表汗出必脹滿裏氣大虛不能藏精而為陽之守幸表陽之尚存得以衛外而為固攻之更虛其表汗生於榖汗出陽亡藏寒而生滿病也下利腹脹滿身體疼痛先溫其裏傷寒下之後續得下利清穀不止身疼痛者急當救裏宜四逆湯下利是裏寒身痛是表寒表宜溫散裏宜溫補先救裏者治其本也病發熱頭疼脈反沉若不差身體疼痛當救其裏宜四逆湯此太陽麻黃湯證病為在表脈當浮而反沉此為逆也若汗之不差即身體疼痛不罷當憑其脈之沉而為在裏矣陽證見陰脈是陽消陰長之兆也熱雖發於表為虛陽寒反據於裏是真陰矣必有裏證伏而未見藉其表陽之尚存乘其陰之未發迎而奪之庶無吐利厥逆之患裏和而表自解矣邪之所湊其氣必虛故脈有餘而證不足則從證證有餘而脈不足則從脈有餘可假而不足為真此仲景心法大汗若大下利而厥冷者四逆湯主之大汗則亡陽大下則亡陰陰陽俱虛故厥冷但利非清穀急溫之陽回而生可望也大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之治之失宜雖大汗出而熱不去惡寒不止表未除也內拘急而下利裏寒已發四肢疼而厥冷表寒又見矣可知表熱裏寒者即表寒亡陽者矣嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之嘔而發熱者小柴胡證此脈弱而微熱非相火明矣內無熱故小便利表寒虛故見厥是膈上有寒飲故嘔也傷寒以陽為主陽消陰長故難治既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絕者四逆湯主之吐利交作中氣大虛完穀不化脈微欲絕氣血喪亡矣小便復利而大汗出是門戶不要玄府不閉矣所幸身熱未去手足不厥則衛外之陽諸陽之本猶在脈尚未絕有一線之生機急救其裏正勝而邪可卻也吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之此吐利非清穀汗出不大而脈不微弱賴此發熱之表陽助以四逆而溫裏尚有可生之望自利不渴者屬太陰以其藏有寒故也當溫之宜四逆輩少陰病脈沉者急溫之宜四逆湯若膈上有寒飲者當溫之宜四逆湯惡寒脈微而復利利止亡血也四逆加人參湯主之利雖止而惡寒未罷仍宜四逆以其脈微為無血當仍加人參以通之也右論四逆脈證少陰病下利清穀裏寒外熱手足厥逆脈微欲絕身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之此熱相半證下利清穀陰盛於裏也手足厥逆寒盛於外也身不惡寒面赤陽鬱在表也咽痛利止陽回於內也腹痛乾嘔寒熱交爭也溫裏通脈乃扶陽之法脈為司命脈出則從陽而生厥逆則從陰而死下利清穀裏寒外熱汗出而厥者通脈四逆湯主之下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也此比上條脈證皆輕故能自作鬱冒汗出而解面赤為戴陽陽在上也因其戴陽故鬱冒而汗出因其下虛故下利清穀而厥逆熱微厥亦微故面亦少赤此陰陽相等寒熱自和故易愈吐已下斷汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽汁湯主之此必有陰盛格陽之證故加膽汁為反佐閱白通證可知吐利止而脈平小煩者以新虛不勝穀氣故也四逆湯甘草二兩炙乾薑一兩半附子一枚生用去皮破八片右三味以水三升煮取一升二合去渣分溫再服強人可大附子一枚乾薑三兩通脈四逆湯甘草二兩炙附子大者一枚生用去皮破八片乾薑三兩強人可四兩右三味以水三升煮取二升二合去渣分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩病皆與方相應者乃服之傷寒六七日大下後寸脈沉而遲手足厥冷下部脈不至咽喉不利吐膿血泄利不止者為難治寸脈沉遲氣口脈平矣下部脈不至根本已絕矣六府氣絕於外者手足寒五藏氣絕於內者利下不禁咽喉不利水穀之道絕矣汁液不化而成膿血下濡而上逆此為下厥上竭陰陽離決之候生氣將絕於內也舊本有麻黃升麻湯其方味數多而分兩輕重汗散而畏溫補乃後世粗工之伎必非仲景方也此證此脈急用參附以回陽尚恐不救以治陽實之品治亡陽之證是操戈下石矣敢望其汗出而愈哉絕汗出而死是為可必仍附其方以俟識者麻黃升麻湯麻黃二兩半去節升麻一兩一錢當歸一兩一錢黃芩萎蕤各六銖芍藥知母十八銖天冬去心桂枝去皮乾薑甘草炙石膏碎綿裏白朮茯苓各六錢右十四味以水一斗先煮麻黃一二沸去上沬內諸藥煮取三升去渣分溫三服相去如炊三斗米頃令盡汗出愈四逆湯證下手足厥冷脈細欲絕者當歸四逆湯主之上篇論外熱內寒兼吐利嘔逆煩躁等證此篇但論厥陰脈證雖無外衛之微陽亦未見內寒諸險證也當歸四逆湯當歸桂枝芍藥細辛各三兩甘草炙通草各二兩大棗二十五枚擘一法十二枚右七味以水八升煮取三升去渣溫服一升日三服此條證為在裏當是四逆本方加當歸如茯苓四逆之例若反用桂枝湯攻表誤矣既名四逆湯豈得無薑附若其人內有久寒者宜當歸四逆加吳茱萸生薑湯當歸四逆加吳茱萸生薑湯即前方加吳茱萸一兩生薑半斤切片右九味以水六升清酒六升和煮取五升去渣溫分五服此本是四逆與吳茱萸相合而為偶方也吳萸配附子生薑佐乾薑久寒始去凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也手足六經之脈皆自陰傳陽自陽傳陰陰氣勝則陽不達於四肢故為寒厥諸四逆厥者不可下之虛家亦然熱厥者有可下之理寒厥為虛則宜溫補傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死其脈空虛此無血也病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也關元在臍下三寸小腸之募三陰任脈之會宜灸之按此二條當知結胸證有熱厥者傷寒脈促手足厥者可灸之促為陽脈亦有陽虛而促者亦有陰盛而促者要知促與結皆代之互文皆是虛脈火氣雖微內攻有力故灸之傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死厥陰肝脈也應春生之氣故灸其五俞而陽可回也右論厥陰脈證發汗若下之病仍不解煩躁者茯苓四逆湯主之未經汗下而煩躁為陽盛汗下後而煩躁是陽虛汗多既亡陽下多又亡陰故熱仍不解薑附以回陽參苓以滋陰則煩躁止而外熱自除此又陰陽雙補法茯苓四逆湯茯苓四兩人參一兩附子一枚去皮生用切八片甘草二兩炙乾薑一兩五錢右五味以水五升煮取三升去渣溫服七合日二服下後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之當發汗而反下之下後不解復發其汗汗出而裏陽將脫故煩躁也晝日不得眠虛邪獨據陽熱分也夜而安靜知陰不虛也不嘔渴是無裏熱不惡寒頭痛是無表證脈沉微是純陰無陽矣身無大熱表陽將去矣幸此微熱未除煩躁不寧之際獨在乾薑生附以急回其陽此四逆之變劑也乾薑附子湯乾薑一兩附子一枚去皮生用切八片右二味以水三升煮取一升去渣頓服下之後復發汗必振寒脈微細所以然者內外俱虛故也內陽虛故脈微細外陽虛故振慄惡寒即乾薑附子證右論四逆加減證吳茱萸湯證少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之少陰病吐利煩躁四逆者死四逆者四肢厥冷兼臂脛而言此云手足是指指掌而言四肢之陽猶在歧伯曰四末陰陽之會氣之大路也四街者氣之經絡也絡絕則經通四末解則氣從合故用吳茱萸湯以溫之吐利止而煩躁除陰邪入於合者更得從陽而出乎井矣乾嘔吐涎沬頭痛者吳茱萸湯主之不頭痛者半夏乾薑湯主之嘔而無物胃虛可知矣吐惟涎沬胃寒可知矣頭痛者陽氣不足陰寒得以乘之也吳茱萸湯溫中益氣升陽散寒嘔痛盡除矣乾嘔吐涎是二證不是並見食穀欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也胃熱則消穀善饑胃寒則水穀不納食穀欲嘔固是胃寒服湯反劇者以痰飲在上焦為患嘔盡自愈非謂不宜服也此與陽明不大便服柴胡湯胃氣因和者不同吳茱萸湯吳茱萸一升湯先七次人參三兩生薑六兩大棗十二枚水七升煮取二升溫服七合日三服吳萸溫中散寒則吐利可除人參安神定志則煩躁可止薑棗調和營衛則手足自溫頭痛自瘳矣諸嘔穀不得下者小半夏湯主之反胃嘔吐者大半夏湯主之反胃吐而渴欲飲水者茯苓澤瀉湯主之茯苓澤瀉湯茯苓桂枝白朮澤瀉甘草生薑乾嘔噦若手足厥者橘皮湯主之橘皮湯橘皮生薑嘔逆者橘皮竹茹湯主之橘皮竹茹湯橘皮竹茹大棗生薑甘草人參白通湯證少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯後脈暴出者死微續者生下利脈微是下焦虛寒不能制水故也與白通湯以通其陽補虛卻寒而制水服之利仍不止便厥逆反無脈是陰盛格陽也如乾嘔而煩是陽欲通而不得通也豬者水畜屬少陰也膽者甲木從少陽也法當取豬膽汁之苦寒為反佐加入白通湯中從陰引陽則陰盛格陽者當成水火既濟矣脈暴出者孤陽獨行也故死微續者少陽初生也故生白通湯蔥白四莖乾薑一兩附子一枚去皮生用右三味水水三升煮取一升去渣分溫再服白通加豬膽汁湯本方加人尿五合豬膽汁一合和合相得分溫再服無豬膽汁亦可服蔥辛溫而莖白通肺以行營衛陰陽故能散邪而通陽氣率領薑附入陽明而止利入少陰而生脈也附子生用亦取其勇氣耳論中不及人尿而方反云無豬膽汁亦可服者以人尿鹹寒宜達下焦亦能止煩除嘔矣下利手足逆冷無脈者灸之不溫若脈不還反微喘者死下利後脈絕手足厥冷晬時脈還手足溫者生脈不還者死此不嘔不煩不須反佐而服白通外灸少陰及丹田氣海或可救于萬一黃連阿膠湯證少陰病得之二三日心中煩不得臥黃連阿膠湯主之此病發於陰熱為在裏與二三日無裏證而熱在表者不同按少陰受病當五六日發然發於二三日居多二三日背惡寒者腎火衰敗也必溫補以益陽反發熱者腎水不藏也宜微汗以固陽口燥咽乾者腎火上走空竅急下之以存津液此心中煩不得臥者腎火上攻於心也當滋陰以涼心腎黃連阿膠湯黃連四兩阿膠三兩黃芩芍藥各二兩雞子黃三枚右五味以水六升先煮三物取二升去渣內阿膠烊盡少冷內雞子黃攪令相得溫服七合日三服雞感巽化得心之母氣者也黃稟內南方火色率芍藥之酸入心而斂神明引芩連之苦入心而清壯火驢皮被北方水色入通於腎濟水性急趨下內合於心與之相溶而成膠是火位之下陰精承之凡位以內為陰外為陽色以黑為陰赤為陽雞黃赤而居內驢皮黑而居外法坎官陽內陰外之象因以制壯火之食氣取豬苓湯證少陰病下利六七日欬而嘔渴心煩不得眠者豬苓湯主之少陰病但欲寐心煩而反不得臥是黃連阿膠證也然二三日心煩是實熱六七日心煩是虛煩矣且下利而熱渴是下焦虛不能制水之故非芩連芍藥所宜欬嘔煩渴者是腎水不升下利不眠者是心火不降耳凡利水之劑必先上升而後下降故用豬苓湯主之以滋陰利水而升津液斯上焦如霧而欬渴除中焦如漚而煩嘔靜下焦如瀆而利自止矣豬苓湯豬苓澤瀉茯苓滑石阿膠各一兩右五味以水四升先煮四味取二升內阿膠烊盡溫服七合日一服五味皆潤下之品為少陰樞機之劑豬苓阿膠黑色通腎理少陰之本也茯苓滑石白色通肺滋少陰之源也澤瀉阿膠鹹先入腎壯少陰之體二苓滑石淡滲膀胱利少陰之用故能升水降火有治陰和陽通理三焦之妙陽明病若脈浮發熱渴欲飲水小便不利者豬苓湯主之脈證全同五苓彼以太陽寒水利於發汗汗出則膀胱氣化而小便行故利水之中仍兼發汗之味此陽明燥土最忌發汗汗之則胃亡津液而小便更不利所以利水之中仍用滋陰之品二方同為利水太陽用五苓者因寒水在心下故有水逆之證桂枝以散寒白朮以培土也陽明用豬苓者因熱邪在胃中故有自汗證滑石以滋土阿膠以生津也散以散寒湯以潤燥用意微矣二方皆是散飲之劑太陽轉屬陽明者其渴尚在上焦故仍用五苓入心而生津陽明自病而渴者本於中焦故又藉豬苓入胃而通津液陽明病汗多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小故也陽明病重在亡津液飲水多而汗不多小便不利者可與豬苓湯利之若汗出多以大便燥飲水多即無小便不可利之不知豬苓湯本為陽明飲多而用不為陽明利水而用也不可與豬苓湯即屬腑者不令溲數之意以此見陽明之用豬芩亦仲景不得已之意矣汗多而渴當白虎湯胃中燥當承氣湯其在言外豬膚湯證少陰病下利咽痛胸滿心煩者豬膚湯主之少陰下利下焦虛矣少陰脈循喉嚨其支者出絡心注胸中咽痛胸滿心煩者腎火不藏循經而上走於陽分也陽併於上陰併於下火不下交於腎水不上承於心此未濟之象豬為水畜而津液在膚君其膚以除上浮之虛火佐白蜜白粉之甘瀉心潤肺而和脾滋化源培母氣水升火降上熱自除而下利止矣豬膚湯豬膚一兩右一味以水一斗煮取五升去渣加白蜜一升白粉五合熬香和合相得溫分六服附咽痛諸方少陰病二三日咽痛者可與甘草湯不差者與桔梗湯但咽痛而無下利胸滿心煩等證但甘以緩之足矣不差者配以桔梗辛以散之也其熱微故用此輕劑耳甘草湯甘草二兩右一味以水三煮取一升半去渣分溫再服桔梗湯甘草桔梗各二兩餘同前法少陰病咽中痛半夏散及湯主之半夏散半夏桂枝甘草右三味各等分各搗篩已合治之白飲和服方寸匕日二服若不能散服以水一升煎七沸內散方寸匕更煮三沸下火令少冷少少嚥之此必有惡寒欲嘔證故加桂枝以散寒半夏以除嘔若夾相火則辛溫非所宜矣少陰病嘔而咽中傷生瘡不能語聲不出者苦酒湯主之苦酒湯半夏十四枚洗破如棗核大雞子一枚去黃存留殼中右二味內半夏苦酒著雞子內以雞子置刀鐶中安火上令三沸去渣少少含嚥之不差更作三劑取苦酒以斂瘡雞子以發聲而兼半夏者必因嘔而咽傷胸中之痰飲尚在故用之且以散雞子苦酒之酸寒但令滋潤其咽不令泥痰於胸膈也置刀鐶中放火上只三沸即去渣此略見火氣不欲盡山其味意可知矣雞子黃走血分故心煩不臥者宜之其白走氣分故聲不出者宜之四逆散證少陰病四逆洩利下重其人或欬或悸或小便不利或腹痛者四逆散主之四肢為諸陽之本陽氣不達於四肢因而厥逆故四肢多屬於陰此則洩利下重是陽邪下陷入陰中陽內而陰反外以致陰陽脈氣不相順接也可知以手足厥冷為熱厥四肢厥寒為寒厥者亦鑿矣條中無主證而皆是或然證四逆下必有闕文今以洩利下重四字移至四逆下則本方乃有綱目或欬或利或小便不利同小青龍證厥而心悸同茯苓甘草證或欬或利或腹中痛或小便不利又同真武證種種是水氣為患不發汗利水者洩利下重故也洩利下重又不用白頭翁湯者四逆故也此少陰樞無主故多或然之證因取四物以散四逆之熱邪隨症加味以治或然證此少陰氣分之下劑也所謂厥應下之者此方是矣四逆散甘草炙枳實柴胡芍藥右四味各十分搗篩白飲和服方寸匕日三服咳者加五味子乾薑各五分併主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令拆洩利下重者先以水五升內薤白三升煮取三升去渣以散三方寸匕內湯中煮取一升半分溫再服此倣大柴胡之下法也以少陰為陰樞故去黃芩之苦寒薑夏之辛散加甘草以易大棗良有深意然服方寸匕恐不濟事少陽心下悸者加茯苓此加桂枝少陽腹中痛者加芍藥此加附子其法雖有陰陽之別恐非泄利下重者宜加也薤白性滑能洩下焦陰陽氣滯然辛溫太甚葷氣逼人頓用三升而入散三匕只聞薤氣而不知藥味矣且加味俱用五分而附子一枚薤白三升何多寡不同若是不能不致疑於叔和編集之誤耳厥陰脈證厥陰之為病消渴氣上撞心心中疼熱饑而不欲食食即吐蚘下之利不止太陰厥陰皆以裏證為提綱太陰主寒厥陰主熱太陰為陰中之至陰厥陰為陰中之陽也太陰腹滿而吐食不下厥陰饑不欲食食即吐蚘同是不能食而太陰則滿厥陰則饑同是一吐而太陰吐食厥陰吐蚘此又主脾主肝之別也太陰病則氣下陷故腹時痛而自利厥陰病則氣上逆故心疼熱而消渴此溼土風木之殊也太陰主開本自利而下之則開折胸下結鞕者開折及闔也厥陰主闔氣上逆而下之則闔折利不止者闔折反開也按兩陰交盡名曰厥陰陰盡而陽生故又名陰之絕陽則厥陰為病宜無熱病矣以厥陰脈絡於少陽厥陰熱症皆相火化令耳厥陰經脈上膈貫肝氣旺故上撞心氣有餘即是火故消渴而心中疼熱火能消物故饑肝脈挾胃肝氣旺故胃口閉塞而不欲食也蟲為風化厥陰病則生蚘蚘聞食臭則上入於膈而從口出也病發於陰而反下之則氣無止息而利不上矣烏梅丸主之可以除蚘亦可以止利傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名日縱刺期門腹滿譫語得太陰陽明內證脈浮而緊得太陽陽明表脈陰陽表裏疑似難明則證當詳辨脈宜類推脈法曰脈浮而緊者名曰弦也弦為肝脈內經曰諸腹脹大皆屬於熱又曰肝氣甚則多言是腹滿由肝火而譫語乃肝旺所發也肝旺刖侮其所勝直犯脾土故曰縱刺期門以瀉之庶不犯厥陰汗下禁上條是肝乘心此條是肝乘脾下條是肝乘肺肝為相火有瀉無補者此類是也傷寒發汗嗇嗇惡寒大渴欲飲水其腹必滿此肝乘肺也名曰橫刺期門自汗出小便利其病欲解發熱惡寒寒為在表渴欲飲水熱為在裏其腹因飲多而滿非太陰之腹滿亦非厥陰之消渴矣此肝邪挾火而剋金脾精不上歸於肺故大渴肺氣不能通調水道故腹滿是侮所不勝寡於畏也故名曰橫必刺期門隨其實而瀉之得自汗則惡寒發熱自解得小便利則腹滿自除矣厥陰病渴欲飲水者少少與之愈水能生木能制火故厥陰消渴最宜之厥陰中風脈微浮為欲愈不浮為未愈厥陰受病則尺寸微緩而不浮今微浮是陰出之陽亦陰病見陽脈也有厥陰中風欲愈脈則應有未愈證夫以風木之藏值風木主氣時復中於風則變端必有更甚他經者不得一焉不能無闕文之憾厥陰病欲解時從丑至卯上木剋於丑旺於寅卯故主此卯上凡傷寒病後腹中有動氣者不可汗亦不可下在右肺之動也在左肝之動也在上心之動也在下腎之動也烏梅丸證傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非蚘厥也蚘厥者其人當吐蚘今病者靜而復時煩此非藏寒蚘上入膈故煩須臾復止得食而嘔又煩者蚘聞食臭出其人故吐蚘吐蚘者烏梅丸主之又主久利傷寒脈微厥冷煩躁者在六七日急灸厥陰以救之此至七八日而膚冷不煩而躁是純陰無陽因藏寒而厥不治之證矣然蚘厥之證亦有脈微膚冷者是內熱而外寒勿遽認為藏厥而不治也其顯證在吐蚘而細辨在煩躁藏寒則躁而不煩內熱則煩而不躁其人靜而時煩與躁而無暫安者迴殊矣此與氣上撞心心中疼熱饑不能食食即吐蚘者互文以見意也夫蛔者蟲也因所食生冷之物與胃中濕熱之氣相結而成今風木為患相火上攻故不下行穀道而上出咽喉故用藥亦寒熱相須也此是胸中煩而吐蚘不是胃中寒而吐蚘故可用連柏要知連柏是寒因熱用不特苦以安蚘看厥陰諸證與本方相符下之利不止與又主久利句合則烏梅丸為厥陰主方非只為蚘厥之劑矣烏梅丸烏梅二百枚細辛六兩乾薑十兩黃連十六兩當歸四兩附子六兩炮去皮蜀椒四兩出汗桂枝六兩去皮人參六兩黃柏六兩右十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟擣成泥和藥令相得內臼中與蜜杵三千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等蚘從風化得酸則靜得辛則伏得苦則下故用烏梅苦酒至酸者為君薑椒辛附連柏大辛大苦者為臣佐參歸以調氣血桂枝以散風邪藉米之氣以和胃蜜之味以引蚘少與之而漸加之則煩漸止而蚘漸化矣食生冷則蚘動得滑物則蚘上入膈故禁之蚘蟲之為病令人吐涎心痛發作有時毒藥不止甘草粉蜜湯主之將甘草先煎納粉蜜攪和服白頭翁證熱利下重者白頭翁湯主之暴注下迫屬于熱熱利下重乃溼熱之穢氣發過廣腸故魄門重滯而難出也內經曰小腸移熱於大腸為虛瘕即此是也下利欲飲水者以有熱故也白頭翁湯主之下利屬胃寒者多此欲飲水其內熱可知下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死前條論證此條言脈互相發明復出發熱二字見熱利指內熱不是協熱沉為在裏弦為少陽此膽氣不升火邪下陷故下重也脈大為陽明兩陽相熏灼大則病進故為未止微弱為虛利後而數亦為虛故欲自止發熱者熱自裏達外陰出之陽故不死下利微熱而渴脈弱者令自愈發熱而微表當自解矣熱利脈弱裏當自解矣可不服白頭翁而待其自愈也乃渴欲飲水之互文下利脈數有微熱汗出令自愈設脈復緊為未解汗出是熱從汗解內從外解之兆緊即弦之互文下利脈數而渴者令自愈設不差必圊膿血以有熱故也脈數有虛有實渴亦有虛有實若自愈則數為虛熱渴為津液未復也若不差則數為實熱渴為邪火正熾矣下利寸脈反浮數尺中自濇者必圊膿血寸為陽沉數是陽陷陰中故圊血今脈反浮是陰出之陽利當自愈矣濇為少血因便膿血後見于尺中亦順脈也前條是未圊膿血因不差而預料之辭此在膿血已圊後因寸浮尺濇而揣摩之辭不得以必字作一例看傷寒六七日不利復發熱而利其人汗出不止者死有陰無陽故也六七日當陰陽自和復發熱而利正氣虛可知汗出不止是陽亡而不能衛外也有陰無陽指內而言此為亡陽與熱利之發熱不死汗出自利者天淵矣白頭翁湯白頭翁二兩黃連黃檗秦皮各三兩右四味以水七升煮取二升去渣溫服一升四物皆苦寒除濕勝熱之品也白頭翁臨風偏靜長于驅風蓋藏府之火靜則治動則病動則生風風生熱也故取其靜以鎮之秦皮木小而高得清陽之氣佐白頭升陽協連柏而清火此熱利下重之劑婦人產後下利極虛白頭翁加甘草阿膠主之熱厥利證傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤其四五日來惡寒無熱可知手足為諸陽之本陰盛而陽不達故厥冷也傷寒三日三陽為盡四五日而厥者三陰受邪也陰經受邪無熱可發陰主藏藏氣實而不能入則還之于府必發熱者寒極而生熱也先厥後熱為陽乘陰陰邪未散故必復發此陰中有陽乃陰陽相搏而為厥熱與厥陰亡陽者迴別也欲知其人陽氣之多寡即觀其厥之微甚厥之久者鬱熱亦久厥之輕者鬱熱亦輕故熱與厥相應耳若陽虛而不能支即成陰厥而無熱矣熱發三陽未入于府者可汗熱在三陰已入于府者可下陰不得有汗而強發之此為逆也陽虛不能外散而為汗必上走空竅口傷爛赤所由至矣然此指熱傷氣而言若動其血或從口鼻或從目出其害有不可言者下之清之謂對汗而言是胃熱而不是胃實非三承氣所宜厥微者當四逆散芍藥枳實以攻裏柴胡甘草以和表也厥深者當白虎湯參甘粳米以扶陽石膏知母以除熱也脈滑而厥者裏有熱也白虎湯主之上條明熱厥之理此條明熱厥之脈并熱厥之方脈弱以滑是有胃氣緩而滑名熱中與寒厥之脈微欲絕者大相徑庭矣當知有口燥舌乾之證與口傷爛赤者照應焉傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日故知自愈陰盛格陽故先厥陰極陽生故後熱熱與厥相應是謂陰陽和平故愈厥終即不厥也不過五日即六日不復厥之謂愈指熱言傷寒熱少厥微指頭寒默默不欲飲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅逆滿者其後必便血身無大熱手足不冷但指頭寒此熱微厥亦微也凡能食不嘔是三陰不受邪若其人不嘔但默默不欲飲食此內寒亦微煩燥是內熱反盛數日來小便之難者已利色赤者仍白是陰陽自和熱除可知不欲食者今欲得食不厥可知矣若其人外雖熱少厥微而嘔不能食內寒稍深矣胸脅逆滿內熱亦深矣熱深厥深不早治之致熱傷陰絡其後必便血也此少陽半表半裏症微者小柴胡和之深者大柴胡下之傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血傷寒以陽為主熱多當愈熱不除為太過熱深厥微必傷陰絡醫者當于陽盛時預滋其陰以善其後也四日至七日自發熱起至厥止而言熱不除指復熱四日復熱四日句語意在其病當愈下傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也凡厥與熱不相應便謂之反上文先熱後厥是陽為主此先厥後熱是陰為主熱不及厥之一厥反進熱之二熱微而厥反勝此時不急扶其陽陰盛以亡矣傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以素餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在脈和者期之是日夜半愈所以然者本發熱六日厥反九日復發熱三日并前六日亦為九日與厥相應故期之是日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也病雖發于陽而陰反勝之厥利此胃陽將乏竭矣如胃陽未亡腹中不冷尚能化食故食之自安若除中則反見善食之狀如中空無陽今俗云食祿將盡者是也此為陽邪入陰原是熱厥熱利故能食而不為除中其人必有煩躁見于外是厥深熱亦深故九日復能發熱復熱則厥利自止可知曰熱續在則與暴出有別續熱三日來其脈自和可知熱當自止正與厥相應故愈此愈指熱言夜半者陽得陰則解也若續熱三日而數可知熱之不止是陽氣有餘必有癰膿之患便膿血是陽邪下注于陰竅發癰膿是陽邪外溢于形身俗所云傷寒留毒者是也發熱而厥七日下利為難治發于陽者當七日愈今厥不止而反下利恐為除中故難治若躁煩而能食尚為熱厥利耳便膿血發癰膿者是不足而往有餘從之也發而厥除中者是有餘而往不足隨之也傷寒先厥後發熱而利者必自止見厥復利先厥利而後發熱者寒邪盛而陽氣微陽為陰抑故也其始也無熱惡寒而復厥利疑為無陽其繼也發熱而厥利自止是為晚發此時陰陽自和則愈若陰氣勝則虛熱外退而真寒內生厥利復作矣厥與利相應則愈是陽消陰長之機傷寒先厥後發熱而下利必自止而反汗出咽中痛者其喉為痺發熱無汗而利必自止若不止必便膿血便膿血者其喉不痺此與上條同為先陰後陽寒盛生熱之證而陽氣虛實不同上條陽不敵陰故陽退而陰進此熱雖發汗厥後而陽能勝陰故厥利自止而不復發然陽氣有餘者又有犯上陷下之不同即可以發熱時有汗無汗為區別下利不當有汗有汗是陽反上升故咽中痛而成喉痺無汗是陽從中發熱與厥應厥利止而而寒熱自解矣若厥止而熱與利不止是陽邪下陷必便膿血下而不止故咽不痛而喉不痺上段似少陰之亡陽下段似陽明之協熱利汗因于心無汗則心氣平故火不上炎而咽不痛利因于胃利止則胃液藏故火不下陷而無膿血傷寒發熱下利至甚厥不止者死傷寒發熱下利厥逆躁不得臥者死厥利不止藏府氣絕矣躁不得臥精神不治矣微陽不久留故死復脈湯證傷寒脈結代心動悸者炙甘草湯主之寒傷心主神明不安故動悸心不主脈失其常度故結代也結與代皆為陰脈傷寒有此所謂陽證見陰脈者死矣不忍坐視姑製炙甘草湯名曰復脈云以見仁人君子之用心更欲挽回于天事已之候耳收檢餘燼背城借一猶勝于束手待斃乎炙甘草湯甘草四兩炙桂枝生薑各三兩麥門冬半升棗仁半升舊本用麻仁者誤人參阿膠各二兩大棗三十枚生地黃一斤右九味以酒七升水八升先煮八味取三升去渣內膠得令溫服一升日三服一百十三方未有用及地黃麥冬者恐亦叔和所附然以二味已載神農本經為滋陰之上品因傷寒一書故置之不用耳此或陽亢陰竭而然復出補陰制陽之路以開後學滋陰一法乎地黃麥冬阿膠滋陰人參桂枝清酒以通脈甘草薑棗以和營衛酸棗仁以安神結代可和而悸動可止矣所謂補心之陽寒亦通行者歟脈來緩時一止復來者名曰結脈來數時一止復來者名曰促陽盛則促陰盛則結此皆病脈持其脈口五十動而不一止者五藏皆受氣呼吸閏息脈以五至為平太過不及是陰陽偏勝失其常度矣偏勝之脈更為邪阻則止而不前陽邪盛而數中見止名曰促有急趨忽蹶之象也陰邪盛而緩中見止名曰結有綿綿瀉漆之狀也陽盛可知為陰虛之病脈陰盛可知為陽虛之病狀矣又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動者名曰代陰也得此脈者難治陰陽相搏而脈動傷寒見此是形冷惡寒三焦皆傷矣況有動中見止更來小數中有還者反動宛如雀啄之狀不以名促反從結名者以其為心家真藏之陰脈也更有動而中止不能自還因而復動者宛如蝦游之狀不可名結因得代名者以乍疏乍數為脾家將絕之陰脈脈瞥瞥如羹上肥者陽氣衰也脈縈縈如蜘蛛絲者陰氣衰也浮而虛大者陽已無根沉而虛細者陰已無根甚脈浮而汗出如流珠者衛氣衰也脈綿綿如瀉漆之絕者亡其血也脈浮為陽盛法當無汗而反汗出如流珠是陽虛不能衛外而為固絕汗出矣陰虛不能藏精而主血綿綿其去如瀉漆矣傷寒欬逆上氣其脈散者死謂其形損故也外寒傷形內熱傷氣欬逆不止氣升而不下散而不朝心肺之氣已絕矣原其欬逆之故因于寒傷形形氣不相保耳脈浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此為命絕也脈浮而洪不是死脈而汗出如油是心液盡脫陽反獨留之脈也治節不行倉廩不納形神無主無生理矣又未知何藏先受其災若汗出髮潤喘不休者此為肺先絕也陽反獨留形體如煙熏直視搖頭者此為心絕也脣吻反青四肢漐習者此為肝絕也環口黧黑柔汗發黃者此為脾絕也溲便遺失狂言目反視者此為腎絕也又未知何藏陰陽先絕者陽氣前絕陰氣後竭者其人死身色必青陰氣前絕陽氣後竭者其人死身色必赤腋下溫心下熱也五藏相生一藏受災四藏不救陰陽相須彼氣先絕此氣不存有司命之責者可不調于未災未絕之先乎陰陽易證傷寒陰陽易之為病其人身體重少氣少腹裏急小便不利陰中拘攀熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒褌散主之此證無內外因本非傷寒而冠以傷寒者原其因也無惡寒發熱之表證無胃實自利之裏因淫情之不禁而餘邪得以投其隙移禍于不病之人頓令一身之精氣神形皆受慾火之為害是不病於傷寒而病於陰陽之易也勿得以男女分名也夫邪之所湊其氣必虛陰虛而淫邪湊之故少氣而熱上衝胸氣少不能運軀故頭重不舉身體皆重邪中於陰故陰中拘攣衝任脈傷故小腹裏急精神散亂故眼中生花搖動筋骨故膝脛拘急病由於腎毒侵水道故小便不利耳諒非土木金石之味所能愈仍須陰陽感召之理以制之斯褌襠之以意相求也燒褌散右取婦人中褌近隱處者剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈婦人病取男子褌襠燒灰諸寒熱證病人身大熱反欲近衣者熱在皮膚寒在骨髓也病人身大寒反不欲近衣者寒在皮膚熱在骨髓也此屬內因不是外感亦不關於七情病在形軀不涉藏府亦不犯於經絡故無六經脈證之可憑非天時寒熱所可拘也是病只在骨髓不在皮膚皮膚寒熱是指天時不是指病兩身字言身當其時也若指皮膚則不可為骨髓非身矣風寒之邪得之于驟故無定體或發熱惡寒或骨內熱而藏府寒或手足寒而腸胃熱或內外皆寒或表裏俱熱此骨髓之邪積漸使然故無定體傷寒中風之寒是時令之邪氣故感其邪者畏而惡之此大熱大寒是時令之正氣因病非外來故反欲之傷寒中風之發熱是人身之陽氣故能與寒氣相爭此骨髓之寒熱是漸積之伏邪故雖逢天令之大寒大熱亦不能除時大熱而身反欲複衣時大寒而反欲裸身此病在骨髓與病營衛者不同法當以六味八味二丸補腎中之真陰真陽而骨髓之畜熱痼寒可得漸平耳原化嗣伯水攻之法但可以資譚柄而不可為繼也問曰病有洒淅惡寒而復發熱者何答曰陰脈不足陽往從之陽脈不足陰往乘之曰何謂陽不足答曰假令寸口脈微名曰陽不足陰氣上入陽中則洒淅惡寒也曰何謂陰不足答曰尺脈弱名曰陰不足陽氣下陷入陰中則發熱也前條病在骨髓故著而不移此病在經絡故寒熱反覆然與外感之往來寒熱瘧疾之鼓頷戰慄又不同病得之外感而惡寒發熱者必見有餘之脈病得之內因而惡寒發熱者全是不足之脈見脈之不足則寒固為虛寒而熱亦為虛熱矣寸者陽所治也寸口脈微則微為無陽是陽脈不足故下焦之陰寒得以上乘陽位而洒淅惡寒也尺者陰所治也尺脈弱為血虛是陰脈不足故上焦虛陽得以下陷陰部而發熱也人身陰陽之氣互為之根而又以陽為主故陽脈微則陰脈亦弱其始也乘陽而惡寒陰不平則陽不祕故繼也從不發熱夫陽為陰乘陽脈固見其不足而陰脈亦不見其有餘陽雖微尚能發熱不終惡寒猶不失陽道實陰道虛之定局耳亡陽則陰不獨存矣故治之者當以扶陽為急此補中益氣之方為功最巨也病人脈微而濇者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著複衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗使陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著複衣十一月之時陽氣在裏胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲濇故知亡血也先寒後熱陽微陰弱具證與上文同前條病因在血脈虛此病因在妄汗下以致亡血而脈微濇也夏月四句是寫寒熱發作時狀始而惡寒雖在盛夏欲著複衣繼而發熱雖當隆冬欲裸其身此是設辭勿以無休止時作綿連冬夏解也醫發其汗以下又重釋前義亦蛇足矣此條又可分作四證者寒熱往來不休如瘧者為一證或陽氣內微但惡寒不發熱病在盛暑而欲著複衣者為一證或陰氣內弱但發熱不惡寒病在隆冬而欲裸身者為一證或其人綿連冬夏在盛暑反惡寒隆冬反惡熱為一證此各從元氣之厚薄而寒熱為之淺深耳陽毒之為病面赤斑斑如錦紋咽喉痛吐膿血五日可治七日不可治升麻鱉甲湯主之陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀附主之升麻鱉甲湯升麻蜀附當歸雄黃甘草鱉甲傷寒來蘇集終
