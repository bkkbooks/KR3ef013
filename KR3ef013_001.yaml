body:
  text: 卷一傷寒總論病有發熱惡寒者發於陽也無熱惡寒者發於陰也無熱指初得病時不是到底無熱發陰指陽證之陰非指直中於陰陰陽指寒熱勿鑿分營衛經絡按本論云太陽病或未發熱或已發熱已發熱即是發熱惡寒未發熱即是無熱惡寒斯時頭項強痛已見第陽氣閉鬱尚未宣發其惡寒體痛嘔逆脈緊純是陰寒為病故稱發於陰此太陽病發於陰也又陽明篇云病得之一日不發熱而惡寒斯時寒邪凝斂身熱惡熱全然未露但不頭項強痛是知陽明之病發於陰也推此則少陽往來寒熱但惡寒而脈弦細者亦病發於陰而三陰之反發熱者便是發於陽矣發於陽者七日愈發於陰者六日愈以陽數七陰數六故也寒熱者水火之本體水火者陰陽之徵兆七日合火之成數六日合水之成數至此則陰陽自和故愈蓋陰陽互為其根陽中無陰謂之孤陽陰中無陽便是死陰若是直中之陰無一陽之生氣安得合六成之數而愈耶內經曰其死多以六七日之間其愈皆以十日以上使死期亦合陰陽之數而愈期不合者皆治者不如法耳問曰凡病欲知何時得何時愈答曰假令夜半得病者明日日中愈日中得病者夜半愈何以言之日中得病夜半愈者以陽得陰則解夜半得病明日日中愈者以陰得陽則解也上文論日期合陰陽之數而愈此論愈時於陰陽反盛時解何也陰盛極而陽生陽盛極而陰生陰陽之相生正陰陽之相得即陰陽之自和也然此指病在一二日愈者言耳如六七日愈者則六經各以主時解是又陽主晝而陰主夜矣問曰脈有陰陽何謂也答曰凡脈浮大滑動數此名陽也脈沈弱澀弦微遲此名陰也脈有十種陰陽兩分即具五法浮沈是脈體大弱是脈勢滑澀是脈氣動弦是脈形遲數是脈息總是病脈而非平脈也脈有對看法有正看法有反看法有平看法有互看法有徹底看法如有浮即有沈有大即有弱有滑即有澀有數即有遲合之於病則浮為在表沈為在裏大為有餘弱為不足滑為血多澀為氣少動為博陽弦為博陰數為在府遲為在藏此對看法也如浮大滑動數脈氣之有餘者名陽當知其中有陽勝陰病之機沈弱澀弦遲脈氣之不足者名陰當知其中有陰勝陽病之機此正看法也夫陰陽之在天地間也有餘而往不足隨之不足而往有餘從之知從知隨氣可與期故其始為浮為大為滑為動為數其繼也反沈反弱反澀反弦反遲者是陽消陰長之機其病為進其始也為沈為弱為澀為弦為遲其繼也微浮微大微滑微動微數者是陽進陰退之機其病為欲愈此反看法也浮為陽如更兼大動滑數之陽脈是為重陽必陽盛陰虛之病矣沈為陰而更兼弱澀弦遲之陰脈是為重陰必陰盛陽虛之病矣此為平看法如浮而弱浮而澀浮而弦浮而遲者此陽中有陰其人陽虛而陰氣早伏於陽脈中也將有亡陽之變當以扶陽為急務矣如沈而大沈而滑沈而動沈而數者此陰中有陽其人陰虛而陽邪下陷於陰脈中也將有陰竭之患當以存陰為深慮矣此為互看法如浮大滑動數之脈體雖不變然始為有力之強陽終為無力之微陽知陽將絶矣沈弱澀弦遲之脈雖喜變而為陽如忽然暴見浮大滑動數之狀是陰極似陽知反照之不長餘燼之易滅也是謂徹底看法更有真陰真陽之看法所謂陽者胃脘之陽也脈有胃氣是知不死所謂陰者真藏之脈也脈見真藏者死然邪氣之來也緊而疾穀氣之來也徐而和此又不得以遲數定陰陽矣寸口脈浮為有表沈為在裏數為在府遲為在藏寸口兼兩手六部而言不專指右寸也上古以三部九候決死生是遍求法以人迎寸口趺陽辨吉凶是扼要法自難經獨取寸口并人迎趺陽不參矣然氣口成寸為脈之大會死生吉凶繫焉則內外藏府之診全賴浮沈遲數為大網耳浮沈是審起伏遲數是察至數浮沈之間遲數寓焉凡脈之不浮不沈而在中不遲不數而五至者謂之平脈是有胃氣可以神求不可以象求也若一見浮沈遲數之象斯為病脈矣浮象在表應病亦為在表浮脈雖有裏證主表其大綱也沈象在裏應病亦為在裏沈脈雖或有表證主裏其大綱也數為陽陽主熱而數有浮沈浮數應表熱沈數應裏熱雖數脈亦有病在藏者然六府為陽陽脈營其府則主府其大綱也遲為陰陰主寒而遲有浮沈浮遲應表寒沈遲應裏寒雖遲脈多有病在府者然五藏為陰而陰脈營其藏則主藏其大綱也脈狀種種總該括於浮沈遲數然四者之中又以獨浮獨沈獨遲獨數為準則而獨見何部即以何部深求其表裏藏府之所在病無遁情矣凡陰病見陽脈者生陽病見陰脈者死起口用凡字是開講法不是承接法此與上文陰陽脈文同而義則異也陽脈指胃氣言所謂二十五陽者是也五藏之陽和發見故生陰脈指真藏言胃脘之陽不至於手太陰五藏之真陰發見故死要知上文沈澀弱弦遲是病脈不是死脈其見於陽病最多若真藏脈至如肝脈中外急心脈堅而搏肺脈大而浮腎脈之如彈石脾脈之如喙距反見有餘之象豈可以陽脈名之若以胃脈為遲真陰為數能不誤人耶寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治決死也若計餘命生死之期期以月節剋之也陰陽升降以關為界陽生於尺而動於寸陰生於寸而動於尺陰陽互根之義也寸脈居上而治陽尺脈生下而治陰上下分司之義也寸脈不至關則陽不生陰是為孤陽陽亦將絶矣尺不至關則陰不生陽是為孤陰陰亦將絶矣要知不至關非脈竟不至是將絶之兆而非竟絶也正示人以可續之機此皆不治言皆因前此失治以至此非言不可治也正欲人急治之意是先一著看法夫上部有脈下部無脈尚有吐法上部無脈下部有脈尚為有根即脈絶不至尚有灸法豈以不至關便為死脈哉看餘命生死句則知治之而有餘命不為月節所剋者多耳此又深一層看法脈以應月每月有節節者月之關也失時不治則寸脈不至關者遇月建之屬陰必剋陽而死尺脈不至關者遇月建之陽支則剋陰而死此是決死期之法若治之得宜則陰得陽而解陽得陰而解陰陽自和而愈矣問曰脈欲知病愈未愈者何以別之曰寸口關上尺中三處大小浮沈遲數同等雖有寒熱不解者此脈陰陽為和平雖劇當愈陰陽和平不是陰陽自和不過是純陰純陽無駁雜之謂耳究竟是病脈是未愈時寒熱不脈雖劇當愈非言不治自愈正使人知此為陰陽偏勝之病脈陽劇者當治陽陰劇者當治陰必調其陰陽使其和平失此不治反加劇矣傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也太陽主表故寒邪傷人即太陽先受太陽脈浮若見太陽之浮不兼傷寒之緊即所謂靜也脈靜證亦靜無嘔逆煩躁可知今又有發熱惡寒頭項強痛不須七日衰一日自止者正此不傳之謂也若受寒之日頗有吐意嘔逆之機見矣若見煩躁陽氣重可知矣脈急數陰陽俱緊之互文傳者即內經人傷於寒而傳為熱之傳乃太陽之氣生熱而傳於表即發於陽者七日之謂非太陽與陽明少陽經絡相傳之謂也欲字若字是審其將然脈之數急是診其已然此因脈定證之法也傷寒二三日陽明少陽證不見者為不傳也傷寒一日太陽二日陽明三日少陽者是言見症之期非傳經之日也歧伯曰邪中於面則下陽明中於項則下太陽中於頰則下少陽其中膺背兩脅亦中其經蓋太陽經部位最高故一日發陽明經位次之故二日發少陽經位又次之故三日發是氣有高下病有遠近適其至所為故也夫三陽各受寒邪不必自太陽始諸家言二陽必自太陽傳來者未審斯義耳若傷寒二日當陽明病若不見陽明表證是陽明之熱不傳於表也三日少陽當病不見少陽表證是少陽之熱不傳於表也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也受寒三日不見三陽表症是其人陽氣沖和不與寒爭寒邪亦不得入故三陽盡不受邪也若陰虛而不能支則三陰受邪氣岐伯曰中於陰者從臂胻始故三陰各自受寒邪不必陽經傳授所謂太陰四日少陰五日厥陰六日者亦以陰經之高下為見症之期非六經部位以次相傳之日也三陰受邪病為在裏故邪入太陰則腹滿而吐食不下邪入少陰欲吐不吐邪入厥陰飢而不欲食食即吐蛔所以然者邪自陰經入藏藏氣實而不能容則流於府府者胃也入胃則無所復傳故三陰受病已入於府者可下也若胃陽有餘則能食不嘔可預知三陰之不受邪矣蓋三陽皆看陽明之轉旋三陰之不受邪者藉胃之蔽其外也則胃不特為六經出路而實為三陰外蔽矣胃陽盛則寒邪自解胃陽虛則寒邪深入陰經而為患胃陽亡則水漿不入而死要知三陰受邪關係不在太陽而全在陽明傷寒六七日無大熱其人躁煩者此為陽去入陰故也上文論各經自受寒邪此條是論陽邪自表入裏症也凡傷寒發至六七日熱退身涼為愈此無大熱則微熱尚存若內無煩躁亦可云表解而不了了矣傷寒一日即見煩躁是陽氣外發之機六七日乃陰陽自和之際反見煩躁是陽邪內陷之兆陰者指裏而言非指三陰也或入太陽之本而熱結旁光或入陽明之本而胃中乾燥或入少陽之本而脅下硬滿或入太陰而暴煩下利或入少陰而口燥舌乾或入厥陰而心中疼熱皆入陰之謂太陽病頭痛至七日以上自愈者以行其經盡故也若欲再作經者針足陽明使經不傳則愈舊説傷寒日傳一經六日至厥陰七日再傳太陽八日再傳陽明謂之再經自此説行而仲景之堂無門可入矣夫仲景未嘗有日傳一經之説亦未有傳至三陰而尚頭痛者曰頭痛者是未離太陽可知曰行則與傳不同曰其經是指本經而非他經矣發於陽者七日愈是七日乃太陽一經行盡之期不是六經傳變之日歧伯曰七日太陽病衰頭痛少愈有明證也故不曰傳足陽明而曰欲再作經是太陽過經不解復病陽明而為併病也針足陽明之交截其傳路使邪氣不得入陽明之經則太陽之餘邪亦散非歸併陽明使不犯少陽之謂也本論傳經之説惟見於此蓋陽明經起於鼻額旁納太陽之脈故有傳經之義目疼鼻乾是其症也若腳攣急便非太陽傳經矣陽明經出大指端內側太陽經出小指端外側絡不相連接十二經脈足傳手手傳足陽傳陰陰傳陽與傷寒之六經先陽後陰先太後少之次第迥別不知太陽傳六經陽明傳少陽之説何據乎細審仲景轉屬轉係併病合病諸條傳經之妄不辨自明矣風家表解而不了了者十二日愈不了了者餘邪未除也七日表解後復過一候而五藏元氣始充故十二日精神慧爽而愈此雖舉風家傷寒概之矣如太陽七日病衰頭痛少愈曰衰曰少皆表解而不了了之謂也六經部位有高下故發病有遲早之不同如陽明二日發八日衰厥陰至六日發十二日衰則六經皆自七日解而十二日愈夫若誤治又不在此例仲景分別六經各經俱有中風傷寒脈症治法叔和時太陽篇存者多而失者少他經存者少而失者多陽明篇尚有中風脈症二條少陽經只症一條而不及脈三陰俱有中風欲愈脈俱無中風脈症以傷寒論為全書不亦疏乎右論傷寒診病大略太陽脈證太陽之為病脈浮頭項強痛而惡寒仲景作論大法六經各立病機一條提揭一經綱領必擇本經至當之脈症而表章之六經雖各有表症惟太陽主表故表症表脈獨太陽得其全如脈浮為在表太陽象三陽其脈氣浮而有力與陽明之兼長大少陽兼弦細三陰之微浮者不侔矣頭項主一身之表太陽經絡營於頭會於項故頭連項而強痛與陽明頭額痛少陽頭角痛者少間矣惡寒為病在表六經雖各惡寒而太陽應寒水之化故惡寒特甚與陽月二日自止少陽往來寒熱三陰之內惡寒者懸殊矣後凡言太陽病者必據此條脈症如脈反沈頭不痛項不強不惡寒是太陽之變局矣仲景立六經總綱法與內經熱論不同太陽只重在表症表脈不重在經絡主病看諸總綱各立門戶其意可知太陽病發熱汗出惡風脈緩者名為中風風為陽邪風中太陽兩陽相搏而陰氣衰少陽浮故熱自發陰弱故汗自出中風惡風類相感也風性散漫脈應其象故浮而緩若太陽初受病便見如此脈症即可定其名為中風而非傷寒矣如寒風太厲中之重者或汗不出而脈反緊其內症必煩躁與下傷寒之嘔逆有別太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒太陽受病當一二日發故有即發熱者或有至二日發者蓋寒邪凝斂熱不遽發非若風邪易於發熱耳然即發熱之遲速則其人所稟陽氣之多寡所傷寒邪之淺深因可知矣然雖有已發未發之不齊而惡寒體痛嘔逆之症陰陽俱緊之脈先見即可斷為太陽之傷寒而非中風矣惡寒本太陽本症而此復言者別於中風之惡寒也中風因見風而兼惡寒傷寒則無風而更惡寒矣寒邪外束故體痛寒邪內侵故嘔逆寒則令脈緊陰陽指浮沈而言不專指尺寸也然天寒不甚而傷之輕者亦有身不疼脈浮緩者矣太陽病發熱而渴不惡寒者為溫病太陽病而渴是兼少陰矣然太少兩感者必惡寒而且煩滿今不煩滿則不涉少陰反不惡寒則非傷寒而為溫病矣溫病內外皆熱所以別於中風傷寒之惡寒發熱也此條不是發明內經冬傷於寒春必病溫之義乃概言太陽溫病之症如此若以春溫釋之失仲景之旨矣夫太陽一經四時俱能受病不必於冬人之溫病不必因於傷寒且四俱能病溫不必於春推而廣之則六經俱有溫病非獨太陽一經也發汗已身灼熱者名曰風溫此正與內經伏寒病溫不同處太陽中暑亦有因於傷寒者雖渴而仍惡寒太陽溫病反不惡寒而渴者是病根不因於寒而因於風發熱者病為在表法當汗解然不惡寒則非麻黃桂枝所宜矣風與溫相搏發汗不如法風去而熱反熾灼熱者兩陽相薰灼轉屬陽明之兆也太陽病關節疼痛而煩脈沈而細者此名濕痺上條不惡寒是太陽變症此條脈沈細是太陽變脈渴是少陰症沈細是少陰脈太陽少陰為表裏故脈症相似也然濕自內發與外感不同濕傷於下與傷上者不同故同為太陽受病而脈症與總綱異耳濕流骨節故疼痛太陽之氣不宣故煩濕氣痺閉而不行故脈應其象而沈細太陽之脈從風則緩從寒則緊從濕則細傷上則浮傷下則沈當因症而合脈勿據脈而斷症如病發熱頭疼脈當浮反沈是表症得裏脈故謂之反如發汗多因致痙而沈細與夏月中暑而弦細芤遲皆因症而然不得概謂之反太陽病欲解時從已至未上巳午為陽中之陽故太陽主之至未上者陽過其度也人身陰陽上合於天天氣至太陽之時人身太陽之病得藉其主氣而解此天人感應之理也欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也欲自解便寓不可妄治意諸經皆有煩而太陽更甚故有發煩反煩更煩復煩內煩等症蓋煩為陽邪內擾汗為陽氣外發浮為陽盛之脈脈浮則陽自內發故可必其先煩見其煩必當待其有汗勿遽妄投湯劑也汗出則陽勝而寒邪自解矣若煩而不得汗或汗而不解則審脈定症麻黃桂枝青龍隨所施而恰當矣太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯言未解便有當解意停者相等之謂陽脈微二句承上之詞不得作三假看太陽病陽浮而陰弱是陽強也今陽脈微即是陰陽俱停病雖未解已是調和之脈其解可知矣脈但浮者為陽盛必先煩而有汗陽脈微者為陽虛必先振栗而汗出振搮是陰津內發之兆汗出是陽氣外發之徵也此陰陽自和而愈可勿藥矣但陰脈微而陽脈仍浮陽氣重可知與風寒初中之脈雖同而熱久汗多津液內竭不得更行桂枝湯亦不得執太陽禁下之定法矣表病亦有因裏實而不解者須下之而表自解若欲下之有躊躇顧慮之意宜者審定之詞以其胃不調而氣不承故宜之此條是桂枝湯變局陽已微須其自汗陽尚存當知調胃以太陽汗多恐轉屬陽明太陽病下之而不愈因復發汗此表裏俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得裏未和然後復下之太陽病只得個表不和初無下症其裏不和多由汗下倒施而得也表裏俱虛指妄汗下亡津液言其陽邪仍實故表裏不解冒者如有物蒙蔽之狀是欲汗之兆也因妄下後陽氣怫鬱在表汗不得遽出耳待汗出冒自解然但得個表和其津液兩虛陽已實於裏故裏仍未和裏症既得然後下之此雖復下治不為逆矣問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也戰即振栗之謂治病必求其本本者其人平日稟氣之虛實緊者急也與數同而有別蓋有虛實之分焉又必按之芤不芤而虛實之真假畢實問曰病有不戰不汗出而解者何也答曰其脈自微此以曾經發汗若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而解也內無津液安能作汗戰由汗發無汗故不戰也復用此字須著眼妄治之後內無津液陰陽豈能自和必當調其陰陽不然脈微則為亡陽將轉成陰症矣問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必不汗出也脈而浮數今三日而轉微身初發熱今三日而身涼即傷寒三日少陽脈小為欲愈之義也此傷寒本輕不須合六七日之期亦不必再求其有汗夜半時陽得陰則餘邪盡解矣此微與前條不同因未曾妄治津液未亡故三日自解陰平陽祕不須汗出也正教人不當妄汗耳右論太陽脈症大異桂枝湯證上太陽病頭痛發熱汗出惡風者桂枝湯主之此條是桂枝本證辨症為主合此病即用此湯不必問其為傷寒中風雜病也今人鑿分風寒不知辨症故仲景佳方置之疑窟四症中頭痛是太陽本症頭痛發熱惡風與麻黃症同本方重在汗出汗不出者便非桂枝症太陽病外證未解脈浮弱者當以汗解宜桂枝湯此條是桂枝本脈明脈為主今人辨脈不明故於症不合傷寒中風雜病皆有外證太陽主表表症咸統於太陽然必脈浮弱者可用此解外如但浮不弱或浮而緊者便是麻黃症要知本方只主外症之虛者太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之此太陽中風之桂枝症非謂凡中風者便當主桂枝也前條脈症是概風寒雜病而言此條加中風二字其脈其症悉呈風象矣上條言脈浮而弱者是弱從浮見此陽浮者浮而有力此名陽也風為陽邪此浮為風脈陽盛則陰虛沈按之而弱陽浮者風中於衛兩陽相搏故熱自發是衛強也陰弱者因風中於營血脈不寧故汗自出是營弱也兩自字便見風邪之迅發嗇嗇欲閉之狀淅淅欲開之狀翕翕難開難閉之狀雖風寒熱三氣交呈於皮毛而動象是中風所由然也風之體在動風之用在聲風自皮毛入肺自肺出鼻鼻息不和則鳴此聲之見於外者然也風淫於內木動土虛胃氣不和故嘔而無物此聲之出於內者然也乾嘔是風侵胃府鼻鳴是風襲陽明而稱太陽者以頭項強痛故耳亦以見太陽為三陽陽過其度矣太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈前條治中風之始此條治中風之變桂枝湯煮取三升初服者先服一升也卻與者盡其二升也熱鬱於心胸者謂之煩發於皮肉者謂之熱麻黃症發熱無汗熱全在表桂枝症發熱汗出便見內煩服湯反煩而外熱不解非桂枝湯不當用也以外感之風邪重內之陽氣亦重耳風邪本自項入必刺風池風府疏通來路以出其邪仍與桂枝湯以和營衛內經曰表裏刺之服之飲湯此法是矣太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯主之此釋中風汗出之義見桂枝湯為調和營衛而設營者陰也衛者陽也陰弱不能藏陽強不能密故汗出形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出而愈形作寒見惡寒體痛厥逆脈當弦緊而反浮弱其本虛可知此東垣所云勞倦內傷症也夫脈弱者陰不足陽氣陷於陰分必渴渴者液虛故也若以惡寒而用火攻津液亡必胃實而詀語然脈雖弱而發熱身痛不休宜消息和解其外諒非麻黃所宜必桂枝湯啜熱稀粥汗出則愈矣此為夾虛傷寒之症傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯前條解傷寒之初此條輯傷寒之後前條因虛寒此條因餘熱衛解而營未解故用桂枝更汗也可知桂枝湯主風傷衛治風而不治寒之謬矣浮弱是桂枝脈浮數是麻黃脈仲景見麻黃脈症即用麻黃湯見桂枝脈症便用桂枝湯此不更進麻黃而卻與桂枝者蓋發汗而解則麻黃症已罷脈浮數者因內煩而然不得仍認麻黃湯脈矣麻黃湯純陽之劑不可以治煩桂枝湯內配芍藥奠安營氣正以治煩也且此煩因汗後所致若再用麻黃發汗汗從何來必用啜熱粥法始得汗桂枝湯本治煩服桂枝湯後外熱不解而內熱更甚故曰反煩麻黃症本不煩服湯汗出外熱初解而內熱又發故曰復煩凡曰麻黃湯主之桂枝湯主之者定法也服桂枝不解仍與桂枝汗解後復煩更用桂枝者活法也服麻黃復煩者可更用桂枝用桂枝復煩者不得更用麻黃且麻黃脈症但可用桂枝更汗不可先用桂枝發汗此又活法中定法矣前二條論治中風此二條論治傷寒後二條論治雜病見桂枝方之大用如此病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之藏無他病知病只在形軀發熱有時則汗出亦有時不若外感者發熱汗出不休也內經曰陰虛者陽必湊之故時熱汗出耳未發熱時陽猶在衛用桂枝湯啜稀熱粥先發其汗使陰出之陽穀氣內充而衛陽不復陷是迎而奪之令精勝而邪卻也病嘗自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故耳營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯發熱時汗便出者其營氣不足因陽邪下陷陰不勝陽故汗自出也此無熱而常自汗者其營氣本足因陽氣不固不能衛外故汗自出當乘其汗正出時用桂枝湯啜稀熱粥是陽不足者溫之以氣食入於陰氣長於陽也陽氣普遍便能衛外而為固汗不復出矣和者平也諧者合也不和見衛強不諧見營弱弱則不能合強則不能密皆令自汗但以有熱無熱別之以時出常出辨之總以桂枝湯啜熱粥汗之上條發熱汗出便可用桂枝湯見不必頭痛惡風俱備此只自汗一症即不發熱者亦用之更見桂枝方於自汗為親切耳太陽病外症未解不可下也下之為逆欲解外者宜桂枝湯外症初起有麻黃桂枝之分如當解未解時惟桂枝湯可用故桂枝湯為傷寒中風雜病解外之總方凡脈浮弱汗自出而表不解者咸得而主之也即陽明病脈遲汗出多者宜之太陰病脈浮者亦宜之則知諸經外症之虛者咸得同太陽未解之治法又可見桂枝湯不專為太陽用矣太陽病先發汗不解而復下之脈浮者不愈浮為在外當須解外則愈宜桂枝湯誤下後而脈仍浮可知表症未解陽邪未陷只宜桂枝湯解外勿以脈浮仍用麻黃湯也下後仍可用桂枝湯乃見桂枝方之力量矣太陽病下之其氣上衝者可與桂枝湯用前法若不上衝者不得與之氣上衝者陽氣有餘也故外雖不解亦不內陷仍與桂枝湯汗之上衝者因而外解矣上條論下後未解脈此條論下後未解症互相發明更進桂枝之義用前法是啜稀熱粥法與後文依前法如前法同若謂湯中加下藥大謬傷寒醫下之續得下利清穀不止身疼痛者急當救裏後清便自調身體痛者急當救表救裏宜四逆湯救表宜桂枝湯寒邪在表而妄下之移寒於脾下利不止繼見完穀胃陽已亡矣身疼未除是表裏皆困然猶幸此表邪之未除裏邪有可救之機凡病從外來當先解外此裏症既急當舍表而救裏四逆湯自不容緩裏症既差表症仍在救表亦不容緩矣身疼本麻黃症而下利清穀其腠理之疏可知必桂枝湯和營衛而痛自解故不曰攻而仍曰救救表仍合和中也溫中之後仍可用桂枝湯其神乎神矣下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜四逆湯攻表宜桂枝湯下利而腹尚脹滿其中即伏清穀之機先溫其裏不待其急而始救也裏和而表不解可專治其表故不曰救而仍曰攻吐利止而身痛不休者當消息和解其外宜桂枝湯小和之吐利是藏府不和非桂枝湯所治止後而身痛不休是營衛不和非麻黃湯所宜和解其外惟有桂枝一法消息其宜更有小與之法也蓋脈浮數身疼痛本麻黃之任而在汗下後則反屬桂枝是又桂枝之變脈變症而非復麻黃之本症本脈矣傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯心下痞是誤下後裏症惡寒是汗後未解症裏實表虛內外俱病皆因汗下倒施所致表裏交持仍當遵先表後裏先汗後下正法蓋惡寒之表甚於身疼心下之痞輕於清穀與救急之法不同此四條是有表裏症非桂枝本病亦非桂枝壞病仲景治有表裏症有兩解表裏者有只解表而裏自和者有只和裏而表自解者與此先救裏後救表先解表後攻裏遂成五法傷寒不大便六七日頭痛有熱者與承氣湯其大便圊者知不在裏仍在表也當須發汗若頭痛者必衄宜桂枝湯此辨太陽陽明之法也太陽主表頭痛為主陽明主裏不大便為主然陽明亦有頭痛者濁氣上沖也太陽亦有不大便者陽氣太重也六七日是解病之期七日來仍不大便病為在裏則頭痛身熱屬陽明外不解由於內不通也下之裏和而表自解矣若大便自去則頭痛身熱病為在表仍是太陽宜桂枝汗之若汗後熱退而頭痛不除陽邪盛於陽位也陽絡受傷故知必衄衄乃解矣本條當有汗出症故合用桂枝承氣有熱當作身熱大便圊從宋本訂正恰合不大便句見他本作小便清者謬宜桂枝句直接發汗來不是用桂枝止衄亦非用在已衄後也讀者勿以詞害義可耳太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔圊便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更吐更下也面色反有熱色者未欲解也以其不得小汗出身必癢宜桂枝麻黃各半湯八九日是當解未解之時寒熱如瘧是虛實互發之症太陽以陽為主熱多寒少是主勝客負有將解之兆矣若其人不嘔是胃無邪圊便是胃不實脈微緩是有胃氣應不轉屬陽明一日二三度發是邪無可容之地正勝邪卻可弗藥也若其人熱雖多而脈甚微無和緩之意是陰弱而發熱寒雖少而惡之更甚是陽虛而惡寒陰陽俱虛當調其陰陽勿妄治以虛其虛也若其人熱多寒少而面色緣緣正赤者是陽氣怫鬱在表不得越當汗不汗其身必癢八九日來正氣已虛表邪未解不可發汗又不可不汗故立此法諸本俱是各半今依宋本太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯本論無越婢症亦無越婢方不知何所取義竊謂其二字必誤也此熱多是指發熱不是內熱無陽是陽已虛而陰不虛不煩不躁何得妄用石膏觀麻黃桂枝合半桂枝二麻黃一二方皆當汗之症此言不可發汗何得妄用麻黃凡讀古人書須傳信闕疑不可文飾況為性侕所關者乎且此等脈症最多無陽不可發汗便是仲景法旨柴胡桂枝湯乃是仲景佳方若不頭項強痛並不須合桂枝矣讀書無目至於病人無命愚故表而出之傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外症未去者柴胡桂枝湯主之微惡寒便是寒少煩疼只在四肢骨節間比身疼腰痛稍輕此外症將解而未去之時也微嘔是喜嘔之兆支結是痞滿之始即陽微結之謂是半在表半在裏也外症微故取桂枝之半內症微故取柴胡之半雖不及脈而微弱可知發熱而煩則熱多可知仲景製此輕劑以和解便見無陽不可發汗用麻黃石膏之謬矣本條當有汗出症故合用桂枝承氣有熱當作身熱大便圊從宋本訂正恰合不大便句見他本作小便清者謬宜桂枝句直接發汗來不是用桂枝止衄亦非用在已衄後也讀者勿以詞害義可耳太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔圊便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更吐更下也面色反有熱色者未欲解也以其不得小汗出身必癢宜桂枝麻黃各半湯八九日是當解未解之時寒熱如瘧是虛實互發之症太陽以陽為主熱多寒少是主勝客負有將解之兆矣若其人不嘔是胃無邪圊便是胃不實脈微緩是有胃氣應不轉屬陽明一日二三度發是邪無可容之地正勝邪卻可弗藥也若其人熱雖多而脈甚微無和緩之意是陰弱而發熱寒雖少而惡之更甚是陽虛而惡寒陰陽俱虛當調其陰陽勿妄治以虛其虛也若其人熱多寒少而面色緣緣正赤者是陽氣怫鬱在表不得越當汗不汗其身必癢八九日來正氣已虛表邪未解不可發汗又不可不汗故立此法諸本俱是各半今依宋本太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯本論無越婢症亦無越婢方不知何所取義竊謂其二字必誤也此熱多是指發熱不是內熱無陽是陽已虛而陰不虛不煩不躁何得妄用石膏觀麻黃桂枝合半桂枝二麻黃一二方皆當汗之症此言不可發汗何得妄用麻黃凡讀古人書須傳信闕疑不可文飾況為性命所關者乎且此等脈症最多無陽不可發汗便是仲景法旨柴胡桂枝湯乃是仲景佳方若不頭項強痛並不須合桂枝矣讀書無目至於病人無命愚故表而出之傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外症未去者柴胡桂枝湯主之微惡寒便是寒少煩疼只在四肢骨節間比身疼腰痛稍輕此外症將解而未去之時也微嘔是喜嘔之兆支結是痞滿之始即陽微結之謂是半在表半在裏也外症微故取桂枝之半內症微故取柴胡之半雖不及脈而微弱可知發熱而煩則熱多可知仲景製此輕劑以和解便見無陽不可發汗用麻黃石膏之謬矣桂枝湯桂枝二兩去粗皮芍藥二兩甘草二兩炙生薑二兩大棗十二枚右以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升以助藥力此為仲景群方之冠乃滋陰和陽調和營衛解肌發汗之總方也桂枝赤色通心溫能扶陽散寒甘能益氣生血辛能解散風邪內輔君主發心液而為汗故麻葛青龍凡發汗禦寒咸賴之惟桂枝湯不用麻黃麻黃湯不可無桂枝也本方皆辛甘發散惟芍藥之酸苦微寒能益陰斂血內和營氣故能發汗而止汗先輩言無汗不得服桂枝湯正以中有芍藥能止汗也芍藥之功本在止煩煩止汗亦止故反煩更煩與心悸而煩者咸賴之若倍加芍藥即建中之劑非發汗之劑矣是方用桂枝發汗即用芍藥止汗生薑之辛佐桂以解肌大棗之甘助芍以和裏陰陽表裏並行而不悖是剛柔相濟以為和也甘草甘平有安內攘外之能用以調和氣血者即以調和表裏且以調和諸藥矣而精義又在啜熱稀粥蓋穀氣內充則外邪不復入餘邪不復留方之妙用又如此故用之發汗不至於亡陽用之止汗不至於貽患今醫凡遇發熱不論虛實便禁穀食是何知仲景之心法而有七方之精義者哉溫覆合一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑汗已遍身則邪從汗解此汗生於穀正所以調和營衛濡腠理充肌肉澤皮毛者也令如水流漓使陰不藏精精不勝則邪不卻故病不除世醫只知大發其汗即芍藥亦不敢用汗後再汗豈不誤人若不汗更服依前法又不汗後服小促其間半日許令三服盡前自汗乃衛中邪汗服湯後反無汗是衛分之邪汗已盡但穀氣未充精氣未敷於營分耳依前法便精勝而邪卻藥勢促則病除矣若病重者一日一夜服周時觀之服一劑盡病症猶在者更作服若汗不出乃服至二三劑言病重者藥必倍之一日一夜當作二服病在即促後服勿使間斷便服至三劑無妨蓋桂枝湯是調和營衛與麻黃湯專於發表不同故可重湯疊劑以汗之不必慮其亡陽也若施之他方則誤矣禁生冷粘滑肉麵五辛酒酪臭惡等物凡服藥便當禁此因桂枝為首方故録其後每見病家禁其穀味反與麥飲豈非大悖桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也當須識此勿令誤也解肌者解肌肉之汗也皮膚之汗自出故不用麻黃若脈浮緊是麻黃湯脈汗不出是麻黃湯症桂枝湯無麻黃開腠理而泄皮膚有芍藥斂陰津而制辛熱恐邪氣凝結不能外解勢必內攻為害滋大耳故叮嚀告戒如此桂枝之去其皮去其粗皮也正合解肌之義昧者有去肌取骨之可笑酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也平素好酒濕熱在中故得甘必嘔仲景用方慎重如此言外當知有葛根連芩以解肌之法矣凡服桂枝湯吐者其後必吐膿血也桂枝湯不特酒客當禁凡熱淫于內者用甘溫辛熱以助其陽不能解肌反能湧越熱勢所過致傷陽絡則吐膿血可必也所謂桂枝下咽陽盛則斃者以此右論桂枝湯十六條憑脈辨症詳且悉矣方後更制復方大詳服法示人以當用詳藥禁方示人以不當用仲景苦心如此讀者須知其因脈症而立方不特為傷寒中風設亦不拘於一經故有桂枝症柴胡症等語桂枝湯證下太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈症知犯何逆隨症治之內經曰未滿三日者可汗而已汗不解者須當更汗吐下溫針之法非太陽所宜而三日中亦非吐下之時也治之不當故病仍不解壞病者即變症也若誤汗則有遂漏不止心下悸臍下悸等症妄吐則有飢不能食朝食暮吐不欲近衣等症妄下則有結胸痞硬協熱下利脹滿清穀等症火逆則有發黃圊血亡陽奔豚等症是桂枝症已罷故不可更行桂枝湯也桂枝以五味成方減一增一便非桂枝湯非謂桂枝竟不可用下文皆隨症治逆法服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯服桂枝湯取微似有汗者佳若大汗出病必不除矣然服桂枝後大汗仍可用之更汗非若麻黃之不可復用也即大汗出後脈洪大大煩渴是陽邪內陷不是汗多亡陽此大汗未止內不煩渴是病猶在表桂枝症未罷當仍與之乘其勢而更汗之汗自漐漐邪不留矣是法也可以發汗汗生于穀也即可以止汗精勝而邪卻也若不用此法使風寒乘汗客于玄府必復惡寒發熱如瘧狀然瘧發作有時日不再發此則風氣留其處故日再發耳必倍加桂枝以解肌少與麻黃以開表所謂奇之不去則偶之也此又服桂枝後少加麻黃之一法太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之太陽固當汗若不取微似有汗而發之太過陽氣無所止息而汗出不止矣汗多亡陽玄府不閉風乘虛入故復惡風汗多于表津弱于裏故小便難四肢者諸陽之末陽氣者精則養神柔則養筋開闔不得寒氣從之故筋急而屈伸不利也此離中陽虛不能攝水當用桂枝以補心陽陽密則漏汗自止矣坎中陽虛不能行水必加附子以回腎陽陽歸則小便自利矣內外調和則惡風自罷而手足便利矣漏不止與大汗出同若無他變症仍與桂枝湯若形如瘧是玄府反閉故加麻黃此玄府不閉故加附子若大汗出後而大煩渴是陽陷于內急當滋陰故用白虎加人參湯此漏不止而小便難四肢不利是陽亡于外急當扶陽此發汗雖不言何物其為麻黃湯可知蓋桂枝湯有芍藥而無麻黃故雖大汗出而玄府能閉但使陽陷于裏斷不使陽亡于外也此與傷寒自汗出條頗同而義殊彼腳孿急在未汗前是陰虛此四肢急在汗後是陽虛自汗因心煩其出微遂漏因亡陽故不止小便數尚未難惡寒微不若惡風之甚攣急在腳尚輕于四肢不利故彼用芍藥甘草湯此用桂枝加附子其命劑懸殊矣發汗後身疼痛脈沉遲者桂枝去芍藥生薑新加人參湯主之發汗後身疼是表虛不得更兼辛散故去生薑沉為在裏遲為在藏自當遠陰寒故去芍藥當存甘溫之品以和營更兼人參以通血脈裏和而表自解矣名曰新加者見表未解無補中法今因脈沉遲而始用之與用四逆湯治身疼脈沉之法同義彼在未汗前而脈反沉是內外皆寒故用乾薑生附大辛大熱者協甘草以逐裏寒而表寒自解此在發汗後而脈沉遲是內外皆虛故用人參之補中益氣以率領桂枝甘棗而通血脈則表裏自和也此又與人參桂枝湯不同彼因妄下而胃中虛寒故用薑朮尚協表熱故倍桂甘此因發汗不如法亡津液而經絡空虛故加人參胃氣未傷不須白朮胃中不寒故不用乾薑此溫厚和平之劑發汗病不解反惡寒者虛故也芍藥甘草附子湯主之發汗後反惡寒裏虛也表雖不解急當救裏若反與桂枝攻表此誤也故于桂枝湯去桂薑棗加附子以溫經散寒助芍藥甘草和中耳腳攣急與芍藥甘草湯本治陰虛此陰陽俱虛故加附子皆仲景治裏不治表之義發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之汗多則心液虛心氣餒故悸叉手自冒則外有所衛得按則內有所憑則望之而知其虛矣桂枝為君獨任甘草為佐去薑之辛散棗之泥滯并不用芍藥不藉其酸收且不欲其苦泄甘溫相得氣血和而悸自平與心中煩心下有水氣而悸者迥別發汗後其人臍下悸欲作奔豚茯苓桂枝甘草大棗湯主之心下悸欲按者心氣虛臍下悸者腎水乘火而上剋豚為水畜奔則昂首疾馳酷肖水勢上干之象然水勢尚在下焦欲作奔豚尚未發也當先其時而治之茯苓以伐腎邪桂枝以保心氣甘草大棗培土以制水甘瀾水狀似奔豚而性則柔弱故名勞水用以先煮茯苓取其下伐腎邪一惟趨下也本方取味皆下以畏其泛耳奔豚氣上衝胸腹痛往來寒熱奔豚湯主之甘草川芎當歸半夏黃芩生葛芍藥生薑甘李根皮服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之小便利則愈汗出不徹而遽下之心下之水氣凝結故反無汗而外不解心下滿而微痛也然病根在心下而病機在膀胱若小便利病為在表仍當發汗如小便不利病為在裏是太陽之本病而非桂枝症未罷也故去桂枝而君以苓朮則薑芍即散邪行水之法佐甘棗效培土制水之功此水結中焦只可利而不可散所以與小青龍五苓散不同法但得膀胱水去而太陽表裏症悉除所謂治病必求其本也太陽病二三日不得臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也不得臥但欲起在二三日似乎與陽明併病必心下有結故作此狀然結而不硬脈微弱而不浮大此其人素有久寒宿飲結于心下非亡津液而胃家實也與小青龍以逐水氣而反下之表實裏虛當利不止若利自止者是太陽之熱入與心下之水氣交持不散必作結胸矣若利未止者裏既已虛表尚未解宜葛根湯五苓散輩醫以心下結為病不盡而復下之表熱裏寒不解此協熱利所由來也太陽病外症未除而數下之遂協熱而利利下不止心下痞硬表裏不解者桂枝人參湯主之上條論協熱之因此明下利之治也外熱未除是表不解利下不止是裏不解此之謂有表裏症然病根在心下非辛熱何能化痞而軟硬非甘溫無以止利而解表故用桂枝甘草為君佐以乾薑參朮先煎四物後內桂枝使和中之力饒而解肌之氣鋭於以奏雙解表裏之功又一新加法也太陽病桂枝症醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之桂枝症上復冠太陽見諸經皆有桂枝症是桂枝不獨為太陽設矣葛根豈獨為陽明藥乎桂枝症脈本弱誤下後而反促者陽氣重故也邪束於表陽擾於內故喘而汗出利遂不止者所謂暴注下迫皆屬於熱與脈弱而協熱下利不同此微熱在表而大熱入裏固非桂枝芍藥所能和厚朴杏仁所宜加矣故君葛根之輕清以解肌佐連芩之苦寒以清裏甘草之甘平以和中喘自除而利自止脈自舒而表自解與補中逐邪之法迥別上條脈症是陽虛此條脈症是陽盛上條表熱裏寒此條表裏俱熱上條表裏俱虛此條表裏俱實同一協熱利同是表裏不解而寒熱虛實攻補不同補中亦能解表亦能除痞寒中亦能解表亦能止利神化極矣太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之促為陽脈胸滿為陽症然陽盛則促陽虛亦促陽盛則胸滿陽虛亦胸滿此下後脈促而不汗出胸滿而不喘非陽盛也是寒邪內結將作結胸之症桂枝湯陽中有陰去芍藥之酸寒則陰氣流行而邪自不結即扶陽之劑矣若微惡寒則陰氣凝聚恐薑桂之力不能散必加附子之辛熱仲景於桂枝湯一加一減遂成三法太陽病下之微喘者表未解故也桂枝加厚朴杏丘湯主之喘家作桂枝湯加厚朴杏仁佳喘為麻黃症治喘者功在杏仁此妄下後表雖不解腠理己疏故不宜麻黃而宜桂枝桂枝湯中有芍藥若但加杏仁喘雖微恐不勝任復加厚朴以佐之喘隨汗解矣本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之腹滿時痛因於下後是陽邪轉屬非太陽本病表症未罷故仍用桂枝湯解外滿痛既見故倍加芍藥以和裏此病本於陽故用陰以和陽若因下後而腹大實痛是太陽轉屬陽明而胃實尚未離乎太陽此之謂有表裏症仍用桂枝湯加大黃以除實痛此雙解表裏法也凡妄下必傷胃氣胃氣虛則陽邪襲陰故轉屬太陰胃氣實則兩陽相搏故轉屬陽明太陰則滿痛不實陰道虛也陽明則大實而痛陽道實也滿而時痛下利之兆大實而痛是燥屎之徵桂枝加芍藥即建中之方桂枝加大黃即調胃之劑傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之傷寒初起正宜發表吐下非法也然吐下後不轉屬太陰而心下逆滿氣上衝胸陽氣內擾也起則頭眩表陽虛也若脈浮者可與桂枝湯如前法今脈沉緊是為在裏反發汗以攻表經絡更虛故一身振搖也夫諸緊為寒而指下須當深辨浮沉俱緊者傷寒初起之本脈也浮緊而沉不緊者中風脈也若下後結胸熱實而脈沉緊便不得謂之裏寒此吐下後而氣上衝者更非裏寒之脈矣蓋緊者弦之別名弦如弓弦言緊之體緊如轉索謂弦之用故弦緊二字可以並稱亦可互見浮而緊者名弦是風邪外傷此沉緊之弦是木邪內發觀厥陰為病氣上撞心正可為此症發明也吐下後胃中空虛木邪為患故君茯苓以清胸中之肺氣而治節出用桂枝散心下之逆滿而君主安白朮培既傷之胃土而元氣復佐甘草以調和氣血而營衛以行頭自不眩身自不搖矣若遇粗工鮮不認為真武病燒針令其汗針處被寒核起而赤者必發奔豚氣從小腹上衝心者灸其核上各一壯與桂枝加桂湯寒氣不能外散發為赤核是奔豚之兆也從小腹衝心是奔豚之氣象也此陽氣不舒陰氣反勝必灸其核以散寒邪服桂枝以補心氣更加桂者不特益火之陽且以制木邪而逐水氣耳前條發汗後臍下悸是水邪欲乘虛而犯心故君茯苓以正治之則奔豚自不發此表寒未解而小腹氣衝是木邪挾水氣以凌心故於桂枝湯倍加桂以平肝氣而奔豚自除前在裏而未發此在表而已發故治有不同傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之傷寒者寒傷君主之陽也以火迫劫汗并亡離中之陰此為火逆矣妄汗亡陰而曰亡陽者心為陽中之太陽故心之液為陽之汗也驚狂者神明擾亂也陰不藏精驚發於內陽不能固狂發於外起臥不安者起則狂臥則驚也凡發熱自汗者是心液不收桂枝方用芍藥是酸以收之也此因迫汗津液既亡無液可斂故去芍藥加龍骨者取其鹹以補心重以鎮怯澀以固脫故曰救逆也且去逆藥之酸則肝家得辛甘之補加牡蠣之鹹腎家有既濟之力此虛則補母之法又五行承制之妙理也蜀漆不見本草未詳何物諸云常山苗則謬火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之三番誤治陰陽俱虛竭矣煩躁者驚狂之漸起臥不安之象也急用此方以安神救逆右論桂枝壞病十八條凡壞病不屬桂枝者見各症中桂枝症附方桂枝二麻黃一湯本桂枝湯二分麻黃湯一分合為二升分再服後人合一方失仲景異道同歸之活法白虎加人參湯石膏一斤碎甘草三兩炙粳米六兩人參三兩以水一斗煮米熟湯成去滓溫服一升日三服桂枝加附子湯本方加附子一枚炮去破八片煎服不須啜粥桂枝去芍藥生薑新加人參湯本方去芍藥生薑加人參三兩芍藥甘草附子湯芍藥甘草炙各二兩附子一枚炮去皮破八片水五升煮一升五合分溫三服桂枝甘草湯桂枝四兩去皮甘草二兩炙水二升煮一升頓服茯苓桂枝甘草大棗湯茯苓半斤桂枝四兩去皮甘草二兩大棗十二枚以甘瀾水一斗先煮茯苓減二升內諸藥煮三升溫服一升日三服桂枝去桂加茯苓白朮湯芍藥生薑白朮茯苓各三兩甘草炙二兩大棗十二枚水八升煮三升溫服一升杜枝人參湯桂枝四兩人參四兩甘草四兩炙白朮三兩乾薑五兩水九升先煮四味取五升內桂煮三升溫服日再服夜一服葛根黃連芩湯葛根半斤黃連三兩黃芩三兩甘草二兩炙水八升先煮葛根減二升內諸藥煮取二升分溫二服桂枝去芍藥加附子湯桂枝四兩生薑三兩甘草二兩炙大棗十二枚附子三枚水六升煮二升分溫三服桂枝加厚朴杏仁湯本方加厚朴二兩去皮杏仁五十枚水七升微火煮三升溫服一升覆取微似汗桂枝加芍藥湯本方加芍藥三兩桂枝加大黃湯本方加大黃二兩芍藥三兩按論中無芍藥疑誤茯苓桂枝白朮甘草湯茯苓四兩桂枝三兩白朮二兩甘草二兩水六升煮三升分溫三服桂枝加桂湯本方加桂枝二兩桂枝去芍藥加蜀漆龍骨牡蠣救逆湯桂枝蜀漆生薑各三兩甘草二兩大棗十二枚龍骨四兩牡蠣五兩水一斗二升煮蜀漆減二升內諸藥煮取三升溫服一升桂枝甘草龍骨牡蠣湯桂枝一兩甘草龍骨牡蠣熬各二兩水五升煮二升半溫服八合右方共一十八首傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與周胃承氣湯此非桂枝症兩形似桂枝症碔砆類玉大宜著眼桂枝症以自汗出為提綱然除頭痛發熱惡寒惡風及鼻鳴乾嘔外有一件不合桂枝者即不得以自汗出為主張矣此條中腳攣急一件不合桂枝症便當於其合處推求而自汗出是合桂枝症便當於自汗出處推求太陽有自汗症陽明亦有自汗症則心煩微惡寒是陽明表症小便數腳攣急是陽明裏症便當認為陽明傷寒而非太陽中風矣然症不在表不當用桂枝湯不在裏不當用承氣湯症在半表半裏法當去桂枝薑棗之散而任芍藥甘草之和矣芍藥酸寒用以止煩斂自汗而利小便甘草甘平用以瀉心散微寒而緩攣急斯合乎不從標本從乎中治之法也反用桂枝湯攻汗津液越出汗多亡陽腳攣急者因而厥逆矣咽乾煩躁吐逆皆因胃陽外亡所致必甘草乾薑湯救桂枝之誤而先復其胃脘之陽陽復則厥愈而足溫矣變症雖除而芍藥甘草之症未罷必更行芍藥甘草湯滋其陰而腳即伸矣或胃實而譫語是薑桂遺熱所致也少與調胃承氣和之仗硝黃以對待乎薑桂仍不失陽明燥化之治法耳問曰六經皆始於足腳攣急獨歸陽明者何曰陽明乃血所生病血處則筋急且攣急為燥症燥化又屬陽明故也曰太陽主筋所生病非太陽乎曰太陽脈盛於背故背中脈太陽居其四行陽明脈盛於足故兩足脈陽明居其六行內經曰身重難以行者胃脈在足也是腳攣當屬陽明矣故頭痛強背強腰脊強凡身以後者屬太陽頸動几几腳攣急風身以前者屬陽明即如痙病項強急時發熱獨頭搖卒口噤背反張者太陽也胸滿口噤臥不著席必齘齒腳攣急者陽明也愚謂仲景雜病論亦應分六經者此類是與自汗心煩惡寒皆陽虛症獨以腳攣急認是陰虛咽乾煩躁皆陽盛症獨以厥認為亡陽獨處藏姦惟仲景獨能看破曰反與曰少與是用成方曰作曰更作是製新方兩若字有不必然意甘草乾薑湯炙草四兩乾薑二兩水三升煮一升五合分溫再服芍藥甘草湯芍藥四兩炙草四兩法如前問曰仲景每用桂附以回陽此只用芍藥乾薑者何曰斯正仲景治陽明之大法也太陽少陰從本從標其標在上其本在下其標在外其本在內所謂亡陽者亡腎中之陽也故用桂附之下行者回之從陰引陽也陽明居中故不從標本從乎中治所謂陽者胃陽也用甘草乾薑以回之從乎中也然太少之陽不易回回則諸症悉解陽明之陽雖易回回而諸症仍在變症又起故更作芍藥甘草湯繼之少與調胃承氣和之是亦從乎中也此兩陽合明氣血俱多之部故不妨微寒之而微利之與他經亡陽之治不同此又用陰和陽之法桂枝辛甘走而不守即佐以芍藥亦能亡陽乾薑辛苦守而不走故君以甘草便能回陽以芍藥之酸收協甘草之平降位同力均則直走陰分故腳攣可愈甘草乾薑得理中之半取其守中不須其補中芍藥甘草湯得桂枝之半用其和裏不許其攻表右論疑似桂枝症
