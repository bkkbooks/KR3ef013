body:
  text: 傷寒來蘇集卷二麻黃湯證上太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之太陽主一身之表風寒外束陽氣不伸故一身盡疼太陽脈抵腰中故腰痛太陽主筋所生病諸筋者皆屬於節故骨節疼痛從風寒得故惡風風寒客於人則皮毛閉故無汗太陽為諸陽主氣陽氣鬱於內故喘太陽為開立麻黃湯以開之諸症悉除矣麻黃八症頭痛發熱惡風同桂枝症無汗身疼同大青龍症本症重在發熱身疼無汗而喘本條不冠傷寒又不言惡寒而言惡風先輩言麻黃湯主治傷寒不治中風似非確論蓋麻黃湯大青龍湯治中風之重劑桂枝湯葛根湯治中風之輕劑傷寒可通用之非主治傷寒之劑也脈浮者病在表可發汗麻黃湯脈浮而數者可發汗宜麻黃湯前條論症此條論脈言浮而不言遲弱者是浮而有力也然必審其熱在表乃可用若浮而大有熱屬藏者當攻之不令發汗矣若浮數而痛偏一處者身雖疼不可發汗數者急也即緊也緊則為寒指受寒而言數則為熱指發熱而言辭雖異而意則同故脈浮緊者即是麻黃湯症脈浮而數浮為風數為虛風為熱虛為寒風虛相搏則酒淅惡寒也脈浮為在表者何以表有風邪故也邪之所湊其氣必虛數本為熱而從浮見則數為虛矣風為陽邪陽浮則熱自發數為陽虛陽虛則畏寒凡中風寒必發熱惡寒者風虛相博而然也諸脈浮數當發熱而洒淅惡寒若有痛處飲食如常者畜積有膿也浮數之脈而見發熱惡寒之症不獨風寒相同而癰瘍亦有然者此浮為表而非風數為實熱而非虛矣發熱為陽浮而惡寒非陽虛矣若欲知其不是風寒當以內外症辨之外感則頭項痛身痛骨節痛腰脊痛非痛偏一處也外感則嘔逆或乾嘔不得飲食如常如此審之有畜積而成癰膿者庶不致誤作風寒治則舉瘡家一症例之治傷寒者見脈症之相同皆當留意也瘡家身雖疼不可發汗汗出則痙瘡家病與外感不同故治法與風寒亦異若以風寒之法治之其變亦不可不知也瘡雖痛偏一處而血氣壅遏亦有遍身疼者然與風寒有別汗之則津液越出筋脈血虛攣急而為痙矣諸脈症之當審正此故耳脈浮數者法當汗出而愈若身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裏虛須表裏實津液自和便汗出愈脈浮數者於脈法當汗而尺中微則不敢輕汗以麻黃為重劑故也此表指身裏指心有指營衛而反遺心悸者非也身重是表熱心悸是裏虛然悸有因心下水氣者亦當發汗故必審其尺脈尺中脈微為裏虛裏虛者必須實裏欲津液和須用生津液若坐而待之則表邪愈盛心液愈虛焉能自汗此表是帶言只重在裏至於自汗出則裏實而表和矣寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨肉煩疼當發其汗也風寒本自相因必風先開腠理寒得入於經絡營衛俱傷則一身內外之陽不得越故骨肉煩疼脈亦應其象而變見於寸口也緊為陰寒而從浮見陰盛陽虛汗之則愈矣緊者急也即數也緊以形象言數以至數言緊則為寒指傷寒也數則為熱指發熱也辭異而義則同故脈浮數浮緊者皆是麻黃症脈法以浮為風緊為寒故提綱以脈陰陽俱緊者名傷寒大青龍脈亦以浮中見緊故名中風則脈但浮者正為風脈宜麻黃湯是麻黃湯固主中風脈症矣麻黃湯症發熱骨節疼便是骨肉煩疼即是兩寒兩傷營衛俱病先輩何故以大青龍治營衛兩傷麻黃湯治寒傷營而不傷衛桂枝湯治風傷衛而不傷營曷不以桂枝症之惡寒麻黃症之惡風一反勘耶要之冬月風寒本同一體故中風傷寒皆惡風惡寒營病衛必病中風之重者便是傷寒傷寒之淺者便是中風不必在風寒上細分須當在有汗無汗上著眼耳太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗麻黃湯主之服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也脈症同大青龍而異者外不惡寒內不煩躁耳發於陽者七日愈八九日不解其人陽氣重可知然脈緊無汗發熱身疼是麻黃症未罷仍與麻黃只微除在表之風寒而不解內擾之陽氣其人發煩目瞑見不堪之狀可知陽絡受傷必逼血上行而衄矣血之與汗異名同類不得汗必得血不從汗解而從衄解此與熱結膀胱血自下者同一局也太陽脈從自目內眥絡陽明脈於鼻鼻者陽也目者陰也血雖陰類從陽氣而升則從陽竅而出故陽盛則衄陽盛則陰虛陰虛則目瞑也解後復煩煩見於內此餘邪未盡故用桂枝更汗微除發煩是煩於外見此大邪已解故不可更汗仲景每有倒句法前輩隨文衍義謂當再用麻黃以散餘邪不知得衄乃解句何處著落傷寒脈浮緊者麻黃湯主之不發汗因致衄脈緊無汗者當用麻黃湯發汗則陽氣得泄陰血不傷所謂奪汗者無血也不發汗陽氣內擾陽絡傷則衄血是奪血者無汗也若用麻黃湯再汗液脫則斃矣言不發汗因致衄豈有因致衄更發汗之理乎觀少陰病無汗而強發之則血從口鼻而出或從目出能不懼哉愚故亟為校正死誤人者多耳太陽病脈浮緊發熱身無汗自衄者愈汗者心之液是血之變見於皮毛者也寒邪堅斂於外腠理不能開發陽氣大擾於內不能出玄府而為汗故逼血妄行而假道於肺竅也今稱紅汗得其旨哉衄家不可發汗汗出必額上陷脈緊急目直視不能眴不得眠太陽之脈起自目內眥上額已脫血而復汗之津液枯竭故脈緊急而目直視也亦心腎俱絕矣目不轉故不能眴目不合故不得眠脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗以營氣不足血少故也脈浮緊者以脈法論當身疼痛宜發其汗然寸脈雖浮緊而尺中遲則不得據此法矣尺主血血少則營氣不足雖發汗決不能作汗正氣反虛不特身疼不除而亡血亡津液之變起矣假令是設辭是深一層看法此與脈浮數而尺中微者同義陽盛者不妨發汗變症惟衄衄乃解矣陰虛者不可發汗亡陽之變恐難為力太陽與陽明合病喘而胸滿者不可下麻黃湯主之三陽俱受氣於胸中而部位則屬陽明若喘屬太陽嘔屬少陽故胸滿而喘者尚未離乎太陽雖有陽明可下之症而不可下如嘔多雖有陽明可攻之症而不可攻亦以未離乎少陽也陽明病脈浮無汗而喘者發汗則愈宜麻黃湯太陽有麻黃症陽明亦有麻黃症則麻黃湯不獨為太陽設也見麻黃症即用麻黃湯是仲景大法右論麻黃湯脈症太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯脈微細但欲寐少陰症也浮細而嗜臥無少陰症者雖十日後尚屬太陽此表解而不了了之謂設見胸滿嗜臥亦太陽之餘邪未散兼脅痛是太陽少陽合病矣以少陽脈弦細也少陽為樞樞機不利一陽之氣不升故胸滿脅痛而嗜臥與小柴胡和之若脈浮而不細是浮而有力也無胸脅痛則不屬少陽但浮而不大則不涉陽明是仍在太陽也太陽為開開病反閤故嗜臥與麻黃湯以開之使衛氣行陽太陽仍得主外而喜寤矣與太陽初病用以發汗不同當小其制而少與之右論麻黃湯柴胡湯相關脈症麻黃湯麻黃二兩去節桂枝二兩甘草一兩炙杏仁七十個去尖水九升先煮麻黃減一升去沬內諸藥煮二升半溫服八合覆取微似汗不須啜粥餘如桂枝法麻黃色青入肝中空外直宛如毛竅骨節狀故能旁通骨節除身疼直達皮毛為衛分驅風散寒第一品藥然必藉桂枝入心通血脈出營中汗而衛分之邪乃得盡去而不留故桂枝湯不必用麻黃而麻黃湯不可無桂枝也杏為心果溫能散寒苦能下氣故為驅邪定喘之第一品藥桂枝湯發營中汗須啜稀熱粥者以營行脈中食入於胃濁氣歸心淫精於脈故耳麻黃湯發衛中汗不須啜稀熱粥者此汗是太陽寒水之氣在皮膚間腠理開而汗自出不須假穀氣以生汗也一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也汗多者溫粉撲之此麻黃湯禁也麻黃湯為發汗重劑故慎重如此其用桂枝湯若不汗更服若病重更作服若不出汗可服至二三劑又刺後可復汗汗後可復汗下後可復汗此麻黃湯但云溫服八合不言再服則一服汗者停後服汗出多者溫粉撲之自當列此後大青龍煩躁在未汗先是為陽盛此煩躁在發汗後是為陰虛陰虛則陽無所附宜白虎加人參湯若用桂附以回陽其不殺人者鮮矣麻黃湯證下太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔圊便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不得小汗出身必癢宜桂枝麻黃合半湯太陽病七日以上自愈者以行其經盡故也七八日不解惡寒發熱如瘧是將轉係少陽矣太陽以陽為主熱多寒少是主勝而客負此為將解之症若其人不嘔是胃無寒邪圊便是胃無熱邪脈微緩是脈有胃氣一日二三度發是邪無可容之地斯正勝而邪卻可勿藥也若其人熱多寒少脈甚微而無和緩之意是弱多胃少曰脾病此至陰虛矣但惡寒而不惡熱是二陽虛矣陰陽俱虛當調其陰陽陰陽和而病自愈不可更用汗吐下法也若其人熱多寒少而面色緣緣正赤者是陽氣怫鬱在表而不得越當汗不汗其身必癢汗出不徹未欲解也可小發汗故將桂枝麻黃湯各取三分之一合為半服而與之所以然者以八九日來正氣已虛邪猶未解不可更汗又不可不汗故立此和解法耳舊本俱作各半今從宋本校正麻黃桂枝合半湯桂枝湯三合麻黃湯三合併為六合頓服後人算其分兩合作一方大失仲景製方之意太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯此條與上條中節同義本論無越婢症亦無越婢湯方金匱要略有越婢湯方世本取合者即是也仲景言不可發汗則不用麻黃可知言無陽則不用石膏可知若非方有不同必抄錄者誤耳寧缺其方勿留之以滋惑也右論麻黃桂枝合半湯脈症麻黃湯變症汗後虛症未持脈時病人叉手自冒心師因教試令咳而不欬者此必兩耳聾無聞也所以然者以重發汗虛故如此汗出多則心液虛故叉手外衛此望而知之心寄竅於耳心虛故耳聾此問而知之病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也上條因發汗而心血虛此因發汗而胃氣虛也與服桂枝湯而吐者不同此因症論脈不是拘脈談症未汗浮數是衛氣實汗後浮數是胃氣虛故切居四診之末當因症而消息其虛實也病人有寒復發汗胃中冷必吐蚘有寒是未病時原有寒也內寒則不能化物飲食停滯而成蚘以內寒之人復感外邪當溫中以逐寒若復發其汗汗生於穀穀氣外散胃脘陽虛無穀氣以養其蚘故蚘動而上從口出也蚘多不止者死吐蚘不能食者亦死發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之此條不是妄汗以其人本虛故也上條汗後見不足症此條汗後反見有餘症邪氣盛則實故用厚朴薑夏散邪以除腹滿正氣虛故用人參甘草補中而益元氣發汗後水藥不得入口為逆若更發汗必吐不止陽重之人大發其汗有升無降故水藥拒膈而不得入也若認為中風之乾嘔傷寒之嘔逆而更汗之則吐不止胃氣大傷矣此熱在胃口須用梔子湯瓜蒂散因其勢而吐之亦通因通用法也五苓散亦下劑不可認為水逆而妄用之汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸汗家平素多汗人也心液大脫故恍忽心亂甚於心下悸矣心虛於上則腎衰於下故陰疼餘糧土之精氣所融結用以固脫而鎮怯故為丸以治之厚朴生薑半夏甘草人參湯厚朴半斤去皮炙生薑半斤切半夏半斤切甘草二兩炙人參二兩水一斗煮取三升溫服一升日三服右論汗後虛症發汗後不可更行桂枝湯無汗而喘舊本有無字大熱者可與麻黃杏子甘草石膏湯下後不可更行桂枝湯若無汗而喘大熱者可與麻黃杏子甘草石膏湯二條無字舊本訛在大熱上前輩因循不改隨文衍義為後學之迷途仲景每於汗下後表不解者用桂枝更汗而不用麻黃此則內外皆熱而不惡寒必其用麻黃湯後寒解而熱反甚與發汗解半日許復煩下後而微喘者不同發汗而不得汗或下之而仍不汗喘不止其陽氣重也若與桂枝加厚朴杏仁湯下咽即斃矣故於麻黃湯去桂枝之辛熱加石膏之甘寒佐麻黃而發汗助杏仁以定喘一加一減溫解之方轉為涼散之劑矣未及論症便言不可更行桂枝湯見得汗下後表未解者更行桂枝湯是治風寒之常法麻黃杏仁甘草石膏湯麻黃四兩杏仁五十粒甘草二兩炙石膏半斤水七升先煮麻黃減二升去上沬內諸藥煮取二升溫服一升病發於陽而反下之熱入因作結胸若不結胸但頭汗出餘處無汗至頸而還小便不利身必發黃也寒氣侵人人即發熱以拒之是為發陽助陽散寒一汗而寒熱盡解矣不發汗而反下之熱反內陷寒仔隨熱而入入於胸必結瘀熱在裏故也熱氣炎上不能外發故頭有汗而身無汗若小便利則濕熱下流即內亦解不利則濕熱內蒸於藏府黃色外見於皮膚矣傷寒瘀熱在裏身必發黃麻黃連翹赤小豆湯主之熱反入裏不得外越謂之瘀熱非發汗以逐其邪濕氣不散然仍用麻黃桂枝是抱薪救火矣於麻黃湯去桂枝之辛甘加連翹梓皮之苦寒以解表清火而利水一劑而三善備且以見太陽發熱之治與陽明迥別也麻黃連翹赤小豆湯麻黃連翹甘草生薑各二兩赤小豆一升生梓白皮一斤杏仁四十粒大棗十二枚以潦水一升先煮麻黃再沸去上沬內諸藥煮取二升分溫三服半日服盡此湯以赤小豆梓白皮為君而反冠以麻黃者以茲湯為麻黃湯之變劑也瘀熱在中則心肺受邪營衛不利小豆赤色心家之穀入血分而通經絡致津液而利膀胱梓皮色白專走肺經入氣分而理皮膚清胸中而散瘀熱故以為君更佐連翹杏仁大棗之苦甘瀉心火而和營麻黃生薑甘草之辛甘瀉肺火而調衛潦水味薄能降火而除濕故以為使半日服盡者急方通劑不可緩也此發汗利水又與五苓雙解法徑庭矣右論麻黃湯變症葛根湯證太陽病項背強几几無汗惡風者葛根湯主之太陽病項背強几几而汗出惡風者桂枝加葛根湯主之足太陽脈自絡腦而還出下項挾背脊此從風池而入不上干於腦而下行於背故頭不痛而項背強也几几項背牽動之象動中見有強意凡風傷衛分則皮毛閉故無汗風傷營分則血動搖故汗自出不可以本症之無汗為傷寒他條之自汗出為中風也桂枝大青龍症惡風惡寒者是中冬月之陰風此惡風不惡寒者是感三時鼓動之陽風風勝而無寒故君葛根之甘涼減桂枝之辛熱大變麻桂二湯溫散之法內經云東風生於春病在肝俞在頭項中央為土病在脾俞在脊又秋氣者病在肩背則知頸項強不屬冬月之寒風易以艮為山又以艮為背山主靜人以背應之故元首四肢俱主動而背獨主靜葛根稟氣輕清而賦體厚重此不惟取其輕以去實復取其重以鎮動也此又培土寧風之法太陽與陽明合病必自下利葛根湯主之不言兩經相合何等病但舉下利而言是病偏於陽明矣太陽主表則不合下利下利而曰必必陽并於表表實而裏虛耳葛根為陽明經藥惟表實裏虛者宜之而胃家實非所宜也故仲景於陽明經中反不用葛根若謂其能亡津液而不用則與本草生津之義背矣若謂其能大開肌肉似反加於汗出惡風之合病乎有汗無汗下利不下利俱得以葛根主之是葛根與桂枝同為解肌和中之劑與麻黃之專於發表不同大陽與陽明合病不下利但嘔者葛根加半夏湯主之太陽陽明合病太陽少陽合病陽明少陽合病必自下利則下利似乎合病當然之症今不下利而嘔又似乎與少陽合病矣於葛根湯加半夏兼解少陽半裏之邪便不得為三陽合病葛根湯葛根四兩麻黃二兩生薑三兩桂枝二兩芍藥二兩甘草一兩大棗十枚水一斗先煮麻黃葛根減二升去沬內諸藥煮取三升溫服一升覆取微似汗不須啜粥餘如桂枝法輕可以去實麻黃葛根是也去沬者止取其清陽發腠理之義也葛根能佐麻黃而發表佐桂枝以解肌不須啜粥者開其腠理而汗自出涼其肌肉而汗自止是涼散以驅風不必溫中以逐邪矣桂枝加葛根湯本方加葛根四兩舊本有麻黃者誤葛根加半夏湯本方加半夏半升大青龍湯證太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之風有陰陽太陽中風汗出脈緩者是中於鼓動之陽風此汗不出而脈緊者中於凜冽之陰風矣風令脈浮浮緊而沉不緊與傷寒陰陽俱緊之脈有別也發熱惡寒與桂枝症同身疼痛不汗出與麻黃症同惟煩躁是本症所獨故製此方以治風熱相搏耳熱淫於內則心神煩擾風淫末疾故手足躁亂此即如狂之狀也風盛於表非發汗不解陽鬱於內非大寒不除此本麻黃症之劇者故於麻黃湯倍麻黃以發汗加石膏以除煩凡云太陽便具惡寒頭痛若見重者條中必更提之凡稱中風則必惡風桂枝症復提惡風者見惡寒不甚此惡寒甚故不見其更惡風也傷寒脈浮緩發熱惡寒無汗煩躁身不疼但重乍有輕時無少陰症者大青龍湯發之寒有重輕傷之重者脈陰陽俱緊而身疼傷之輕者脈浮緩而身重亦有初時脈緊漸緩初時身疼繼而不疼者診者勿執一以拘也本論云傷寒三日陽明脈大少陽脈小脈弦細者屬少陽脈浮緩者係太陰可以見傷寒無定脈也然脈浮緊者必身疼脈浮緩者身不疼中風傷寒皆然又可謂之定脈定症矣脈浮緩下當有發熱惡寒無汗煩躁等證蓋脈浮緩身不疼見表症亦輕但身重乍有輕時見表症將罷以無汗煩躁故合用大青龍無少陰症仲景正為不汗出而煩躁之症因少陰亦有發熱惡寒無汗煩躁之症與大青龍同法當溫補若反與麻黃之散石膏之寒真陽立亡矣必細審其所不用然後不失其所當用也前條是中風之重症此條是傷寒之輕症仲景只為補無少陰句與上文煩躁互相發明意不重在傷寒蓋煩躁陽邪傷寒之輕者有之重者必嘔逆矣若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也大青龍名重劑不特少陰傷寒不可用即太陽中風亦不可輕用也此條與桂枝方禁對照脈浮緊汗不出是麻黃症不可與桂枝湯以中有芍藥能止汗也脈微弱自汗出是桂枝症不可與大青龍以中有麻黃石膏故也夫脈微而風寒者此陰陽俱虛不可用麻黃發汗脈微弱而自汗出是無陽也不可用石膏清裏蓋石膏瀉胃脘之陽服之則胃氣不至於四肢必手足厥逆麻黃散衛外之陽服之則血氣不周於身必筋惕肉瞤此仲景所深戒也且脈緊身疼宜以汗解者只尺中遲即不可發汗況微弱乎大青龍症之不明於也者許叔微始之作俑也其言曰桂枝治中風麻黃治傷寒大青龍治中風見寒脈傷寒見風脈三者如鼎立此三大綱所由來乎愚謂先以脈論夫中風脈浮緊傷寒脈浮緩是仲景互文見意處言中風脈多緩然亦有脈緊者傷寒脈當緊然亦有脈緩者蓋中風傷寒各有淺深或因人之強弱而異或因地之高下時時之乖和而殊症固不可拘脈亦不可執如陽明中風而脈浮緊太陽傷寒而脈浮緩不可謂脈緊必傷寒脈緩必中風也按內經脈滑曰風則風脈原無定象又盛而緊曰脹則緊脈不專屬傷寒又緩而滑曰熱中則緩脈又不專指中風矣且陽明中風有脈浮緊者又有脈浮大者必欲以脈浮緩為中風則二條將屬何症耶今人但以太陽之脈緩自汗脈緊無汗以分風寒列營衛並不佑他經皆有中風即陽明之中風無人談及矣請以太陽言之太陽篇言中風之脈症有二一曰太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之一曰太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之以二症相較陽浮見寒之輕浮緊見寒之重汗出見寒之輕不汗出見寒之重嗇嗇淅淅見風寒之輕翕翕見發熱之輕發熱惡寒覺寒熱之俱重鼻鳴見風之輕身疼見風之重自汗乾嘔見煩之輕不汗煩躁見煩之重也言傷寒脈症者二一曰太陽病或未發熱或已發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒一曰傷寒脈浮自汗出小便數心煩微惡寒腳攣急以二症相較微惡寒見必惡之寒之重體痛覺攣急之輕自汗出小便數心煩見傷寒之輕或未發熱見發熱之難必先嘔逆見傷寒之重脈浮見寒之輕陰陽俱緊見寒之重中風傷寒各有輕重如此今人必以傷寒為重中風為輕但之分風寒之中傷而不辨風寒之輕重於是有傷寒見風中風見寒之遁辭矣合觀之則不得以脈緩自汗為發中風定局更不得以脈緊無汗為傷寒而非中風矣由是推之太陽中風以火發汗者無汗可知其脈緊亦可知太陽中風下利嘔逆其人漐漐汗出其脈緩亦可知也要仲景憑脈辨證只審虛實不論中風傷寒脈之緊緩但於指下有力者為實脈弱無力者為虛不汗出而煩躁者為實汗出多而煩躁者為虛症在太陽而煩躁者為實症在少陰而煩躁者為虛實者可服大青龍虛者便不可服此最易曉也要知仲景立方因症而設不專因脈而設大青龍湯為風寒在表而兼爇熱中者設不專為無汗而設故中風有煩躁者可用傷寒而煩躁者亦可用蓋風寒本是一氣故湯劑可以互投論中有中風傷寒互稱者如青龍是也中風傷寒並提者如小柴胡是也仲景細審脈症而施治何嘗拘拘於中風傷寒之名是別乎若仲景既拘拘於中風傷寒之別即不得更有中風見寒傷寒見風之渾矣夫風為陽邪寒為陰邪雖皆因於時氣之寒而各不失其陰陽之性故傷寒輕者全似中風獨腳攣急不是蓋腰已上為陽而風傷於上也中風重者全似傷寒而煩躁不是蓋寒邪嘔而不煩逆而不躁也然陰陽互根煩為陽邪煩極致躁躁為陰邪躁極致煩故中風輕者煩輕重者煩躁傷寒重者煩躁輕者微煩微煩則惡寒亦微陽足以勝微寒故脈浮不緊蓋仲景製大青龍全為太陽煩躁而設又恐人誤用青龍不特為脈弱汗出者禁而在少陰尤宜禁之蓋少陰亦有發熱惡寒身疼無汗而煩躁之症此陰極似陽寒極反見熱化也誤用之則厥逆筋惕肉瞤所必致矣故必審其症之非少陰則為太陽煩躁無疑太陽煩躁為陽盛也非大青龍不解故不特脈浮緊之中風可用即浮緩而不微弱之傷寒亦可用也不但身疼重者可用即不身疼與身重而乍有輕時者亦可用也蓋胃脘之陽內鬱於胸中而煩外擾於四肢而躁若但用麻黃發汗於外而不加石膏洩熱於內至熱併陽明而斑黃狂亂是乃不用大青龍之故耳大青龍湯麻黃六兩桂枝二兩甘草二兩杏仁四十枚生薑三兩大棘十枚石膏打碎以水九升先煮麻黃減二升去上沬內諸藥煮取三升溫服一升取微似有汗此即加味麻黃湯也諸症全是麻黃而有喘與煩躁之不同喘者是寒鬱其氣升降不得自如故多杏仁之苦以降氣煩躁是熱傷其氣無津不能作汗故特加石膏之甘以生津然其質沉其性寒恐其內熱頓除而外之表邪不解變為寒中而協熱下利是引賊破家矣故必倍麻黃以發汗又倍甘草以和中更用薑棗以調營衛一汗而表裏雙解風熱兩除此大青龍清內攘外之功所以佐麻桂二方之不及也麻黃湯症熱全在表桂枝症之自汗大青龍之煩躁皆兼裏熱仲景於表劑中便用寒藥以清裏蓋風為陽邪惟煩是中風面目自汗乃煩之兆躁乃煩之徵汗出則煩得泄故不躁宜微酸微寒之味以和之汗不出則煩不得泄故躁必甘寒大寒之品以清之夫芍藥石膏俱是裏藥今人見仲景入表劑中疑而畏之故不敢用當用不用以至陽明實熱斑黃狂亂也夫青龍以發汗名其方分大小在麻黃之多寡而不在石膏觀小青龍之不用可知石膏不能驅在表之風寒獨清中宮之燔灼觀白虎湯之多用可知世不審石膏為治煩竟以發汗用十劑云輕可去實豈以至堅至重之質而能散哉汗多亡陽者過在麻黃耳用石膏以清胃火是仲景於太陽經中預保陽明之先著加薑棗以培中氣又慮夫轉屬太陰也傷寒表不解心下有水氣乾嘔發熱而欬或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之發熱是表未解乾嘔而欬是水氣為患水氣者太陽寒水之氣也太陽之化在天為寒在地為水其傷人也淺者皮肉筋骨重者害及五藏心下有水氣是傷藏也水氣未入於胃故乾嘔咳者水氣射肺也皮毛者肺之合表寒不解寒水已留其合矣心下之水氣又上至於肺則肺寒內外合邪故欬也水性動其變多水氣下而不上則或渴或利上而不下則或噎或喘留而不行則小便不利而小腹因滿也製小青龍以兩解表裏之邪復立加減法以治或然之症此為太陽樞機之劑水氣畜於心下尚未固結故有或然之症若誤下則硬滿而成結胸矣小青龍湯桂枝芍藥甘草麻黃細辛乾薑各三兩半夏五味子各半斤以水一斗先煮麻黃減二升去上沬內諸藥煮取三升溫服一升若渴去半夏加括蔞根三兩若微利去麻黃加芫花如雞子大熬令赤色若噫者去麻黃加附子一枚炮若小便不利少腹滿者去麻黃加茯苓四兩若喘者去麻黃加杏仁半升去皮尖表雖未解寒水之氣已去營衛故於桂枝湯去薑棗加細辛乾薑半夏五味辛以散水氣而除嘔酸以收逆氣而止欬治裏之劑多於發表焉小青龍與小柴胡俱為樞機之劑故皆設或然症因各立加減法蓋表症既去其半則病機偏於向裏故二方之症多屬裏仲景多用裏藥少用表藥未離於表故為解表之小方然小青龍主太陽之半表裏當用麻黃桂枝還重視其表小柴胡主少陽之半表裏只用柴胡生薑但微解其表而已此緣太少之陽氣不同故用表藥之輕重亦異小青龍設或然五症加減法內即備五方小柴胡設或然七症即具加減七方此仲景法中之法方外之方何可以三百九十七一百一十三拘之傷寒心下有水氣欬而微喘發熱不渴小青龍湯主之服湯已渴者此寒去欲解也水氣在心下則欬為必然之症喘為或然之症亦如柴胡湯症但見一症即是不必悉具欬與喘皆水氣射肺所致水氣上升是以不渴服湯已而反渴水氣內散寒邪亦外散也此條正欲明服湯後渴者是解候恐人服止渴藥反滋水氣故先提不渴二字作服後提出渴者以明之服湯即小青龍湯若寒既欲解而更服之不惟不能止渴且重亡津液轉屬陽明而成胃實矣能化胸中之熱氣而為汗故名大青龍能化心下之水氣而為汗故名小青龍蓋大青龍表症多只煩躁是裏症小青龍裏症多只發熱是表症故有大小發汗之殊耳發汗利水是治太陽兩大法門發汗分形層之次第利水定三焦之淺深故發汗有五法麻黃湯汗在皮膚乃外感之寒氣桂枝湯汗在經絡乃血脈之精氣葛根湯汗在肌膚乃津液之清氣大青龍汗在胸中乃內擾之陽氣小青龍汗在心下乃內畜之水氣其治水有三法乾嘔而欬是水在上焦在上者發之小青龍是也心下痞滿是水在中焦中滿者瀉之十棗湯是也小便不利是水在下焦在下者引而竭之五苓散是也其他壞症變症雖多而大法不外是矣五苓散證中風發熱六七日不解而煩有表裏症渴欲飲水水入則吐者名曰水逆五苓散主之多服煖水汗出愈表熱不解內復煩渴者因於發汗過多反不受水者是其人心下有水氣因離中之真水不足則膻中之火用不宣邪水凝結於內水飲拒絕於外既不能外輸於玄府又不能上輸於口舌亦不能下輸於膀胱此水逆所由名也勢必藉四苓輩味之淡者以滲泄其水然水氣或降而煩渴未必除表熱未必散故必藉桂枝之辛溫入心而化液更使煖水之多服推陳而致新斯水精四布而煩渴解輸精皮毛而汗自出一汗而表裏頓除又大變乎麻黃桂枝葛根青龍等法也煖水可多服則逆者是冷水熱淫於內故不受寒反與桂枝煖水是熱因熱用法五苓因水氣不舒而設是小發汗不是生津液是逐水氣不是利水道發汗已脈浮數煩渴者五苓散主之上條有表裏之症此條有表裏之脈互相發明五苓雙解之義雖經發汗而表未盡除水氣內結故用五苓若無表症當用白虎加人參湯矣傷寒發汗解復煩而脈浮數者熱在表未傳裏也故用桂枝此更加渴則熱已在裏而表邪未罷故用五苓脈浮而數者可發汗病在表之表宜麻黃湯病在表之裏宜桂枝湯病在裏之表宜五苓散若病裏之裏當用豬苓湯但利其水不可用五苓散兼發其汗矣要知五苓是太陽半表半裏之劑歸重又在半表太陽病發汗後大汗出胃中乾煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者五散苓主之妄發其汗津液太洩故胃中乾汗為心液汗多則離中水虧無以濟火故煩腎中水衰不能制火故躁精氣不能遊溢以上輸於脾脾不能為胃行其津液胃不和故不得眠內水不足須外水以相濟故欲飲水此便是轉屬陽明症水能制火而潤土水土合和則胃家不實故病愈但勿令恣飲使水氣為患而致悸喘等症也所以然者其人內熱尚少飲不能多勿多與耳如飲水數升而不解者又當與人參白虎湯矣若發汗後脈仍浮而微熱猶在表未盡除也雖不煩而渴特甚飲多即消小便反不利水氣未散也傷寒者傷於冬時寒水之氣太陽衛外之陽微不足以禦邪故寒水得以內侵所以心下有水氣胸中之陽又不足以散水氣故煩渴而小便不利耳小便由於氣化肺氣不化金不生水不能下輸膀胱心氣不化離中水虛不能下交於坎必上焦得通津液得下桂枝色赤入丙四苓色白歸辛丙辛合為水運用之為散散於胸中必先上焦如霧然後下焦如瀆何有煩渴癃閉之患哉要知五苓重在脈浮微熱不重在小便不利太陽病其人發熱汗出不惡寒而渴者此轉屬陽明也渴欲飲水者少少與之但以法救之宜五苓散此與前上半條同義前條在大汗後此在未汗前即是太陽溫病要知太陽溫病即是陽明來路其徑最捷不若傷寒中風止從亡津液而後轉屬也飲水是治溫大法庶不犯汗吐下溫之誤夫五苓散又是治飲多之法夫曰轉屬是他經戾及其人平日未必胃實故預立此法以防胃家虛耳仲景治太陽不特先為胃家惜津液而且為胃家慮及痼瘕穀癉等症矣全條見陽明篇此節文以備五苓症發汗後飲水多者必喘以水灌之亦喘未發汗因風寒而喘者是麻黃症下後微喘者桂枝加厚朴杏仁症喘而汗出者葛根黃連黃芩症此汗後津液不足飲水多而喘者是五芩症以水灌之亦喘者形寒飲冷皆能傷肺氣迫上行是以喘也漢時治病有火攻水攻之法故仲景言及之太陽病飲水多小便利者必心下悸小便少者必苦裏急也此望問法內經所云一者因得之審其上下得一之情者是也見其飲水即問其小便小便利則水結上焦不能如霧故心下悸可必小便少則水畜下焦不能如瀆故裏急可必火用不宣致水停心下而悸水用不宣致水結膀胱而裏急也傷寒汗出而心下悸渴者五苓散主之不渴者茯苓甘草湯主之汗出下當有心下悸三字看後條可知不然汗出而渴是白虎湯症汗後不渴而無他症是病已差可勿藥矣二方皆因心下有水氣而設渴者是津液已亡故少用桂枝多服煖水微發其汗不渴者津液未亡故仍用桂加減更發其汗上條言症而不及治此條言方而症不詳當互文以會意也本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之與瀉心湯而痞不除必心下有水氣故耳其症必兼燥煩而小便不利用五苓散入心而逐水氣則痞自除矣大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈凡病若發汗若吐若下若亡血亡津液陰陽自和者必自愈前條用五苓者以心下有水氣是逐水非利小便也若心下無水氣則發汗後津液既亡小便不利者亦將何所利乎勿治之是禁其勿得利小便非待其自愈之謂也然以亡津液之人勿生其津液焉得小便利欲小便利治在益其津液也其人亡血亡津液陰陽安能自和欲其陰陽自和必先調其陰陽之所自陰自亡血陽自亡津益血生津陰陽自和矣要知不益津液小便必不得利不益血生津陰陽必不自和凡看仲景書當於無方處索方不治處求治纔知仲景無死方仲景無死法五苓散豬苓去皮白朮茯苓各十八銖澤瀉一兩六錢桂枝半兩右五味擣為末以白飲和服方寸匕豬苓色黑入腎澤瀉味鹹入腎具水之體茯苓味甘入脾色白入肺清水之源桂枝色赤入心通經發汗為水之用合而為散散於胸中則水精四布上滋心肺外溢皮毛通調水道一汗而解矣本方治汗後表裏俱熱燥渴煩躁不眠等症全同白虎所異者在表熱未解及水逆與飲水多之變症耳若謂此方是利水而設不識仲景之旨矣若謂用此以生津液則非滲洩之味所長也傷寒厥而心下悸者宜先治水當用茯苓甘草湯卻治其厥不爾水漬入胃必作利也心下悸是有水氣今乘其未及漬胃時先治之不致厥利相連此治法有次第也茯苓甘草湯茯苓桂枝各一兩甘草一兩炙生薑三兩右四味以水四升煮取二升去滓分溫三服此方從桂枝加減水停而悸故去大棗不煩而厥故去芍藥水宜滲洩故加茯苓既云治水仍任薑桂以發汗不用豬澤以利小便者防水漬入胃故耳與五苓治煩渴者不同法十棗湯證太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解裏未和也十棗湯主之中風下利嘔逆本葛根加半夏症若表既解而水氣淫溢不用十棗攻之胃氣大虛後難為力矣然下利嘔逆固為裏症而本於中風不可不細審其表也若其人漐漐汗出似乎表症然發作有時則病不在表矣頭痛是表症然既不惡寒又不發熱但心下痞硬而滿脅下牽引而痛是心下水氣泛溢上攻於腦而頭痛也與傷寒不大便六七日而頭痛與承氣湯同乾嘔汗出為在表然而汗出而有時更不惡寒乾嘔而短氣為裏症也明矣此可以見表之風邪已解而裏之水氣不和也然諸水氣為患或喘或湯或噫或悸或煩或利而不吐或吐而不利或吐利而無汗此則外走皮毛而汗出上走咽喉而嘔逆下走腸胃而下利浩浩莫禦非得利水之峻劑以直折之中氣不支矣此十棗之劑與五苓青龍瀉心等法懸殊矣太陽陽明合病太陽少陽合病俱下利嘔逆皆是太陽中風病根十棗湯芫花熬赤甘遂大戟各等分右三味各異搗篩稱已合治之以水一升半煮大肥棗十枚取八合去棗內藥末強人服一錢匕羸人半錢溫服之平旦服若下少病不愈者明日更服加半錢得快下利後糜粥自養陷胸湯證病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也陽者指外而言形軀是也陰者指內而言胸中心下是也此指人身之外為陽內為陰非指陰經之陰亦非指陰症之陰發陰發陽俱指發熱結胸與痞俱是熱症作痞不言熱入者熱原發於裏也誤下而然不得散因而痞硬不可以發陰作無熱解也若作痞謂非熱症瀉心湯不得用芩連大黃矣若梔子豉之心中懊憹瓜蒂散之心中溫溫欲吐與心下滿而煩黃連湯之胸中有熱皆是病發於陰結胸無大熱但頭微汗出者此為水結在胸脅也大陷胸湯主之上條言熱入是結胸之因此條言水結是結胸之本互相發明結胸病源若不誤下則熱不入熱不入則水不結若胸脅無水氣則熱必入胃而不結於胸脅矣此因誤下熱入太陽寒水之邪亦隨熱而內陷於胸脅間水邪熱邪結而不散故名曰結胸粗工不解此義竟另列水結胸一症由是多歧滋惑矣不思大陷胸湯丸仲景用甘遂葶藶何為耶無大熱指表言未下時大熱下後無大熱可知大熱乘虛入裏矣但頭微汗者熱氣上蒸也餘處無汗者水氣內結也水結於內則熱不得散熱結於內則水不得行故用甘遂以直攻其水任硝黃以大下其熱所謂其次治六府也又大變乎五苓十棗等法太陽誤下非結胸即發黃皆因其先失於發汗故致溼熱之為變也身無大熱但頭汗出與發黃症同只以小便不利知水氣留於皮膚尚為在表仍當汗散此以小便利知水氣結於胸脅是為在裏故宜下解傷寒六七日結胸熱實脈沉緊心下痛按之石硬者大陷胸湯主之前條言病因與外症此條言脈與內症又當於熱實二字著眼六七日中詳辨結胸有熱實亦有寒實太陽病誤下成熱實結胸外無大熱內有大熱也太陰病誤下成寒實結胸胸中結硬外內無熱症也沉為在裏緊則為寒此正水結胸脅之脈心下滿痛按之石硬此正水結胸脅之症然其脈其症不異於寒實結胸故必審其為病發於陽誤下熱入所致乃可用大陷胸湯是謂治病必求其本耳太陽病重發汗而復大下之不大便五六日舌上燥而渴日晡小有潮熱從心下至小腹硬滿而痛不可近者大陷胸湯主之此妄汗妄下將轉屬陽明而尚未離乎太陽也不大便五六日舌上燥渴日晡潮熱是陽明病矣然心下者太陽之位小腹者膀胱之室也從心下至小腹硬滿而痛不可近是下後熱入水結所致而非胃家實故不得名為陽明病也若復用承氣下之水結不散其變不可勝數矣大陷胸湯大黃六兩芒硝一升甘遂一錢七分右三味以水六升先煮大黃取二升去滓內芒硝煮一二沸內甘遂末溫服一升得快利止後服結胸者項亦強如柔痓狀下之則和宜大陷胸丸頭不痛而項猶強不惡寒而頭汗出故如柔痓狀此表未盡除而裏症又急丸以緩之是以攻劑為和劑也此是結胸症中或有此狀若謂結胸者必如是則不當有湯丸之別矣大陷胸丸大黃八兩芒硝杏仁葶藶子各半升右大黃葶藶搗篩內杏仁芒硝合研如脂和散取彈丸一枚別搗甘遂末一錢七白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效硝黃血分藥也葶杏氣分藥也病在表用氣分藥病在裏用血分藥此病在表裏之間故用藥亦氣血相須也且小其制而復以白蜜之甘以緩之留一宿乃下一以待表症之先除一以保腸胃之無傷耳小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之結胸有輕重立方分大小從心下至小腹按之石硬而痛不可近者為大結胸正在心下未及脅腹按之則痛未曾石硬者為小結胸大結胸是水結在胸腹故脈沉緊小結胸是痰結於心下故脈浮滑水結宜下故用甘遂葶杏硝黃等下之痰結可消故用黃連栝蔞半夏以消之水氣能結而為痰其人之陽氣重可知矣小陷胸湯黃連一兩半夏半升大栝蔞實一枚右三味以水六升先煮栝蔞取三升去渣內諸藥煮取二升去渣分溫三服結胸症其脈浮大者不可下下之則死陽明脈浮大心下反鞕有熱屬藏者可攻之太陽結胸熱實脈浮大者不可下何也蓋陽明燥化心下硬是浮大為心脈矣火就燥故急下之以存津液釜底抽薪法也結胸雖因熱入所致然尚浮大仍為表脈恐熱未實則水未結若下之利不止矣故必待沉緊始可下之此又憑脈不憑症之法也結胸症具煩躁者亦死結胸是邪氣實煩躁是正氣虛故死問曰病有結胸有藏結其狀何如答曰按之痛寸脈浮關脈沈名曰結胸也如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰藏結舌上白胎滑者難治結胸之脈沉緊者可下浮大者不可下此言其略耳若按部推之寸為陽浮為陽陽邪結胸而不散必寸部仍見浮脈關主中焦妄下而中氣傷故沈寒水留結於胸脅之間故緊不及尺者所重在關故舉關以統之也如結胸狀而非結胸者結胸則不能食不下利舌上燥而渴按之痛脈雖沈緊而實大此則結在藏而不在府故見症種種不同夫硬而不通謂之結此能食而利亦謂之結者是結在無形之氣分五藏不通故曰藏結與陰結之不能食而大便硬不同者是陰結尚為胃病而無間於藏也五藏以心為主而舌為心之外候舌胎白而滑是水來剋火心火幾於熄矣故難治藏結無陽症不往來寒熱其人反靜舌上胎滑者不可攻也結胸是陽邪下陷尚有陽症見於外故脈雖沉緊有可下之理藏結是積漸凝結而為陰五藏之陽已竭也外無煩躁潮熱之陽舌無黃黑芒刺之胎雖有硬滿之症慎不可攻理中四逆輩溫之尚有可生之義病人脅下素有痞連在臍傍痛引小腹入陰筋者此名藏結死藏結有如結胸者亦有如痞狀者素有痞而在脅下與下後而心下痞不同矣臍為立命之原臍傍者天樞之位氣交之際陽明脈之所合少陽脈之所出肝脾腎三藏之陰凝結於此所以痛引小腹入陰筋也此陰常在絕不見陽陽氣先絕陰氣繼絕故死少腹者厥陰之部兩陰交盡之處陰筋者宗筋也今入多有陰筋上衝小腹而痛死者名曰疝氣即是此類然痛止便蘇者金匱所云入藏則死入府則愈也治之以茴香吳萸等味而痊者亦可明藏結之治法矣盧氏將種種異症盡歸藏結亦好奇之過也瀉心湯證傷寒汗出解之後胃中不和心下痞硬乾嘔食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之汗出而解太陽症已罷矣胃中不和是太陽之餘邪與陰寒之水氣雜處其中故也陽邪居胃之上口故心下痞硬乾嘔而食臭水邪居胃之下口故腹中雷鳴而下利也火用不宣則痞硬水用不宣則乾嘔邪熱不殺穀則食臭脅下即腹中也土虛不能制水故腸鳴此太陽寒水之邪侵於形軀之表者已罷而入於形軀之裏者未散故病雖在胃而不屬陽明仍屬太陽寒水之變耳生薑瀉心湯生薑四兩人參黃芩甘草各三兩半夏半升乾薑黃連各一兩大棗十二枚右八味以水一斗煮取六升去滓再煎至二升溫服一升日三服按心下痞是太陽之裏症太陽之上寒氣主之中見少陰少陰者心也心為陽中之太陽必其人平日心火不足胃中虛冷故太陽寒水得以內侵虛陽鬱而不舒寒邪凝而不解寒熱交爭於心下變症蜂起君主危矣用熱以攻寒恐不戢而自焚用寒以勝熱恐召寇而自衛故用乾薑芩連之苦入心化痞人參甘草之甘瀉心和胃君以生薑佐以半夏倍辛甘之發散兼苦寒之湧洩水氣有不散者乎名曰瀉心止戈為武之意也傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中空虛客氣上逆故使鞕也甘草瀉心湯主之上條是汗解後水氣下攻症此條是誤下後客氣上逆症總是胃虛而稍有分別矣上條腹鳴下利胃中猶寒熱相半故云不和此腹鳴而完整不化日數十行則痞為虛痞硬為虛硬滿為虛滿也明矣上條因水氣下趨故不煩不滿此虛邪逆上故心煩而滿蓋當汗不汗其人心煩故於前方去人參而加甘草下利清穀又不可攻表故去生薑而加乾薑不曰理中仍名瀉心者以心煩痞硬病本於心耳傷寒中風是病發於陽誤下熱入而其人下利故不結胸若心下痞硬乾嘔心煩此為病發於陰矣而復下之故痞益甚也甘草瀉心湯前方去人參生薑加甘草一兩乾薑二兩餘同前法傷寒五六日嘔而發熱者柴胡湯症具而以他藥下之若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯嘔而發熱者小柴胡症也嘔多雖有陽明症不可攻之若有下症亦宜大柴胡而以他藥下之誤矣誤下後有二症者少陽為半表半裏之經不全發陽不全發陰故誤下之變亦因偏於半表者成結胸偏於半裏者心下痞耳此條本為半夏瀉心而發故只以痛不痛分結胸與痞未及他症半夏瀉心湯前方加半夏半斤乾薑二兩去生薑餘同法瀉心湯即小柴胡去柴胡加黃連乾薑湯也三方分治三陽在太陽用生薑瀉心湯以未經誤下而心下痞硬雖汗出表解水猶未散故君生薑以散之仍不離太陽為開之義在陽明用甘草瀉心湯者以兩番誤下胃中空虛其痞益甚故倍甘草以建中而緩客氣之上逆仍是從乎中治之法也在少陽用半夏瀉心者以誤下而成痞邪既不在表則柴胡湯不中與之又未全入裏則黃芩湯亦不中與之矣胸脅苦滿與心下痞滿皆半表裏症也於傷寒五六日未經下而胸脅苦滿者則柴胡湯解之傷寒五六日誤下後心下滿而胸脅不滿者則去柴胡生薑加黃連乾薑以和之此又治少陽半表裏之一法也然倍半夏而去生薑稍變柴胡半表之治推重少陽半裏之意耳君火以明相火以位故仍名曰瀉心亦以佐柴胡之所不及傷寒吐下後復發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿此以八九日吐下復汗其脈甚微看出是虛煩則心下痞硬脅下痛經脈動惕皆屬於虛氣上衝咽喉眩冒皆虛煩也此亦半夏瀉心症治之失宜久而成痿矣若用竹葉石膏湯大謬太陽病已發汗仍發熱惡寒復下之心下痞表裏俱虛陰陽氣並竭無陽則陰獨復加燒鍼因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈此亦半夏瀉心症前條因吐下後復汗以致虛煩此因汗下後加燒鍼以致虛煩多汗傷血故經脈動惕燒鍼傷肉故面青膚瞤色微黃手足溫是胃陽漸回故愈傷寒本自寒下醫復吐下之寒格若食入口即吐乾薑黃連黃芩人參湯主之治之小誤變症亦輕故製方用瀉心之半上焦寒格故用參薑心下蓄熱故用芩連嘔家不喜甘故去甘草不食則不吐是心下無水氣故不用薑夏要知寒熱相阻則為格症寒熱相結則為痞症乾薑黃連黃芩人參湯乾薑黃連黃芩人參各二兩右四味以水六升煮取二升分溫再服心下痞按之濡大便硬而不惡寒反惡熱其脈關上浮者大黃黃連瀉心湯主之大黃黃連瀉心湯大黃二兩黃連一兩右二味以麻沸湯一升漬之須臾絞去滓分溫再服濡當作硬按之濡下當有大便硬不惡寒反惡熱句故立此湯觀瀉心湯治痞是攻補兼施寒熱並馳之劑此則盡去溫補獨任苦寒下泄之品且用麻沸湯漬絞濃汁而生用之利於急下如此而不言及熱結當攻諸症謬矣夫按之濡為氣痞是無形也則不當下且結胸症其脈浮大者不可下則心下痞而關上浮者反可下乎小結胸按之痛者尚不用大黃何此比陷胸湯更峻是必有當急下之症比結胸更甚者故製此峻攻之劑也學者用古方治今病如據此條脈症而用此方下咽即死耳勿以斷簡殘文尊為聖經而曲護甚說以遺禍後人也心下痞大便硬心煩不得眠而復惡寒汗出者附子瀉心湯主之附子瀉心湯大黃二兩黃連黃芩各一兩附子一枚別煮取汁右三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服心下痞下當有大便硬心煩不得眠句故用此湯夫心下痞而惡寒者表未解也當先解表宜桂枝加附子而反用大黃謬矣既加附子復用芩連抑又何也若汗出是胃實則不當用附子若汗出為亡陽又烏可用芩連乎許學士云但師仲景意不取仲景方蓋謂此耳傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便服湯藥而利不止是病在胃復以他藥下之而利不止則病在大腸矣理中非不善但遲一著耳石脂餘糧助燥金之令濇以固脫庚金之氣收則戊土之濕化若復利不止者以腎主下焦為胃之關也關門不利再利小便以分消其濕蓋穀道既塞水道宜通使有出路此理下焦之二法也赤石脂禹餘糧湯赤石脂禹餘糧湯各一斤右二味以水六升溫取二升去滓分溫三服利在下焦水氣為患也唯土能制水石者土之剛也石脂禹糧皆土之精氣所結石脂色赤入丙助火以生土餘糧色黃入戊實胃而濇腸雖理下焦實中宮之劑也且二味皆甘甘先入脾能堅固隄防而平水氣之亢故功勝於甘朮耳傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之傷寒者寒傷心也既發汗復吐下之心氣太虛表寒乘虛而結於心下心氣不得降而上出於聲君主出亡之象也噫者傷痛聲不言聲而曰氣者氣隨聲而見於外也旋覆代赭石湯旋覆花甘草各三兩人參二兩半夏半升代赭石一兩生薑五兩大棗十二枚右七味以水一斗煮六升去渣再煮三升溫服一升日三服此生薑瀉心去芩連乾薑加旋覆代赭石方也以心虛不可復瀉心故製此劑耳心主夏旋覆花生於夏末鹹能補心能軟硬能消結氣半夏生於夏初辛能散邪能消痞能行結氣代赭稟南方之火色入通於心散痞硬而鎮虛熱參甘大棗之甘佐旋覆以瀉虛火生薑之辛佐半夏以散水結斯痞硬消噫氣自除矣若用芩連以瀉心能保微陽之不滅哉抵當湯證太陽病六七日表症仍在而反下之脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裏故也抵當湯主之此亦病發於陽誤下熱入之症也表症仍在下當有而反下之句太陽病六七日不解脈反沉微宜四逆湯救之此因誤下熱邪隨經入府結於膀胱故少腹硬滿而不結胸小便自利而不發黃也太陽經少氣多血病六七日而表症仍在陽氣重可知陽極則擾陰故血燥而蓄於中耳血病則知覺昏昧故發狂此經病傳府表病傳裏氣病傳血上焦病而傳下焦也少腹居下焦為膀胱之室厥陰經脈所聚衝任血海所由瘀血留結故硬滿然下其血而氣自舒攻其裏而表自解矣難經云氣結而不行者為氣先病血滯而不濡者為血後病深合此症之義太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血結症也抵當湯主之太陽病發黃與狂有氣血之分小便不利而發黃者病在氣分麻黃連翹赤小豆湯症也若小便自利而發狂者病在血分抵當湯症也濕熱留於皮膚而發黃衛氣不行之故也燥血結於膀胱而發黃營氣不敷之故也沉為在裏凡下後熱入之症如結胸發黃蓄血其脈必沉或緊或微或結在乎受病之輕重而不可以因症分也水結血結俱是膀胱病故皆少腹硬痛小便不利是水結小便自利是血結如字助語辭若以如字實講與蓄血發狂分輕重則謬矣傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可餘藥宜抵當丸有熱即表症仍在少腹滿而未硬其人未發狂只以小便自利預知其為有蓄血故小其制而丸以緩之抵當湯水蛭熬虻蟲去翅足熬各三十個桃仁二十粒大黃三兩酒洗右四味以水五升煮取三升去滓溫服一升不下再服抵當丸水蛭三十個虻蟲二十五個桃仁二十個大黃三兩右四味杵分為四丸以水二升煮一丸取七合服之晬時當下血若不下者更服蛭昆蟲之飲血者也而利於水虻飛蟲之吮血者也而利於陸以水陸之善取血者用以攻膀胱蓄血使出乎前陰佐桃仁之苦甘而推陳致新大黃之苦寒而蕩滌邪熱名之曰抵當者直抵其當攻之處也太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃仁承氣湯陽氣太重標本俱病故其人如狂血得熱則行故尿血也血下則不結故愈衝任之血會於少腹熱極則血不下而反結故急然病自外來者當先審表熱之輕重以治其表繼用桃仁承氣以攻其裏之結血此少腹未硬滿故不用抵當然服五合取微利亦先不欲下意首條以反不結胸句知其為下後症此以尚未可攻句知其為未下症急結者宜解只須承氣硬滿者不易解必仗抵當表症仍在竟用抵當全不顧表者因邪甚於裏急當救裏也外症已解桃仁承氣未忘桂枝者因邪甚於表仍當顧表也桃仁承氣湯桃仁五十個甘草桂枝芒硝各二兩大黃四兩右五味以水七升煮取二升半去渣內芒硝更上火微沸下火先食溫服五合日三服當微利陽明病其人喜忘者必有畜血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之瘀血是病根喜忘是病情此陽明未病前症前此不知今因陽明病而究其自也屎硬為陽明病硬則大便當難而反易此病機之變易見矣原其故必有宿血以血主濡也血久則黑火極反見水化也此以大便反易之機因究其色之黑乃得其病之根因知前此喜忘之病情耳承氣本陽明藥不用桃仁承氣者以大便易不須芒硝無表症不得用桂枝瘀血久無庸甘草非虻蟲水蛭不勝其任也病人無表裏症發熱七八日不大便雖脈浮數者可下之假令已下脈數不解合熱則消穀善饑至六七日不大便者有瘀血也宜抵當湯若脈數不解而下利不止必協熱而便膿血也不頭痛惡寒為無表症不煩燥嘔湯為無裏症非無熱也七八日下當有不大便句故脈雖浮數有可下之理觀下後六七日猶然不便可知合熱協熱內外熱也前條據症推原此條憑脈辨症表裏熱極陽盛陰虛必傷陰絡故仍不大便者必有蓄血熱利不止必大便膿血矣宜黃連阿膠湯主之上條大便反易知瘀血留久是驗之於已形此條仍不大便知瘀血已結是料之於未形六經惟太陽陽明有蓄血症以二經多血故也故脈症異而治則同太陽協熱利有虛有熱陽明則熱而不虛少陰便膿血屬於虛陽明則熱數為虛熱不能消穀消穀善饑此為實熱矣火逆諸證太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼身體則枯燥但頭汗出劑項而還其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭腹滿而喘口渴咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治太陽中風不以麻黃青龍發汗而以火攻其汗則不須言風邪之患當知火邪之利害矣血得熱則流氣得熱則溢血氣不由常度而變猶生也風為陽邪火為陽毒所謂兩陽也兩陽相灼故即見兩陽合明之病身體枯燥身無汗也故身發黃頭汗至頸故但身黃而頭至頸不黃也首為元陽之會不枯燥是陽未虛竭有汗出是陰未虛竭此兩陽尚熏於形身而未內灼於藏府也此血氣流溢之輕者若其人陽素盛者因熏灼而傷血其鼻必衄其人陰素虛者因熏灼而傷津小便必難若其人陰陽之氣俱虛竭者胸滿而喘口乾咽爛而死者有矣或胃實而譫語或手足躁擾而至於捻衣摸床者有矣皆氣血流溢失其常度故也小便利是反應小便難句凡傷寒之病以陽為主故最畏亡陽而火逆之病則以陰為主故最怕陰竭小便利者為可治是陰不虛津液未亡太陽膀胱之氣化猶在也陽盛陰虛是火逆一症之綱領陽盛則傷血陰虛則亡津又是傷寒一書之大綱領太陽病二日煩躁反熨其背而大汗出大熱入胃胃中水竭躁煩必發譫語十餘日振慄自下利者此為欲解也故其汗從腰以下不得汗故小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也此指火熱之輕者言之太陽病經二日不汗出而煩躁此大青龍症也不知發汗兼以清火而反以火熨其背背者太陽之部也太陽被火迫因轉屬陽明胃者陽明之府水穀之海也火邪入胃胃中水竭屎必燥硬煩躁不止譫語所由發也非調胃承氣下之胃氣絕矣十餘日句接大汗出來蓋其人雖大汗出而火熱未入胃中胃家無恙譫語不發煩躁已除至二候之後火氣已衰陽氣微故振慄而解陰氣復故自利而解此陰陽自和而自愈者也故其汗至未是倒句法釋未利未解前症溯其因而究由也言所以能自下利者何以故因其自汗出時從腰已下不得汗夫腰已下為地地為陰是火邪未陷入於陰位也二腸膀胱之液俱未傷也欲小便不得而反嘔欲失溲此非無小便也其津液在上焦欲還入胃中故也凡大便硬者小便當數而不多今小便反不數而反多此應前欲小便不得句正以明津液自還入胃中而下利之意也利是通利非瀉利之謂觀大便已可知矣頭為諸陽之會卓然而痛者陰氣復則陽氣虛也足心必熱反應足下惡風句前大汗出則風已去故身不惡風汗出不至足故足下惡風也今火氣下流故足心熱火氣下流則穀氣因之下流故大便自利也大便已頭疼可與小便已陰疼者參之欲小便不得反失溲小便當數反不數反多與上條小便難小便利俱是審其陰氣之虛不虛津液之竭不竭耳太陽病以火熏之不得汗其人必躁過經不解必圊血名為火邪首條以火劫發汗而衄血是陽邪盛於陽位故在未過經時此條以火熏不得汗而圊血是陽邪下陷入陰分故在過經不解時次條大汗出後十餘日振慄下利而解此條不得汗過經圊血而猶不解可知劫汗而得汗者其患速不得汗者其患遲名為火邪則但治其火而不慮其前此之風寒矣傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之上文皆陽盛之症以中風為陽邪也此後是陽虛之症以傷寒為陰邪也陽盛者輕則發狂譫語重則衄血圊血此不戢自焚者也陽虛者神不守舍起居如驚其人如狂是棄國而逃者也方註詳桂枝篇右論火逆症太陽傷寒者加溫鍼必驚也溫鍼者即燒鍼也燒之令其溫耳寒在形軀而用溫鍼刺之寒氣內迫於心故振驚也若重發汗加燒鍼者四逆湯主之重發汗而病不解則不當汗矣復加燒鍼以迫其汗寒氣內侵當救其裏燒鍼後宜有脫文火逆下之因燒鍼煩躁者桂枝甘草龍骨牡蠣湯主之方註詳桂枝篇其脈沉者營氣微也營氣微者加燒鍼則血流不行更發熱而煩躁也按流行二字必有一誤此陰陽俱虛竭之候也燒鍼令其汗鍼處被寒核起而赤者必發奔豚氣從少腹上衝者灸其核上各一壯與桂枝加桂湯方註詳桂枝篇右論火鍼症脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痺名火逆也脈浮熱甚反灸之此為實實以虛治因火而動必咽燥吐血微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也此皆論灸之而生變也腰以下重而痺者因腰以下不得汗也咽燥吐血者亦陽盛而然也比衄加甚矣當知灸法為虛症設不為風寒設故叮嚀如此右論火灸症痙溼暑證太陽病痙濕暑三症宜應別論以傷寒所致與傷寒相似故此見之太陽主表六氣皆得而傷之三種故與傷寒不同然亦有因於傷寒而見症與傷寒相似故論及之耳太陽病發汗太多因致痙脈沉而細身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病也太陽病其證備身體強几几然脈反沉遲此為痙栝蔞桂枝湯主之太陽病無汗而小便反少氣上衝胸口噤不能語欲作剛痙葛根湯主之陽氣者精則養神柔則養筋發汗太多則無液養筋筋傷則姅急而反張矣太陽主筋所生病矣要知痙之一症非無因而至蓋因於傷寒發汗不如法所致耳痙為病胸滿口噤臥不著席腳攣急必吤齒可與大承氣湯太陽脈本浮今反沉者營氣微也細者陽氣少也身熱而足寒者下焦虛也頭痛雖止而頸項強急惡寒之症未罷更時見面赤目赤是將轉屬於陽明然諸症皆與傷寒相似而非痙獨有頭面動搖卒然口噤背反如張弓者與傷寒不相似故名之曰痙耳此汗多亡液不轉屬陽明而成痙者以發汗太驟形身之津液暴脫而胃家津液未乾故變見者仍是太陽表症而治法當滋陰以急相其裏勿得以沉細為可溫也炙甘草湯主之金匱用桂枝湯君栝蔞根恐不勝其任太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出不惡寒者名曰柔痙剛痙葛根湯主之柔痙括蔞桂枝湯主之此以表氣虛實分剛柔原其本而名之也亦可以知其人初病之輕重稟氣之強弱而施治矣金匱用葛根湯則謬右論痙症病者一身盡疼發熱日晡所劇者此名風濕此病傷于汗出當風或久傷寒冷所致也汗出當風寒則汗不越久留骨節故一身盡疼玄府反閉故發熱日晡為陽明主時太陽濕土鬱而不伸故劇此雖傷於濕而實因於風寒也金匱用麻黃杏仁薏苡甘草湯風濕為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲脈浮為風陰陽俱浮自汗出者風濕相搏於內也溼流骨節故身重溼勝則衛氣行陰不得行陽故好眠也睡則氣從鼻出風出而溼留之呼吸不利故鼻息必鼾濕留會厭則重而難發聲如從室中言是中氣之濕矣法當汗解而反下之大便利則小便必不利心肺之氣化不宣胃家之關門不利脾土之承制不行故直視失溲也若以火劫之受火氣之輕者濕不得越因熱而發黃受火氣之重者必亡陽而如驚癇狀液脫而時見瘈瘲之形矣問曰值天陰雨不止風濕相搏一身盡疼法當汗出而解醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也上條備言風濕諸症未及身疼要知風濕與傷寒之身疼不同傷寒身疼無止時風濕相搏而痛多在日晡時發若更值陰雨是風濕與天氣合故疼痛更甚不必在日晡時也陰雨不止疼痛亦不止法當汗解汗大出濕反不去者風為陽邪其入淺濕為陰邪其入深又風傷於上濕傷於下淺者上者易去而深者下者難出故微汗之令遍身漐漐乃佳耳傷寒八九日風濕相搏身體煩疼不能自轉側不嘔不渴脈浮虛而濇者桂枝附子湯主之若其人大便硬小便自利者去桂加白朮湯主之脈浮為在表虛為風濇為濕身體煩疼表症表脈也不嘔不渴是裏無熱故於桂枝湯君桂以治風寒去芍藥之酸寒易附子之辛熱以除寒濕若其人大便硬小便自利者表症未除病仍在表不是因於胃家實而因於脾氣虛矣蓋脾家實腐穢當自去脾家虛濕土失職不能制水濕氣留於皮膚故大便反見燥化不嘔不渴是上焦之化源清故小便自利濡濕之地風氣常在故風濕相搏不解也病本在脾法當君以白朮代桂枝以治脾培土以勝濕土旺則風自平矣前條風勝濕輕故脈陰陽俱浮有內熱故汗自出宜桂枝湯此濕勝風微故脈浮虛而濇內無熱而不嘔不渴故可加附子桂枝理上焦大便硬小便利是中焦不治故去桂大便不硬小便不利是下焦不治故仍須桂枝桂枝附子湯桂枝四兩附子三枚炮大棗十二枚生薑三兩甘草二兩右五味以水六升煮取二升去渣分溫三服桂枝附子去桂加白朮湯前方去桂枝加白朮四兩餘同前法初服其人身如痺半日許復服之三服都盡其人如冒狀勿怪以朮附并走皮肉逐水氣未得除故使然耳法當加桂四兩此本一方二法以大便硬小便自利去桂也以大便不通小便不利當加桂附子三枚恐多也虛弱家及產婦宜減之風濕相搏骨節煩疼掣痛不得劇伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之身腫痛劇不得屈伸濕盛於外也惡風不欲去衣風淫於外也汗出短氣小便不利化源不清也君桂枝以理上焦而散風邪佐朮附甘草以除濕而調氣風濕脈浮身重汗出惡風者防己黃耆湯主之防已黃耆甘草白朮薑棗喘加麻黃胃中不和少加芍藥氣上衝者加桂枝下有阻寒者稍加細辛甘草附子湯甘草炙白朮各二兩桂枝四兩附子二枚右四味水六升煮取三升去渣溫服一升日三初服得微汗則解能食汗復煩者服三合太陽病關節疼痛而煩脈沉而細者此名濕痺濕痺之候其人小便不利大便反快但當利其小便內經曰風寒濕三氣合而為痺痛者寒氣多也煩者陽遭陰也夫脈浮為風細為濕太陽脈本浮風濕為病脈陰陽俱浮而浮虛而濇合關節煩疼脈反沉細者是發汗不如法但風氣去濕流骨節為著痺也濕氣留著於身形脾氣不能上輸肺氣不能下達膀胱之液不藏胃家之關不啟故小便不利脾土上應濕化不能制水故大便反快但利其小便安能聚水而為患哉風濕相搏者當發汗風去濕在者當利小便此兩大法吐下火攻非其治矣濕家之為病一身盡疼發熱身色如熏黃凡濕不得洩熱不得越則身黃若傷寒發黃時身疼已解此濕流關節故不解也須五苓以除其濕濕家但頭汗出背強欲得被覆向火若下之則噦胸滿小便不利舌上如胎者以丹田有熱胸中有寒渴欲得水而不能飲口燥煩也但頭汗若小便利則不發黃背強惡寒尚是太陽寒濕法當汗解若下之陽氣擾於胸中故滿中傷胃氣故噦下焦虛不能制水故小便不利也如舌上有胎不是心家熱以上焦之濕不除胸中之寒不解惟丹田之有熱不安於下焦而上走空竅故口燥煩而舌上胎耳不能飲水可見濕猶在中又當從五苓去桂枝易肉桂之法矣濕家下之額上汗出微喘小便利者死下利不止者亦死濕痺本無死症皆因妄治而死火逆則驚癇瘈瘲下之則直視失溲舌胎而噦皆死兆也夫額上汗出而小便不利是痺不得洩故發黃此更微喘是水氣入肺當不能通調水道而小便反利者是膀胱不藏水泉不止也若下利不止是倉廩不藏門戶不要也失守者死矣濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥中則愈種種皆是表症鼻塞而不鳴脈大而不浮不關風矣脈不沉細非濕痺矣腹初不滿則非瘀熱在裏重干頭痛是頭中寒濕可知寒濕從鼻而入故鼻塞亦當從鼻而出內藥鼻中塞因塞用法也右論濕症太陽中暑者身熱疼重而惡寒脈微弱此以夏月傷冷水水行皮中所致也中暑與傷寒迥殊而亦有因於傷寒者太陽之氣在天為寒在地為水冬月之傷寒傷於天之寒風夏月之傷寒傷於地之寒水也脈微亡陽脈弱發熱此身熱脈微本是暑傷於氣而疼重惡寒實由於寒水沐浴留在皮膚而然亦是傷寒所致耳金匱用瓜蒂湯非是宜五苓散藿香飲之類太陽中暑者發熱惡寒身重而疼痛其脈弦細芤遲小便已洒洒然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫鍼則發熱甚下之則淋甚弦細芤遲不得連講言中暑夾寒之脈或微弱或弦細或芤遲皆是虛脈如脈浮而緊者名曰弦弦而細則為虛矣脈弦而大則為芤芤固為虛芤而遲更為寒矣以此脈而見發熱惡寒身重疼痛等症雖當炎夏而虛寒可知更當審其小便小便者寒水之氣化也寒水留在皮膚不得下行故小便已而洒然毛聳其短濇可知手足為諸陽之本小便已而逆冷其寒水留於四肢可知夏行冬令不可謂非傷寒所致耳仍以中暑名之者以其人陰氣素虛因小有勞身即發熱內熱更熾見其開口以出之板齒枯燥故知其本乎中暑耳若汗之表陽愈虛陰寒反甚火攻則陰津愈虛發熱反甚下之水行穀道小便更短濇而成淋矣此東垣補中益氣深合仲景心也太陽中暑其人汗出惡寒身熱而渴也中暑夾寒有不因乎浴水而因乎乘涼者或因露風或因曠宇或因夜風陰寒先著於肌膚而暑氣內傷於心脈故惡寒身熱汗出而渴也清暑益氣湯東垣得之矣右論暑症三症皆本於傷寒故惡寒發熱身疼皆與傷寒相例痙者脈同濕家中暑則大同小異三脈迥殊於傷寒治之者當以脈別症更當從脈施治耳
